<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>งานทีม Moodata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{ --blue:#1B72E8; --bg:#F2F5FA; --card:#fff; --line:#E4E9F2; --muted:#8A94A6; --text:#242B36; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:'IBM Plex Sans Thai',sans-serif; background:var(--bg); color:var(--text); }
  .hide{ display:none !important; }
  header{ background:var(--blue); color:#fff; padding:16px 16px 0; position:sticky; top:0; z-index:10; }
  header h1{ margin:0 0 12px; font-size:18px; font-weight:700; display:flex; align-items:center; gap:8px; }
  header h1 .who{ margin-left:auto; font-size:13px; font-weight:400; opacity:.85; }
  .tabs{ display:flex; gap:6px; }
  .tab{ flex:1; text-align:center; padding:10px; background:rgba(255,255,255,.15); color:#fff;
        border-radius:10px 10px 0 0; font-weight:600; font-size:14px; cursor:pointer; }
  .tab.active{ background:var(--bg); color:var(--blue); }
  main{ padding:14px; }
  .chips{ display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; }
  .chip{ white-space:nowrap; padding:6px 12px; border-radius:999px; background:#fff; border:1px solid var(--line);
         font-size:13px; color:var(--muted); cursor:pointer; }
  .chip.active{ background:var(--blue); color:#fff; border-color:var(--blue); }
  .search{ width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-family:inherit;
           font-size:14px; margin-bottom:10px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  .card .row1{ display:flex; align-items:center; gap:8px; }
  .no{ font-weight:700; color:var(--blue); font-size:14px; }
  .badge{ margin-left:auto; font-size:12px; padding:3px 9px; border-radius:999px; font-weight:600; }
  .b-new{ background:#EEF1F6; color:#5B6472; } .b-doing{ background:#E3EEFD; color:#1B72E8; }
  .b-review{ background:#FDF0E1; color:#C87F1E; } .b-done{ background:#E4F5EA; color:#1E9E5A; }
  .b-cancel{ background:#FBE7E7; color:#C0392B; }
  .cust{ font-weight:600; margin-top:8px; } .cat{ font-size:12px; color:var(--muted); }
  .detail{ font-size:14px; color:#4A5262; margin-top:6px; white-space:pre-wrap; }
  .kv{ font-size:13px; margin-top:8px; } .kv b{ color:var(--muted); font-weight:500; }
  .kv a{ color:var(--blue); word-break:break-all; }
  .assignee{ font-size:13px; color:#4A5262; margin-top:8px; }
  .assignee.none{ color:#C87F1E; }
  .acts{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .btn{ border:none; border-radius:10px; padding:9px 14px; font-family:inherit; font-size:14px; font-weight:600;
        cursor:pointer; flex:1; min-width:120px; }
  .btn-p{ background:var(--blue); color:#fff; } .btn-s{ background:#EEF1F6; color:#333; }
  .btn-g{ background:#1E9E5A; color:#fff; }
  .assignRow{ display:flex; gap:8px; margin-top:12px; }
  .assignRow select{ flex:1; padding:9px; border:1px solid var(--line); border-radius:10px; font-family:inherit; font-size:14px; }
  .assignRow .btn{ flex:0 0 auto; min-width:0; }
  .grp{ display:flex; align-items:center; gap:8px; margin:16px 2px 8px; font-weight:700; font-size:15px; color:#2A3444; }
  .grp .cnt{ font-size:12px; font-weight:500; color:#fff; background:var(--blue); border-radius:999px; padding:1px 9px; }
  .grp:first-child{ margin-top:2px; }
  .bcard{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
  .bcard .row1{ display:flex; align-items:center; gap:8px; }
  .bcard .detail{ font-size:13px; margin-top:4px; }
  .bcard .assignee{ margin-top:6px; }
  .empty{ text-align:center; color:var(--muted); padding:50px 20px; }
  .loading{ text-align:center; padding:60px 20px; color:var(--muted); }
  .spin{ width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;
         margin:0 auto 14px; animation:sp 1s linear infinite; } @keyframes sp{to{transform:rotate(360deg)}}
  .fatal{ text-align:center; padding:60px 24px; color:#C0392B; }
  /* modal */
  .mask{ position:fixed; inset:0; background:rgba(20,28,40,.5); display:flex; align-items:flex-end; z-index:50; }
  .sheet{ background:#fff; width:100%; border-radius:18px 18px 0 0; padding:20px 18px 26px; max-height:88vh; overflow:auto; }
  .sheet h3{ margin:0 0 4px; font-size:17px; } .sheet .sub{ color:var(--muted); font-size:13px; margin-bottom:14px; }
  .fld{ margin-bottom:12px; } .fld label{ display:block; font-size:13px; font-weight:600; margin-bottom:5px; }
  .fld input,.fld textarea{ width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px;
        font-family:inherit; font-size:14px; } .fld textarea{ min-height:74px; resize:vertical; }
  .err{ background:#FBE7E7; color:#C0392B; padding:9px 12px; border-radius:8px; font-size:13px; margin-bottom:10px; }
  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#242B36; color:#fff;
          padding:11px 18px; border-radius:12px; font-size:14px; z-index:99; opacity:0; transition:.25s; }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<div id="boot" class="loading"><div class="spin"></div>กำลังเปิดระบบงานทีม…</div>
<div id="fatal" class="fatal hide"><div style="font-size:34px">⚠️</div><p id="fatalMsg"></p></div>

<div id="app" class="hide">
  <header>
    <h1>🗂️ งานทีม Moodata <span class="who" id="who"></span></h1>
    <div class="tabs">
      <div class="tab" id="tabMine" onclick="switchTab('mine')">งานของฉัน</div>
      <div class="tab" id="tabBoard" onclick="switchTab('board')">งานทั้งหมด</div>
      <div class="tab" id="tabAll" onclick="switchTab('all')">ภาพรวม</div>
    </div>
  </header>
  <main>
    <div id="filterMine" class="chips"></div>
    <div id="filterBoard" class="chips hide"></div>
    <input id="searchAll" class="search hide" placeholder="🔍 ค้นหา เลขงาน / ลูกค้า / รายละเอียด" oninput="debouncedAll()">
    <div id="filterAll" class="chips hide"></div>
    <div id="list"></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
  // ═══════════ ตั้งค่า ═══════════
  // สถาปัตยกรรม LIFF อันเดียว (Moodata): endpoint LIFF = โฟลเดอร์ราก moodata-billing-liff/
  //   เปิดหน้านี้ผ่าน  liff.line.me/{LIFF_ID}/team-app.html  (จองนัด = /appointment.html)
  //   ทุกหน้าใช้ LIFF_ID เดียวกัน → เพิ่มหน้าใหม่ไม่ต้องสร้าง LIFF ใหม่
  var LIFF_ID  = '2010533182-66TDQvCu';
  var EXEC_URL = 'https://script.google.com/macros/s/AKfycbwdOotltb--WwTuS-ECutq6uFQs536kjz-RyLuq1mm35Pbfnn25EptvIRkfjaZB6iJf/exec';
  // ═══════════════════════════════

  var UID='', ROLE={isOwner:false,isTeam:false}, STATUSES=[], TEAM=[], CUSTOMERS=[], CACHE={};
  var TAB='mine', FILTER_MINE='', FILTER_ALL='', FILTER_BOARD='';

  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function fatal(m){ $('boot').classList.add('hide'); $('app').classList.add('hide'); $('fatalMsg').textContent=m; $('fatal').classList.remove('hide'); }
  var _tt; function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(function(){t.classList.remove('show');},2200); }

  function jsonp(params){
    return new Promise(function(resolve,reject){
      var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
      var timer=setTimeout(function(){cleanup();reject(new Error('หมดเวลาเชื่อมต่อ'));},60000);
      window[cb]=function(d){cleanup();resolve(d);};
      function cleanup(){clearTimeout(timer);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
      var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
      var s=document.createElement('script'); s.src=EXEC_URL+'?'+qs+'&callback='+cb;
      s.onerror=function(){cleanup();reject(new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'));}; document.body.appendChild(s);
    });
  }

  // ───── สถานะ → คลาส badge ─────
  function badgeClass(st){
    if(st.indexOf('กำลังทำ')>=0) return 'b-doing';
    if(st.indexOf('รอตรวจ')>=0) return 'b-review';
    if(st.indexOf('เสร็จ')>=0) return 'b-done';
    if(st.indexOf('ยกเลิก')>=0) return 'b-cancel';
    return 'b-new';
  }

  // ───── แท็บ ─────
  function switchTab(t){
    TAB=t;
    $('tabMine').classList.toggle('active', t==='mine');
    $('tabBoard').classList.toggle('active', t==='board');
    $('tabAll').classList.toggle('active', t==='all');
    $('filterMine').classList.toggle('hide', t!=='mine');
    $('filterBoard').classList.toggle('hide', t!=='board');
    $('searchAll').classList.toggle('hide', t!=='all');
    $('filterAll').classList.toggle('hide', t!=='all');
    // cache: มีของเดิม → โชว์ทันที แล้วรีเฟรชเงียบเบื้องหลัง (silent)
    var cached=CACHE[t]!=null;
    if(cached) $('list').innerHTML=CACHE[t];
    if(t==='mine') loadMine(cached); else if(t==='board') loadBoard(cached); else loadAll(cached);
  }

  function renderChips(container, current, onPick){
    var opts=[{v:'',l:'ทั้งหมด'}].concat(STATUSES.filter(function(s){return s.indexOf('ยกเลิก')<0 || TAB==='all';}).map(function(s){return {v:s,l:s};}));
    if(TAB==='all') opts=[{v:'',l:'ทั้งหมด'}].concat(STATUSES.map(function(s){return {v:s,l:s};}));
    container.innerHTML='';
    opts.forEach(function(o){
      var c=document.createElement('div'); c.className='chip'+(o.v===current?' active':''); c.textContent=o.l;
      c.onclick=function(){ onPick(o.v); }; container.appendChild(c);
    });
  }

  // ───── โหลด งานของฉัน ─────
  function loadMine(silent){
    renderChips($('filterMine'), FILTER_MINE, function(v){ FILTER_MINE=v; loadMine(); });
    if(!silent) listLoading();
    jsonp({action:'waMyTasks', uid:UID}).then(function(r){
      if(!r||!r.ok){ if(!silent) listEmpty((r&&r.error)||'โหลดไม่สำเร็จ'); return; }
      CUSTOMERS=r.customers||CUSTOMERS;
      var head='<button class="btn btn-p" style="width:100%;margin-bottom:10px" onclick="openCreate()">➕ เปิดงานใหม่</button>';
      var tasks=r.tasks||[]; if(FILTER_MINE) tasks=tasks.filter(function(t){return t.status===FILTER_MINE;});
      var html=head+(tasks.length?tasks.map(cardMine).join(''):'<div class="empty">ยังไม่มีงานในหมวดนี้ 😊</div>');
      $('list').innerHTML=html; CACHE.mine=html;
    }).catch(function(e){ if(!silent) listEmpty(e.message); });
  }

  function cardMine(t){
    var h='<div class="card"><div class="row1"><span class="no">'+esc(t.no)+'</span>'+
      '<span class="badge '+badgeClass(t.status)+'">'+esc(t.status)+'</span></div>'+
      '<div class="cust">'+esc(t.customer||'-')+'</div>'+
      (t.category?'<div class="cat">'+esc(t.category)+'</div>':'')+
      (t.detail?'<div class="detail">'+esc(t.detail)+'</div>':'');
    if(t.worklink) h+='<div class="kv"><b>ลิงก์งาน:</b> <a href="'+esc(t.worklink)+'" target="_blank">'+esc(t.worklink)+'</a></div>';
    if(t.reply) h+='<div class="kv"><b>คำอธิบายถึงลูกค้า:</b> '+esc(t.reply)+'</div>';
    var btns=[];
    if(t.status.indexOf('เสร็จ')<0){
      if(t.status.indexOf('กำลังทำ')<0 && t.status.indexOf('รอตรวจ')<0)
        btns.push('<button class="btn btn-p" onclick="doDoing(\''+esc(t.no)+'\')">🔵 รับงาน</button>');
      btns.push('<button class="btn btn-g" onclick="openSubmit(\''+esc(t.no)+'\')">📤 ส่งงานให้ตรวจ</button>');
    }
    if(btns.length) h+='<div class="acts">'+btns.join('')+'</div>';
    return h+'</div>';
  }

  // ───── โหลด งานทั้งหมด (พี่) ─────
  var _dt; function debouncedAll(){ clearTimeout(_dt); _dt=setTimeout(loadAll,350); }
  function loadAll(silent){
    renderChips($('filterAll'), FILTER_ALL, function(v){ FILTER_ALL=v; loadAll(); });
    if(!silent) listLoading();
    jsonp({action:'waAllTasks', uid:UID, status:FILTER_ALL, q:$('searchAll').value.trim()}).then(function(r){
      if(!r||!r.ok){ if(!silent) listEmpty((r&&r.error)||'โหลดไม่สำเร็จ'); return; }
      TEAM=r.team||[];
      var tasks=r.tasks||[];
      var html=tasks.length?tasks.map(cardAll).join(''):'<div class="empty">ไม่พบงานตามเงื่อนไข</div>';
      $('list').innerHTML=html; CACHE.all=html;
    }).catch(function(e){ if(!silent) listEmpty(e.message); });
  }

  function cardAll(t){
    var h='<div class="card"><div class="row1"><span class="no">'+esc(t.no)+'</span>'+
      '<span class="badge '+badgeClass(t.status)+'">'+esc(t.status)+'</span></div>'+
      '<div class="cust">'+esc(t.customer||'-')+'</div>'+
      (t.category?'<div class="cat">'+esc(t.category)+'</div>':'')+
      (t.detail?'<div class="detail">'+esc(t.detail)+'</div>':'')+
      '<div class="assignee'+(t.assignee?'':' none')+'">👤 '+(t.assignee?esc(t.assignee):'ยังไม่มอบหมาย')+'</div>';
    // งานที่ทีมส่งกลับ (รอตรวจ) — โชว์ลิงก์+คำอธิบาย + ปุ่มส่งลูกค้า
    if(t.worklink) h+='<div class="kv"><b>ลิงก์งานจากทีม:</b> <a href="'+esc(t.worklink)+'" target="_blank">'+esc(t.worklink)+'</a></div>';
    if(t.reply) h+='<div class="kv"><b>คำอธิบายถึงลูกค้า:</b> '+esc(t.reply)+'</div>';
    if(t.note) h+='<div class="kv"><b>โน้ตจากทีม:</b> '+esc(t.note)+'</div>';
    // แถวมอบหมาย
    var opts='<option value="">— เลือกทีม —</option>'+TEAM.map(function(m){
      var label=m.name+(m.nick&&m.nick!==m.name?' ('+m.nick+')':'');
      return '<option value="'+esc(m.name)+'"'+(m.name===t.assignee?' selected':'')+'>'+esc(label)+'</option>';
    }).join('');
    h+='<div class="assignRow"><select id="sel_'+esc(t.no)+'">'+opts+'</select>'+
       '<button class="btn btn-s" onclick="doAssign(\''+esc(t.no)+'\')">มอบหมาย</button></div>';
    if(t.status.indexOf('เสร็จ')<0 && t.hasGroup)
      h+='<div class="acts"><button class="btn btn-p" onclick="doSend(\''+esc(t.no)+'\')">📨 ส่งให้ลูกค้า</button></div>';
    else if(!t.hasGroup)
      h+='<div class="kv" style="color:#C87F1E">⚠️ งานนี้ไม่มีกลุ่ม LINE ลูกค้า (ส่งให้ลูกค้าไม่ได้)</div>';
    if(t.status.indexOf('ยกเลิก')<0)
      h+='<div class="acts"><button class="btn btn-s" onclick="doCancel(\''+esc(t.no)+'\')">❌ ยกเลิกงาน</button></div>';
    return h+'</div>';
  }

  function doCancel(no){
    askConfirm('ยกเลิกงาน '+no+' ใช่ไหมคะ? (งานจะหายจากรายการ)', function(){
      toast('กำลังยกเลิก…');
      jsonp({action:'waCancel', uid:UID, no:no}).then(function(r){
        if(!r||!r.ok){ toast((r&&r.error)||'ไม่สำเร็จ'); return; } toast('❌ ยกเลิกงานแล้ว'); loadAll(true);
      }).catch(function(e){ toast(e.message); });
    });
  }

  // ───── โหลด ภาพรวม (แยกบริษัท · ทีม+พี่ ดูร่วมกัน) ─────
  function loadBoard(silent){
    renderChips($('filterBoard'), FILTER_BOARD, function(v){ FILTER_BOARD=v; loadBoard(); });
    if(!silent) listLoading();
    jsonp({action:'waBoard', uid:UID, status:FILTER_BOARD}).then(function(r){
      if(!r||!r.ok){ if(!silent) listEmpty((r&&r.error)||'โหลดไม่สำเร็จ'); return; }
      var tasks=r.tasks||[];
      if(!tasks.length){ var eh='<div class="empty">ยังไม่มีงาน 😊</div>'; $('list').innerHTML=eh; CACHE.board=eh; return; }
      // จัดกลุ่มตามบริษัท (คงลำดับที่เจอครั้งแรก = ใหม่→เก่า)
      var order=[], groups={};
      tasks.forEach(function(t){
        var c=t.customer||'(ไม่ระบุบริษัท)';
        if(!groups[c]){ groups[c]=[]; order.push(c); }
        groups[c].push(t);
      });
      var html='';
      order.forEach(function(c){
        html+='<div class="grp">🏢 '+esc(c)+'<span class="cnt">'+groups[c].length+'</span></div>';
        html+=groups[c].map(cardBoard).join('');
      });
      $('list').innerHTML=html; CACHE.board=html;
    }).catch(function(e){ if(!silent) listEmpty(e.message); });
  }

  function cardBoard(t){
    var h='<div class="bcard"><div class="row1"><span class="no">'+esc(t.no)+'</span>'+
      '<span class="badge '+badgeClass(t.status)+'">'+esc(t.status)+'</span></div>'+
      (t.detail?'<div class="detail">'+esc(t.detail)+'</div>':'')+
      '<div class="assignee'+(t.assignee?'':' none')+'">👤 '+(t.assignee?esc(t.assignee):'ยังไม่มอบหมาย')+'</div>';
    var btns=[];
    if(t.mine && t.status.indexOf('เสร็จ')<0){
      if(t.status.indexOf('กำลังทำ')<0 && t.status.indexOf('รอตรวจ')<0)
        btns.push('<button class="btn btn-p" onclick="doDoing(\''+esc(t.no)+'\')">🔵 รับงาน</button>');
      btns.push('<button class="btn btn-g" onclick="openSubmit(\''+esc(t.no)+'\')">📤 ส่งตรวจ</button>');
    } else if(t.unassigned && ROLE.isTeam){
      btns.push('<button class="btn btn-p" onclick="doClaim(\''+esc(t.no)+'\')">🙋 รับงานนี้</button>');
    }
    if(btns.length) h+='<div class="acts">'+btns.join('')+'</div>';
    return h+'</div>';
  }

  function doClaim(no){
    askConfirm('รับงาน '+no+' มาทำเองเลยไหมคะ?', function(){
      toast('กำลังรับงาน…');
      jsonp({action:'waClaim', uid:UID, no:no}).then(function(r){
        if(!r||!r.ok){ toast((r&&r.error)||'ไม่สำเร็จ'); return; } toast('🙋 รับงานแล้ว (แจ้งพี่กี้ให้อัตโนมัติ)'); loadBoard(true);
      }).catch(function(e){ toast(e.message); });
    });
  }

  // ───── กล่องยืนยันในหน้า (confirm ของเบราว์เซอร์ถูก LIFF บล็อก) ─────
  function askConfirm(msg, onYes){
    var m=document.createElement('div'); m.className='mask'; m.id='confirmMask';
    m.innerHTML='<div class="sheet"><div class="sub" style="font-size:15px;margin-bottom:14px">'+esc(msg)+'</div>'+
      '<div class="acts"><button class="btn btn-s" onclick="closeConfirm()">ยกเลิก</button>'+
      '<button class="btn btn-p" id="confirmYes">ตกลง</button></div></div>';
    document.body.appendChild(m);
    $('confirmYes').onclick=function(){ closeConfirm(); onYes(); };
  }
  function closeConfirm(){ var m=$('confirmMask'); if(m) m.parentNode.removeChild(m); }

  // ───── actions ─────
  function doDoing(no){
    toast('กำลังรับงาน…');
    jsonp({action:'waTaskDoing', uid:UID, no:no}).then(function(r){
      if(!r||!r.ok){ toast((r&&r.error)||'ไม่สำเร็จ'); return; } toast('รับงานแล้ว 🔵'); reloadCurrent();
    }).catch(function(e){ toast(e.message); });
  }
  function doAssign(no){
    var name=$('sel_'+no).value;
    if(!name){ toast('เลือกชื่อทีมก่อนค่ะ'); return; }
    toast('กำลังมอบหมาย…');
    jsonp({action:'waAssign', uid:UID, no:no, name:name}).then(function(r){
      if(!r||!r.ok){ toast((r&&r.error)||'ไม่สำเร็จ'); return; }
      toast(r.notified?('มอบหมาย '+name+' + แจ้ง LINE แล้ว'):(r.warn||'มอบหมายแล้ว')); loadAll(true);
    }).catch(function(e){ toast(e.message); });
  }
  function doSend(no){
    askConfirm('ส่งผลงานงาน '+no+' ให้ลูกค้าใน LINE เลยไหม?', function(){
      toast('กำลังส่งให้ลูกค้า…');
      jsonp({action:'waSendCustomer', uid:UID, no:no}).then(function(r){
        if(!r||!r.ok){ toast((r&&r.error)||'ส่งไม่สำเร็จ'); return; } toast('✅ ส่งให้ลูกค้าแล้ว'); loadAll(true);
      }).catch(function(e){ toast(e.message); });
    });
  }

  // ───── modal ส่งงานให้ตรวจ ─────
  function openSubmit(no){
    var m=document.createElement('div'); m.className='mask'; m.id='submitMask';
    m.innerHTML='<div class="sheet"><h3>📤 ส่งงานให้ตรวจ — '+esc(no)+'</h3>'+
      '<div class="sub">กรอกลิงก์งาน + คำอธิบายถึงลูกค้า แล้วพี่กี้จะตรวจก่อนส่งต่อ</div>'+
      '<div id="subErr" class="err hide"></div>'+
      '<div class="fld"><label>ลิงก์งาน (Google Drive/Docs)</label><input id="f_link" placeholder="วางลิงก์…"></div>'+
      '<div class="fld"><label>คำอธิบายถึงลูกค้า</label><textarea id="f_desc" placeholder="สรุปงานที่ทำ…"></textarea></div>'+
      '<div class="fld"><label>โน้ตภายใน (พี่เห็นคนเดียว · ไม่บังคับ)</label><textarea id="f_note" placeholder="ฝากถึงพี่กี้…"></textarea></div>'+
      '<div class="acts"><button class="btn btn-s" onclick="closeSubmit()">ยกเลิก</button>'+
      '<button class="btn btn-g" onclick="submitWork(\''+esc(no)+'\')">ส่งให้ตรวจ</button></div></div>';
    document.body.appendChild(m);
  }
  function closeSubmit(){ var m=$('submitMask'); if(m) m.parentNode.removeChild(m); }
  function submitWork(no){
    var link=$('f_link').value.trim(), desc=$('f_desc').value.trim(), note=$('f_note').value.trim();
    if(!link && !desc){ var e=$('subErr'); e.textContent='⚠️ กรอกลิงก์งาน หรือคำอธิบาย อย่างน้อย 1 ช่อง'; e.classList.remove('hide'); return; }
    jsonp({action:'waTaskSubmit', uid:UID, no:no, link:link, desc:desc, note:note}).then(function(r){
      if(!r||!r.ok){ var e=$('subErr'); e.textContent='⚠️ '+((r&&r.error)||'ส่งไม่สำเร็จ'); e.classList.remove('hide'); return; }
      closeSubmit(); toast('📤 ส่งให้พี่กี้ตรวจแล้ว'); reloadCurrent();
    }).catch(function(err){ var e=$('subErr'); e.textContent='⚠️ '+err.message; e.classList.remove('hide'); });
  }

  // ───── modal เปิดงานใหม่ (ทีมสร้างเอง → งานของฉัน) ─────
  function openCreate(){
    var opts='<option value="">— ไม่ระบุลูกค้า —</option>'+CUSTOMERS.map(function(c){return '<option value="'+esc(c)+'">'+esc(c)+'</option>';}).join('');
    var m=document.createElement('div'); m.className='mask'; m.id='createMask';
    m.innerHTML='<div class="sheet"><h3>➕ เปิดงานใหม่</h3>'+
      '<div class="sub">งานนี้จะเป็นของคุณ (สถานะกำลังทำ) และแจ้งพี่กี้อัตโนมัติ</div>'+
      '<div id="crErr" class="err hide"></div>'+
      '<div class="fld"><label>ลูกค้า (ไม่บังคับ)</label><select id="c_cust">'+opts+'</select></div>'+
      '<div class="fld"><label>รายละเอียดงาน *</label><textarea id="c_detail" placeholder="งานที่จะทำ…"></textarea></div>'+
      '<div class="fld"><label>หัวข้อ (ไม่บังคับ · เว้นว่าง = ตัดจากรายละเอียดให้)</label><input id="c_title" placeholder="หัวข้อสั้นๆ…"></div>'+
      '<div class="fld"><label>กำหนดเสร็จ (ไม่บังคับ)</label><input id="c_due" type="date"></div>'+
      '<div class="acts"><button class="btn btn-s" onclick="closeCreate()">ยกเลิก</button>'+
      '<button class="btn btn-p" onclick="submitCreate()">เปิดงาน</button></div></div>';
    document.body.appendChild(m);
  }
  function closeCreate(){ var m=$('createMask'); if(m) m.parentNode.removeChild(m); }
  function submitCreate(){
    var customer=$('c_cust').value, detail=$('c_detail').value.trim(), title=$('c_title').value.trim(), due=$('c_due').value;
    if(!detail){ var e=$('crErr'); e.textContent='⚠️ กรอกรายละเอียดงานก่อนค่ะ'; e.classList.remove('hide'); return; }
    jsonp({action:'waTeamCreate', uid:UID, customer:customer, detail:detail, title:title, due:due}).then(function(r){
      if(!r||!r.ok){ var e=$('crErr'); e.textContent='⚠️ '+((r&&r.error)||'เปิดงานไม่สำเร็จ'); e.classList.remove('hide'); return; }
      closeCreate(); toast('➕ เปิดงาน '+r.no+' แล้ว (แจ้งพี่กี้ให้อัตโนมัติ)'); loadMine(true);
    }).catch(function(err){ var e=$('crErr'); e.textContent='⚠️ '+err.message; e.classList.remove('hide'); });
  }

  // ───── list helpers ─────
  function reloadCurrent(){ if(TAB==='board') loadBoard(true); else if(TAB==='all') loadAll(true); else loadMine(true); }
  function listLoading(){ $('list').innerHTML='<div class="loading"><div class="spin"></div>กำลังโหลด…</div>'; }
  function listEmpty(m){ $('list').innerHTML='<div class="empty">'+esc(m)+'</div>'; }

  // ───── init ─────
  function uidOverride(){ try{ return new URLSearchParams(location.search).get('uid')||''; }catch(e){ return ''; } }
  function start(){
    jsonp({action:'waBootstrap', uid:UID}).then(function(r){
      if(!r||!r.ok){ fatal((r&&r.error)||'โหลดข้อมูลไม่สำเร็จ'); return; }
      ROLE={isOwner:!!r.isOwner, isTeam:!!r.isTeam}; STATUSES=r.statuses||[];
      $('who').textContent=r.nick?('· '+r.nick):'';
      // แท็บตาม role — 🏢 ภาพรวม เห็นทุกคน · งานของฉัน=ทีม · งานทั้งหมด=พี่
      $('tabMine').classList.toggle('hide', !ROLE.isTeam);
      $('tabBoard').classList.toggle('hide', false);
      $('tabAll').classList.toggle('hide', !ROLE.isOwner);
      $('boot').classList.add('hide'); $('app').classList.remove('hide');
      switchTab(ROLE.isTeam ? 'mine' : 'board');
    }).catch(function(e){ fatal(e.message); });
  }
  (function init(){
    var ov=uidOverride();
    if(ov){ UID=ov; start(); return; }   // เทสนอกไลน์: ?uid=...
    liff.init({liffId:LIFF_ID}).then(function(){
      if(!liff.isLoggedIn()){ liff.login({redirectUri:location.href}); return; }
      return liff.getProfile().then(function(p){ UID=p.userId; start(); });
    }).catch(function(e){ fatal('เปิดผ่านไลน์ไม่สำเร็จ: '+(e.message||e)); });
  })();
</script>
</body>
</html>
