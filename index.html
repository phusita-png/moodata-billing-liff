<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moodata</title>
</head>
<body style="font-family:sans-serif;text-align:center;padding-top:40vh;color:#1B72E8">
  กำลังเปิด…
  <script>
    // Router LIFF อันเดียว — endpoint = โฟลเดอร์รากนี้
    // เปิดผ่าน liff.line.me/{id}?p=<page>&... → redirect ไปหน้าจริง (คง query ที่เหลือ)
    (function () {
      var q = new URLSearchParams(location.search);
      var p = (q.get('p') || 'team-app').toLowerCase();
      var MAP = {
        // งาน + ข้อมูลส่วนตัว → เว็บแอปทีมตัวใหม่ (SPA สไตล์ดิเอลฟ์)
        'team': 'user-app.html', 'team-app': 'user-app.html', 'work': 'user-app.html',
        'me': 'user-app.html', 'user': 'user-app.html', 'personal': 'user-app.html',
        'oldteam': 'team-app.html',   // ของเดิม (เครื่องมือ owner: ภาพรวม/อนุมัติ) เผื่อเรียกใช้
        'appt': 'appointment.html', 'appointment': 'appointment.html',
        'board': 'board.html',
        // Face Scan เฟส 2.1 — ลงทะเบียนใบหน้า / ลงเวลาสแกนหน้า
        'enroll': 'face-enroll.html', 'face-enroll': 'face-enroll.html',
        'clock': 'face-clock.html', 'face-clock': 'face-clock.html', 'face': 'face-clock.html'
      };
      var target = MAP[p] || 'user-app.html';
      // คง p ไว้ให้หน้าปลายทางอ่านต่อ (user-app ใช้เลือก view เริ่ม: work→งานของฉัน, me→ลา) [v2]
      // + cache-bust (v=เวลา) กัน LINE/เบราว์เซอร์ cache ไฟล์เก่า → โหลดรุ่นล่าสุดเสมอ
      var rest = q.toString();
      location.replace(target + '?v=' + Date.now() + (rest ? '&' + rest : ''));
    })();
  </script>
</body>
</html>
