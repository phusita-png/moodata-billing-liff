      ((IS_OWNER||t.assignee===BOWNER)&&t.hasGroup&&!bDone(t)?'<button class="btn btn-ok" onclick="bSendCust(\''+esc(no)+'\')">📨 ส่งลูกค้า</button>':'')+   // ทีมส่งได้เฉพาะงานตัวเอง
      '<button class="btn btn-ghost" onclick="closeModal()">ปิด</button></div>'+
      (t.status.indexOf('ยกเลิก')<0?'<button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="bOpenTransfer(\''+esc(no)+'\')">🔄 โอนงานให้คนอื่น</button>':'')+
      (!bDone(t)&&t.status.indexOf('ยกเลิก')<0?'<button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="bOpenReturn(\''+esc(no)+'\')">🔁 ส่งกลับให้ทีมแก้ไข</button>':'')+
      (IS_OWNER&&t.status.indexOf('ยกเลิก')<0?'<button class="btn btn-ghost" style="width:100%;margin-top:8px;color:#DC2626" onclick="bOpenCancel(\''+esc(no)+'\')">❌ ยกเลิกงาน</button>':''));   // กฎเหล็ก: ยกเลิก=ลบ → พี่เท่านั้น
  }
  function bSaveTask(no){
    var t=bFind(no); if(!t) return;
    var title=$('mTitle').value.trim(), st=$('mStatus').value, asg=$('mAsg').value, rev=$('mRev').value, cat=$('mCat').value, due=$('mDue').value;
    var jobs=[];
    if(title!==(t.title||'')) jobs.push(jsonp({action:'waSetTitle',uid:UID,no:no,title:title}));
    if(st!==t.status) jobs.push(jsonp({action:'waSetStatus',uid:UID,no:no,status:st}));
    if(asg!==(t.assignee||'')) jobs.push(jsonp({action:'waAssign',uid:UID,no:no,name:asg||' '}));
    if(rev!==(t.reviewer||'')) jobs.push(jsonp({action:'waSetReviewer',uid:UID,no:no,reviewer:rev}));
    if(bCat(cat).k!==bCat(t.category).k) jobs.push(jsonp({action:'waSetCategory',uid:UID,no:no,category:cat}));   // เทียบด้วย key (สั่งงาน↔แจ้งงาน = ไม่เปลี่ยน)
    var curDue=t.dueMs?bIso(t.dueMs):'';
    if(due!==curDue) jobs.push(jsonp({action:'waSetDue',uid:UID,no:no,due:due}));
    var pj=$('mProject')?$('mProject').value:(t.project||'');
    if(pj!=='__new__' && pj!==(t.project||'')) jobs.push(jsonp({action:'waAssignProject',uid:UID,no:no,pid:pj}));   // จัดงานเข้า/ออก project
    var cust=$('mCust')?$('mCust').value.trim():(t.customer||''); if(cust!==(t.customer||'')) jobs.push(jsonp({action:'waSetCustomer',uid:UID,no:no,customer:cust}));   // ทีม+พี่ แก้ลูกค้าได้
    var wl=wlCollect(); if(wl!==String(t.worklink||'').trim()) jobs.push(jsonpPost({action:'waSetWorkLink',uid:UID,no:no,worklink:wl}));   // POST กันลิงก์หลายอันยาวเกิน URL
    if(!jobs.length){ closeModal(); return; }
    toast('กำลังบันทึก…');
    Promise.all(jobs).then(function(){ closeModal(); toast('บันทึกแล้ว ✅'); renderOwnerBoard(BSCOPE, true); }).catch(function(e){ mErr(e.message); });
  }
  // เลือก project ใน modal งาน — ถ้าเลือก "สร้างใหม่" → เปิดฟอร์มสร้าง+จัดเข้าเลย
  function bProjSel(no){ if($('mProject') && $('mProject').value==='__new__'){ closeModal(); bNewProjectInline(no); } }
  function bNewProjectInline(no){
    modal('<h3>➕ สร้าง Project</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="fld"><label>ชื่อ Project</label><input id="npName" placeholder="เช่น ปิดบัญชี Q3, งานอีเวนต์ลูกค้า A"></div>'+
      '<div class="m-hint">งาน '+esc(no)+' จะถูกจัดเข้า project นี้ทันที · เพิ่มงานอื่นเข้าทีหลังได้</div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="bOpenTask(\''+esc(no)+'\')">← กลับ</button>'+
      '<button class="btn btn-primary" onclick="bDoNewProject(\''+esc(no)+'\')">สร้าง + จัดงานเข้า</button></div>');
  }
  function bDoNewProject(no){
    var name=$('npName').value.trim();
    if(!name){ mErr('กรอกชื่อ project ก่อนค่ะ'); return; }
    toast('กำลังสร้าง project…');
    jsonp({action:'waProjectSave',uid:UID,id:'',name:name}).then(function(r){
      if(!r||!r.ok||!r.id) throw new Error((r&&r.error)||'สร้างไม่สำเร็จ');
      return jsonp({action:'waAssignProject',uid:UID,no:no,pid:r.id});
    }).then(function(r2){
      if(!r2||!r2.ok) throw new Error((r2&&r2.error)||'จัดงานเข้าไม่สำเร็จ');
      closeModal(); toast('✅ สร้าง + จัดงาน '+no+' เข้า project แล้ว'); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  // สร้าง project เปล่า (จากการ์ด "สร้าง Project")
  function bNewProject(){
    modal('<h3>➕ สร้าง Project</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="fld"><label>ชื่อ Project</label><input id="npName" placeholder="เช่น ปิดบัญชี Q3, งานอีเวนต์ลูกค้า A"></div>'+
      '<div class="fld"><label>ลูกค้า <span class="bd-age">(ถ้ามี · เว้นว่างได้ · เลือก/พิมพ์)</span></label><input id="npCust" list="dlNpCust" autocomplete="off" placeholder="เลือกหรือพิมพ์ชื่อลูกค้า">'+custDatalist('dlNpCust')+'</div>'+
      '<div class="m-hint">สร้างแล้วไปจัดงานเข้า project นี้ได้ที่การ์ดงาน (📁 จัดเข้า Project) หรือกรองดูจากตัวกรอง Project</div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="bDoCreateProject()">สร้าง Project</button></div>');
  }
  function bDoCreateProject(){
    var name=$('npName').value.trim();
    if(!name){ mErr('กรอกชื่อ project ก่อนค่ะ'); return; }
    toast('กำลังสร้าง project…');
    jsonp({action:'waProjectSave',uid:UID,id:'',name:name,customer:$('npCust').value.trim()}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'สร้างไม่สำเร็จ'); return; }
      closeModal(); toast('✅ สร้าง project แล้ว'); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  function bSendCust(no){
    toast('กำลังส่งให้ลูกค้า…');
    jsonp({action:'waSendCustomer',uid:UID,no:no}).then(function(r){ if(!r||!r.ok){ mErr((r&&r.error)||'ส่งไม่สำเร็จ'); return; } closeModal(); toast('✅ ส่งให้ลูกค้าแล้ว'); renderOwnerBoard(BSCOPE, true); }).catch(function(e){ mErr(e.message); });
  }
  function bOpenReturn(no){
    modal('<h3>🔁 ส่งกลับให้แก้ไข · '+esc(no)+'</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="m-hint">งานจะกลับไปสถานะ 🔵 กำลังทำ + แจ้งผู้รับผิดชอบทาง LINE พร้อมสิ่งที่ต้องแก้</div>'+
      '<div class="fld"><label>สิ่งที่ต้องแก้ไข *</label><textarea id="rNote" placeholder="เช่น แก้สีโลโก้ให้เข้มขึ้น, เพิ่มเบอร์ท้ายโพสต์…"></textarea></div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="bDoReturn(\''+esc(no)+'\')">🔁 ส่งกลับแก้ไข</button></div>');
  }
  function bDoReturn(no){
    var note=$('rNote').value.trim();
    if(!note){ mErr('ระบุสิ่งที่ต้องแก้ไขก่อนค่ะ'); return; }
    toast('กำลังส่งกลับ…');
    jsonpPost({action:'waTaskReturn',uid:UID,no:no,note:note}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'ส่งกลับไม่สำเร็จ'); return; }
      closeModal(); toast('🔁 ส่งกลับให้ '+(r.assignee||'ทีม')+' แก้ไขแล้ว'); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  // โอนงาน (บอร์ด owner) — เลือกคนใหม่ → waAssign (แจ้ง LINE คนใหม่อัตโนมัติ)
  function bOpenTransfer(no){
    var t=bFind(no); if(!t) return;
    var opts='<option value="">— เลือกคนรับงาน —</option>'+BTEAM.map(function(mm){var n=mm.name;return '<option value="'+esc(n)+'"'+(n===t.assignee?' selected':'')+'>'+esc(n+(mm.nick&&mm.nick!==mm.name?' ('+mm.nick+')':''))+'</option>';}).join('');
    modal('<h3>🔄 โอนงาน '+esc(no)+'</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="m-hint">เลือกคนรับงานใหม่ → ระบบเปลี่ยนผู้รับผิดชอบ + แจ้ง LINE ให้เขาทันที</div>'+
      '<div class="fld"><label>โอนให้</label><select id="mtAsg">'+opts+'</select></div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="bDoTransfer(\''+esc(no)+'\')">🔄 โอนงาน</button></div>');
  }
  function bDoTransfer(no){
    var name=$('mtAsg').value;
    if(!name){ mErr('เลือกคนรับงานก่อนค่ะ'); return; }
    toast('กำลังโอนงาน…');
    jsonp({action:'waAssign',uid:UID,no:no,name:name}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'โอนไม่สำเร็จ'); return; }
      closeModal(); toast('🔄 โอนงานให้ '+(r.assignee||name)+' แล้ว'+(r.notified?' (แจ้ง LINE ให้)':'')); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  // ยกเลิกงาน (บอร์ด owner) — ยืนยันในหน้า (เลี่ยง confirm() ที่ LIFF บล็อก) → waCancel
  function bOpenCancel(no){
    modal('<h3>❌ ยกเลิกงาน '+esc(no)+'</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="m-hint">งานจะถูกตั้งสถานะเป็น ❌ ยกเลิก และไม่นับในสรุป · ย้อนได้ภายหลังโดยเปลี่ยนสถานะกลับ</div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ไม่ยกเลิก</button>'+
      '<button class="btn btn-danger" onclick="bDoCancel(\''+esc(no)+'\')">❌ ยืนยันยกเลิกงาน</button></div>');
  }
  function bDoCancel(no){
    toast('กำลังยกเลิก…');
    jsonp({action:'waCancel',uid:UID,no:no}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'ยกเลิกไม่สำเร็จ'); return; }
      closeModal(); toast('❌ ยกเลิกงาน '+no+' แล้ว'); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  // รายชื่อลูกค้าสำหรับ datalist — รวมจากชีตกลุ่มลูกค้า (CUSTOMERS) + บริษัท auto (COMPANIES) + บริษัทที่มีงานอยู่ (BALL) · dedupe + เรียง
  function custOptions(){
    var set={}, out=[];
    function add(a){ (a||[]).forEach(function(c){ c=String(c||'').trim(); if(c && !set[c]){ set[c]=1; out.push(c); } }); }
    add(CUSTOMERS); add(COMPANIES);
    try{ add(bCustomers()); }catch(e){}
    return out.sort(function(a,b){ return a.localeCompare(b,'th'); });
  }
  function custDatalist(id){ return '<datalist id="'+id+'">'+custOptions().map(function(c){ return '<option value="'+esc(c)+'">'; }).join('')+'</datalist>'; }
  function bOpenCreate(){
    var asgOpts='<option value="">— ยังไม่มอบหมาย —</option>'+BTEAM.map(function(mm){return '<option value="'+esc(mm.name)+'">'+esc(mm.name)+'</option>';}).join('');
    var catOpts=BCATS_EDIT.map(function(o){return '<option value="'+esc(o.v)+'">'+o.lb+'</option>';}).join('');
    var pjOpts='<option value="">— ไม่ผูก project —</option>'+BPROJECTS.map(function(pp){return '<option value="'+esc(pp.id)+'">📁 '+esc(pp.name)+'</option>';}).join('');
    modal('<h3>+ เปิดงานใหม่</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="fld"><label>ประเภท <span class="bd-age">(กำหนดสีการ์ด)</span></label><select id="cbCat">'+catOpts+'</select></div>'+
      '<div class="fld"><label>หัวข้องาน <span class="bd-age">(เว้นว่าง = ตัดจากรายละเอียด)</span></label><input id="cbTitle" placeholder="หัวข้อสั้น ๆ"></div>'+
      '<div class="fld"><label>ลูกค้า/บริษัท <span class="bd-age">(เลือกจากรายชื่อ หรือพิมพ์ใหม่)</span></label><input id="cbCust" list="dlCbCust" autocomplete="off" placeholder="เลือกหรือพิมพ์ชื่อลูกค้า">'+custDatalist('dlCbCust')+'</div>'+
      '<div class="fld"><label>📁 จัดเข้า Project <span class="bd-age">(ไม่บังคับ · กองงานเป็นกลุ่ม)</span></label><select id="cbProject">'+pjOpts+'</select></div>'+
      '<div class="fld"><label>รายละเอียดงาน</label><textarea id="cbDetail" placeholder="สิ่งที่ต้องทำ…"></textarea></div>'+
      '<div class="fld"><label>ผู้รับผิดชอบ</label><select id="cbAsg">'+asgOpts+'</select></div>'+
      '<div class="fld"><label>กำหนดเสร็จ</label><input id="cbDue" type="date"></div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="bCreateTask()">สร้างงาน</button></div>');
  }
  function bCreateTask(){
    var cust=$('cbCust').value.trim(), detail=$('cbDetail').value.trim();
    if(!cust && !detail){ mErr('กรอกลูกค้าหรือรายละเอียดอย่างน้อย 1 ช่อง'); return; }
    toast('กำลังเปิดงาน…');
    jsonpPost({action:'waCreateTask',uid:UID,title:$('cbTitle').value.trim(),customer:cust,detail:detail,category:$('cbCat').value,assignee:$('cbAsg').value,due:$('cbDue').value,project:($('cbProject')?$('cbProject').value:'')}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'สร้างไม่สำเร็จ'); return; } closeModal(); toast('เปิดงานใหม่แล้ว '+(r.no||'')); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  window.bSetView=bSetView; window.bCalMove=bCalMove; window.bOpenTask=bOpenTask; window.bSaveTask=bSaveTask;
  window.bSendCust=bSendCust; window.bOpenReturn=bOpenReturn; window.bDoReturn=bDoReturn; window.bOpenCreate=bOpenCreate; window.bCreateTask=bCreateTask;
  window.bOpenTransfer=bOpenTransfer; window.bDoTransfer=bDoTransfer;
  window.bOpenCancel=bOpenCancel; window.bDoCancel=bDoCancel;

  // ───── init ─────
  // รวม param จาก query ตรง + liff.state (LIFF บางครั้งห่อ query เดิมไว้ใน liff.state)
  function allParams(){
    var out={};
    try{
      var sp=new URLSearchParams(location.search);
      sp.forEach(function(v,k){ out[k]=v; });
      var st=sp.get('liff.state');
      if(st){ var inner=new URLSearchParams(st.charAt(0)==='?'?st.slice(1):st);
        inner.forEach(function(v,k){ if(out[k]==null) out[k]=v; }); }
    }catch(e){}
    return out;
  }
  function startParam(){ return String(allParams().p||'').toLowerCase(); }
  function uidOverride(){ try{ return new URLSearchParams(location.search).get('uid')||''; }catch(e){ return ''; } }
  function start(){
    jsonp({action:'waBootstrap', uid:UID}).then(function(r){
      if(!r||!r.ok){ fatal((r&&r.error)||'โหลดข้อมูลไม่สำเร็จ'); return; }
      NICK=r.nick||''; if(NICK){ $('hdSub').textContent=NICK; }
      IS_OWNER=!!r.isOwner;
      if(IS_OWNER){ var nr=$('navReview'); if(nr) nr.style.display='';      // แท็บรอตรวจ = เฉพาะพี่/ผู้ตรวจ
        var ne=$('navExpAppr'); if(ne) ne.style.display='';                 // แท็บอนุมัติเบิกจ่าย = เฉพาะพี่
        var nb=$('navReimb'); if(nb) nb.style.display=''; }                 // แท็บตั้งเบิกลูกค้า = เฉพาะพี่
      $('loader').classList.add('hidden'); $('app').classList.remove('hidden');
      Array.prototype.forEach.call(document.querySelectorAll('.nav-btn'), function(b){
        b.addEventListener('click', function(){ switchView(b.dataset.view); }); });
      var sp=startParam();
      var startView = sp==='docs' ? 'docs' : (sp==='work' ? 'projects' : (sp==='expense' ? 'expense' :
        ((sp==='approve'||sp==='expapprove') && IS_OWNER ? sp : 'leave')));   // ลิงก์จาก Google Chat/แชท → เปิดแท็บตรง
      switchView(startView);   // switchView → mSyncNav สร้างเมนูกลุ่มล่าง + แท็บบนให้เอง
      // อุ่นแคชเบื้องหลัง → คลิกการลา/เอกสารครั้งแรกเด้งทันที (ไม่แย่งจอแรกโหลด)
      setTimeout(function(){ if(!LVCACHE.data) _leaveFetch(true); if(IDTOKEN && !DOCCACHE.data) _docsFetch(true); if(!APPT_CUST.length) apFetchMeta(); if(!ANNOUNCE_GROUPS.length) anFetchGroups(); }, 900);
    }).catch(function(e){ fatal(e.message); });
  }
  (function init(){
    // Face Scan: LIFF endpoint ชี้มาที่ user-app → เด้งต่อไปหน้าสแกนหน้า/ลงทะเบียน (คง kind)
    var _pp=allParams(), _p=String(_pp.p||'').toLowerCase();
    if(_p==='clock'||_p==='face'||_p==='face-clock'||_p==='enroll'||_p==='face-enroll'){
      var _t=(_p==='enroll'||_p==='face-enroll') ? 'face-enroll.html' : 'face-clock.html';
      location.replace(_t + (_pp.kind ? '?kind='+encodeURIComponent(_pp.kind) : '')); return;
    }
    var ov=uidOverride();
    if(ov){ UID=ov; start(); return; }
    liff.init({liffId:LIFF_ID}).then(function(){
      if(!liff.isLoggedIn()){ liff.login({redirectUri:location.href}); return; }
      try{ IDTOKEN=liff.getIDToken()||''; }catch(e){ IDTOKEN=''; }
      return liff.getProfile().then(function(pf){ UID=pf.userId;
        if(pf.pictureUrl){ $('avatar').innerHTML='<img src="'+pf.pictureUrl+'" alt="">'; $('tbAvatar').innerHTML='<img src="'+pf.pictureUrl+'" alt="">'; }
        start(); });
    }).catch(function(e){ fatal('เปิดผ่านไลน์ไม่สำเร็จ: '+(e.message||e)); });
  })();
</script>
</body>
</html>
