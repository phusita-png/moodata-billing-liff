<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Moodata · ทีม</title>
<meta name="theme-color" content="#1B72E8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="user.css?v=11">
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  /* Moodata เพิ่มเติมจาก CSS ดิเอลฟ์ (date input + badge สถานะลา) */
  .date-row{ display:flex; flex-direction:column; gap:14px; margin:4px 0 12px; } .date-row > div{ min-width:0; }
  .date-row .field-lb{ display:block; margin:0 0 6px; }
  input[type=date]{ width:100%; box-sizing:border-box; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px;
    font-family:inherit; font-size:15px; background:#fff; color:var(--ink); }
  input[type=date]:focus{ outline:none; border-color:var(--red); }
  .lvb{ margin-left:auto; font-size:12px; padding:3px 11px; border-radius:999px; font-weight:600; white-space:nowrap; }
  .lvb-wait{ background:var(--ot-tint); color:var(--ot); } .lvb-ok{ background:var(--green-tint); color:var(--green); }
  .lvb-no{ background:#fbe7e7; color:#c0392b; }
  .soon-wrap{ text-align:center; padding:48px 22px; color:var(--muted); }
  .soon-wrap .e-emo{ font-size:40px; margin-bottom:10px; }
  /* งาน (task card) */
  .tk{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:14px 16px; margin-bottom:12px; }
  .tk-top{ display:flex; align-items:center; gap:8px; }
  .tk-no{ font-weight:700; color:var(--red); font-size:14px; }
  .tk-badge{ margin-left:auto; font-size:12px; padding:3px 10px; border-radius:999px; font-weight:600; white-space:nowrap; }
  .b-new{ background:#EEF1F6; color:#5B6472; } .b-doing{ background:#E3EEFD; color:#1B72E8; }
  .b-review{ background:#FDF0E1; color:#C87F1E; } .b-done{ background:#E4F5EA; color:#1E9E5A; }
  .b-cancel{ background:#FCE7E7; color:#D14343; }
  .ex-amt{ font-size:15px; font-weight:700; color:#1F2733; margin-top:6px; }
  .ex-amt .ex-t{ font-weight:600; color:#4A5262; }
  .ex-meta{ font-size:12px; color:var(--muted); margin-top:8px; }
  .ex-lk{ color:var(--red); text-decoration:none; margin-right:12px; white-space:nowrap; }
  .m-hint{ font-size:12.5px; color:var(--muted); background:#F4F7FB; border-radius:10px; padding:9px 11px; margin:4px 0 12px; line-height:1.5; }
  .tk-cust{ font-weight:600; margin-top:8px; } .tk-cat{ font-size:12px; color:var(--muted); }
  .tk-detail{ font-size:14px; color:#4A5262; margin-top:6px; white-space:pre-wrap; }
  .tk-kv{ font-size:13px; margin-top:8px; } .tk-kv b{ color:var(--muted); font-weight:500; }
  .tk-kv a{ color:var(--red); word-break:break-all; }
  .tk-asg{ font-size:13px; color:#4A5262; margin-top:8px; } .tk-asg.none{ color:#C87F1E; }
  .tk-acts{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .tk-acts .btn{ flex:1; min-width:120px; font-size:14px; padding:9px 12px; }
  .btn-ok{ background:var(--green); color:#fff; } .btn-ghost{ background:#EEF1F6; color:#333; }
  .grp-h{ display:flex; align-items:center; gap:8px; margin:16px 2px 9px; font-weight:700; font-size:15px; }
  .grp-h .cnt{ font-size:12px; font-weight:600; color:#fff; background:var(--red); border-radius:999px; padding:1px 9px; }
  .grp-h .cnt.warn{ background:#DC2626; }
  .grp-h:first-child{ margin-top:2px; }
  /* แถบสรุปตามสถานะ */
  .sumbar{ display:flex; gap:8px; overflow-x:auto; padding-bottom:12px; -webkit-overflow-scrolling:touch; }
  .scard{ flex:0 0 auto; min-width:78px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:8px 12px; text-align:center; }
  .scard b{ display:block; font-size:20px; line-height:1.15; }
  .scard span{ font-size:11px; color:var(--muted); white-space:nowrap; }
  .scard.all b{ color:var(--red); } .scard.doing b{ color:#1B72E8; } .scard.new b{ color:#5B6472; }
  .scard.review b{ color:#C87F1E; } .scard.done b{ color:#1E9E5A; } .scard.over b{ color:#DC2626; }
  .scard.over{ border-color:#F5C2C2; background:#FEF2F2; }
  /* หัวราย บ. + บาร์ความสำเร็จ */
  .boardhead{ font-size:13px; font-weight:600; color:#4A5262; margin:2px 2px 12px; }
  .pwrap{ margin:0 2px 12px; }
  .pmeta{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:5px; }
  .pmeta .over{ color:#DC2626; font-weight:700; margin-left:auto; }
  .pbar{ height:8px; border-radius:999px; background:#EDF1F7; overflow:hidden; }
  .pfill{ height:100%; border-radius:999px; background:#1E9E5A; transition:width .3s; }
  .pbar.over .pfill{ background:#DC2626; }
  /* modal */
  .mask{ position:fixed; inset:0; background:rgba(20,28,40,.5); display:flex; align-items:flex-end; justify-content:center; z-index:60; }
  .sheet{ background:#fff; width:100%; max-width:520px; border-radius:18px 18px 0 0;
    padding:20px 18px calc(24px + env(safe-area-inset-bottom)); max-height:90vh; overflow:auto; }
  @media(min-width:860px){ .mask{ align-items:center; } .sheet{ border-radius:18px; } }
  .sheet h3{ margin:0 0 14px; font-size:18px; }
  .fld{ margin-bottom:12px; } .fld label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
  .fld input,.fld textarea,.fld select{ width:100%; padding:11px 12px; border:1.5px solid var(--line);
    border-radius:12px; font-family:inherit; font-size:15px; background:#fff; color:var(--ink); }
  .fld textarea{ min-height:76px; resize:vertical; }
  .m-err{ background:#fbe7e7; color:#c0392b; padding:9px 12px; border-radius:9px; font-size:13px; margin-bottom:10px; }
  .m-act{ display:flex; gap:9px; margin-top:6px; } .m-act .btn{ flex:1; }
  /* โควต้าการลา 3 ช่อง — คงเหลือใหญ่กลาง · เต็มใหญ่สีแดงมุมล่าง */
  .qgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
  .qbox{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:14px 14px 14px; text-align:center; }
  .qbox-emo{ font-size:24px; line-height:1; }
  .qbox-num{ font-size:44px; font-weight:800; color:var(--red); line-height:1; margin:6px 0 3px; }
  .qbox-lb{ font-size:13px; font-weight:600; color:var(--muted); }
  .qbox-full{ font-size:15px; font-weight:700; color:#DC2626; margin-top:9px; padding-top:8px; border-top:1px dashed rgba(0,0,0,.09); }
  /* สีจางแยกประเภทลา — พักร้อนเขียว · ลากิจน้ำเงิน · ลาป่วยส้ม */
  .qbox.q-vac{ background:#EAF7F0; border-color:#BFE4D0; } .qbox.q-vac .qbox-num{ color:#168A52; }
  .qbox.q-biz{ background:#EAF2FE; border-color:#BDD8FB; } .qbox.q-biz .qbox-num{ color:#1B72E8; }
  .qbox.q-sick{ background:#FCF3E4; border-color:#ECD5AC; } .qbox.q-sick .qbox-num{ color:#B5710A; }
  /* ประเภทการลา — จัดคอลัมน์ให้ตรงกับโควต้า (3 ช่อง gap เท่ากัน) */
  #typeGrid.type-grid{ grid-template-columns:repeat(3,1fr); gap:12px; }
  /* ช่องเวลา (ราย ชม.) */
  .time-row{ display:flex; align-items:center; gap:10px; margin-top:8px; }
  .time-row input[type=time]{ flex:1; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px;
    font-family:inherit; font-size:15px; }
  .time-row .dash{ color:var(--muted); }
  /* หน้าเอกสาร: ชิปสลิป · รายการเอกสาร · สลิป modal */
  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .doc-chip{ background:var(--red-tint); color:var(--red-deep); border:1px solid var(--red-soft);
    border-radius:999px; padding:8px 16px; font-size:14px; font-weight:600; cursor:pointer; }
  .doc-chip:active{ background:var(--red-soft); }
  .doc-item{ display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--line);
    text-decoration:none; color:inherit; }
  .doc-item:last-child{ border-bottom:0; }
  .di-ic{ font-size:20px; } .di-main{ flex:1; display:flex; flex-direction:column; }
  .di-main small{ color:#8A93A3; font-size:12px; margin-top:2px; } .di-go{ color:#C3CAD6; font-size:22px; }
  .sl-net{ text-align:center; background:var(--red-tint); border-radius:12px; padding:10px; margin:6px 0 12px; font-size:15px; }
  .sl-net b{ font-size:24px; color:var(--red-deep); }
  .sl-sec{ font-size:13px; font-weight:700; color:#16A34A; margin:12px 0 4px; }
  .sl-row{ display:flex; justify-content:space-between; font-size:14px; padding:4px 0; color:#4A5262; }
  .sl-row.bold{ font-weight:700; color:#222; border-top:1px dashed var(--line); margin-top:4px; padding-top:8px; }
  .sl-ytd{ font-size:12px; color:#8A93A3; margin-top:12px; text-align:center; }
  /* มือถือจอแคบ — โควต้า 3 ช่องยังอยู่ แต่ย่อ font กันล้น */
  @media(max-width:430px){
    .qbox{ padding:12px 8px; } .qbox-num{ font-size:34px; } .qbox-emo{ font-size:20px; }
    .qbox-lb{ font-size:11px; } .qbox-full{ font-size:12px; margin-top:7px; padding-top:6px; }
  }

  /* ═══ บอร์ดจัดการงาน (เฉพาะพี่/owner) — scope #board-wrap กันชนกับ .card/.badge เดิม ═══ */
  #board-wrap{ --bd:#1B72E8; --bd2:#4A93F0; --bdink:#242B36; --bdmut:#8A94A6; --bdline:#DCE7F5;
    --bnew:#5B6472; --bdoing:#2D7FF9; --breview:#C87F1E; --bdone:#1E9E5A; --bover:#D6336C; }
  #board-wrap .bd-top{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  #board-wrap .bd-top .sp{ flex:1; }
  #board-wrap #bRange{ padding:9px 12px; border:1px solid var(--bdline); border-radius:10px; font-family:inherit; font-size:14px; background:#fff; color:var(--bdink); cursor:pointer; }
  #board-wrap .bd-btn{ border:none; border-radius:999px; padding:10px 18px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  #board-wrap .bd-p{ background:linear-gradient(120deg,var(--bd),var(--bd2)); color:#fff; box-shadow:0 4px 14px rgba(27,114,232,.3); }
  #board-wrap .bd-o{ background:#fff; color:var(--bdink); border:1px solid var(--bdline); }
  #board-wrap .bd-s{ background:#EAF1FB; color:var(--bdink); }
  #board-wrap .bd-g{ background:var(--bdone); color:#fff; }
  #board-wrap .bd-btn.sm{ padding:6px 12px; font-size:13px; }
  /* การ์ดสรุป */
  #board-wrap .bd-stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:14px; }
  #board-wrap .bd-stat{ background:#fff; border:1px solid var(--bdline); border-radius:16px; padding:15px 16px; box-shadow:0 4px 16px rgba(120,150,200,.10); }
  #board-wrap .bd-stat .lab{ font-size:13px; color:var(--bdmut); font-weight:600; display:flex; align-items:center; gap:6px; }
  #board-wrap .bd-stat .num{ font-size:28px; font-weight:700; margin-top:4px; line-height:1.1; }
  #board-wrap .bd-stat.all .num{ color:var(--bd); } #board-wrap .bd-stat.doing .num{ color:var(--bdoing); }
  #board-wrap .bd-stat.done .num{ color:var(--bdone); } #board-wrap .bd-stat.over .num{ color:var(--bover); }
  #board-wrap .bd-stat.new .num{ color:var(--bnew); } #board-wrap .bd-stat.review .num{ color:var(--breview); }
  @media(max-width:720px){ #board-wrap .bd-stats{ grid-template-columns:repeat(2,1fr); } }
  /* แท็บมุมมอง */
  #board-wrap .bd-views{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  #board-wrap .bd-vtab{ padding:7px 15px; border-radius:999px; background:#fff; border:1px solid var(--bdline); color:var(--bdmut); font-weight:600; font-size:14px; cursor:pointer; }
  #board-wrap .bd-vtab.active{ background:linear-gradient(120deg,var(--bd),var(--bd2)); color:#fff; border-color:transparent; }
  /* toolbar filter */
  #board-wrap .bd-tools{ display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
  #board-wrap .bd-tools select, #board-wrap .bd-tools input{ padding:9px 12px; border:1px solid var(--bdline); border-radius:10px; font-family:inherit; font-size:14px; background:#fff; color:var(--bdink); }
  #board-wrap .bd-tools .search{ flex:1; min-width:180px; }
  #board-wrap .bd-note{ background:#E7F1FD; color:#1B6FD0; padding:10px 16px; border-radius:12px; font-size:13px; margin-bottom:12px; }
  /* badge สถานะ */
  #board-wrap .bd-badge{ font-size:12px; padding:2px 9px; border-radius:999px; font-weight:600; white-space:nowrap; }
  #board-wrap .bb-new{ background:#EEF1F6; color:var(--bnew); } #board-wrap .bb-doing{ background:#E3EEFD; color:var(--bdoing); }
  #board-wrap .bb-review{ background:#FDF0E1; color:var(--breview); } #board-wrap .bb-done{ background:#E4F5EA; color:var(--bdone); }
  #board-wrap .bd-over{ color:var(--bover); font-weight:700; } #board-wrap .bd-age{ color:var(--bdmut); font-size:12px; }
  #board-wrap .bd-asg{ font-size:13px; color:#5A6472; } #board-wrap .bd-asg.none{ color:var(--breview); }
  /* ตาราง */
  #board-wrap .bd-tblwrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  #board-wrap table{ width:100%; border-collapse:collapse; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 6px 24px rgba(120,150,200,.14); min-width:640px; }
  #board-wrap th{ text-align:left; font-size:12px; color:var(--bdmut); font-weight:600; padding:13px 15px; border-bottom:1px solid var(--bdline); white-space:nowrap; }
  #board-wrap td{ padding:13px 15px; border-bottom:1px solid #F0F6FD; font-size:14px; vertical-align:top; }
  #board-wrap tr:last-child td{ border-bottom:none; }
  #board-wrap tr.brow:hover{ background:#F3F8FE; cursor:pointer; }
  #board-wrap .bd-tt{ font-weight:600; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  #board-wrap .bd-meta{ font-size:12px; color:var(--bdmut); margin-top:2px; }
  #board-wrap .bd-ord{ color:var(--bdmut); font-weight:600; text-align:center; }
  #board-wrap .bd-tid{ font-family:monospace; font-size:13px; color:var(--bd); font-weight:600; }
  /* การ์ดกริด */
  #board-wrap .bd-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }
  #board-wrap .bd-card{ background:#fff; border:1px solid var(--bdline); border-radius:14px; padding:13px; cursor:pointer; box-shadow:0 3px 12px rgba(120,150,200,.10); }
  #board-wrap .bd-card:hover{ box-shadow:0 6px 18px rgba(27,114,232,.16); }
  #board-wrap .bd-card .bd-tt{ font-size:14px; } #board-wrap .bd-card .cust{ font-size:12px; color:var(--bdmut); margin:4px 0 10px; }
  #board-wrap .bd-foot{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  /* คอลัมน์ (kanban) */
  #board-wrap .bd-kanban{ display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; align-items:flex-start; }
  #board-wrap .bd-kcol{ background:rgba(255,255,255,.7); border-radius:14px; padding:11px; min-width:260px; width:260px; flex:0 0 auto; }
  #board-wrap .bd-kcol h3{ margin:0 0 9px; font-size:14px; display:flex; align-items:center; gap:8px; }
  #board-wrap .bd-kcol h3 .cnt{ margin-left:auto; font-size:12px; color:var(--bdmut); }
  #board-wrap .bd-kcard{ background:#fff; border:1px solid var(--bdline); border-radius:12px; padding:10px 11px; margin-bottom:8px; cursor:pointer; }
  #board-wrap .bd-kcard .bd-tt{ font-size:13px; } #board-wrap .bd-kcard .cust{ font-size:12px; color:var(--bdmut); margin:2px 0 6px; }
  #board-wrap .bd-dot{ width:9px;height:9px;border-radius:50%;display:inline-block;flex:0 0 auto; }
  /* ปฏิทินงาน */
  #board-wrap .bd-calnav{ display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:12px; }
  #board-wrap .bd-calnav b{ font-size:16px; }
  #board-wrap .bd-cal{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  #board-wrap .bd-cal .dow{ text-align:center; font-size:12px; color:var(--bdmut); padding:4px; }
  #board-wrap .bd-cell{ background:#fff; border:1px solid var(--bdline); border-radius:10px; min-height:84px; padding:6px; }
  #board-wrap .bd-cell.out{ background:#F4F8FD; } #board-wrap .bd-cell .dnum{ font-size:12px; color:var(--bdmut); }
  #board-wrap .bd-cell .ev{ font-size:11px; background:#E3EEFD; color:#1B6FD0; border-radius:6px; padding:2px 5px; margin-top:3px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #board-wrap .bd-cell .ev.over{ background:#FBE0E9; color:#D6336C; }
  /* ราย บริษัท */
  #board-wrap .bd-cohead{ font-size:14px; font-weight:600; color:#4A5262; margin:2px 2px 14px; }
  #board-wrap .bd-cosec{ background:#fff; border:1px solid var(--bdline); border-radius:16px; padding:15px 16px; margin-bottom:14px; box-shadow:0 4px 16px rgba(120,150,200,.10); }
  #board-wrap .bd-cohd{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:9px; }
  #board-wrap .bd-coname{ font-size:16px; font-weight:700; }
  #board-wrap .bd-cocnt{ font-size:12px; font-weight:600; color:#fff; background:var(--bd); border-radius:999px; padding:2px 10px; }
  #board-wrap .bd-cocnt.warn{ background:#DC2626; }
  #board-wrap .bd-copct{ font-size:13px; color:var(--bdmut); }
  #board-wrap .bd-coover{ font-size:13px; color:#DC2626; font-weight:700; margin-left:auto; }
  #board-wrap .bd-pbar{ height:9px; border-radius:999px; background:#EDF1F7; overflow:hidden; }
  #board-wrap .bd-pfill{ height:100%; border-radius:999px; background:var(--bdone); transition:width .3s; }
  #board-wrap .bd-pbar.over .bd-pfill{ background:#DC2626; }
  #board-wrap .bd-center{ text-align:center; padding:60px 20px; color:var(--bdmut); }

  /* ปุ่มคู่มือ: ชิดมุมล่างขวา ไม่บังเนื้อหา (แก้ .help-fab ซ้ำใน user.css ที่ดันขึ้น bottom:82px) */
  .help-fab{ bottom:14px !important; right:16px !important; padding:9px 14px; font-size:13.5px; box-shadow:0 4px 12px rgba(27,114,232,.32); opacity:.92; }
  .help-fab:hover{ opacity:1; }
  @media(max-width:1023px){ .help-fab{ bottom:84px !important; right:12px !important; } }  /* มือถือ: เหนือแถบเมนูล่าง */
</style>
</head>
<body>

<!-- LOADING -->
<div id="loader" class="loader">
  <div class="loader-logo"><img src="mascot-wave2.png" alt="ยินดี"></div>
  <div class="loader-bar"><i></i></div>
  <div class="loader-text">ยินดีกำลังโหลดข้อมูลให้ค่ะ…</div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <header class="hd">
    <div class="hd-logo"><img src="mascot-wave2.png" alt="ยินดี"></div>
    <div class="hd-mid"><div class="hd-title"><span class="hb-name">Moodata</span><span class="hb-sub">Yindee <span class="hb-heart">♥</span></span></div><div class="hd-sub" id="hdSub">ทีมงาน</div></div>
    <div class="hd-avatar" id="avatar">🙂</div>
  </header>

  <div id="topbar" class="topbar">
    <span class="tb-icon" id="tbIcon">📝</span>
    <div class="tb-mid"><div class="tb-title" id="tbTitle">การลา</div><div class="tb-sub">Moodata</div></div>
    <div class="tb-avatar" id="tbAvatar">🙂</div>
  </div>

  <main id="main" class="main"></main>

  <nav class="nav">

<div id="toast" class="toast"></div>

<script>
  // ═══════════ ตั้งค่า ═══════════
  var LIFF_ID  = '2010533182-66TDQvCu';
  var EXEC_URL = 'https://script.google.com/macros/s/AKfycbwdOotltb--WwTuS-ECutq6uFQs536kjz-RyLuq1mm35Pbfnn25EptvIRkfjaZB6iJf/exec';
  // ═══════════════════════════════

  var UID='', IDTOKEN='', NICK='', VIEW='', IS_OWNER=false;
  var TYPES=[], QUOTA=null, LEAVES=[], HOLIDAYS=[], SCHEDULE=null;
  var CAL=new Date();   // เดือนที่ปฏิทินแสดงอยู่
  var LF = { type:'sick', start:null, end:null, period:'full', reason:'', stime:'', etime:'' };  // start/end = Date|null
  var TYPE_EMO = { sick:'🤒', personal:'📄', vacation:'🌴' };
  var TH_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  var TH_DOW = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  var MENAME='', TEAM=[], CUSTOMERS=[];   // งาน
  var VIEW_META = {
    mytasks:['🗂️','งานของฉัน'], alltasks:['📋','งานทั้งหมด'], review:['🔍','รอตรวจ'], leave:['📝','การลา'],
    expense:['💸','เบิกค่าใช้จ่าย'], ot:['⏰','ขอ OT'], docs:['📁','เอกสาร']
  };
  var EXP_TYPES=[];   // ประเภทค่าใช้จ่าย (โหลดจาก waExpenseInit)

  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function fatal(m){ $('loader').classList.add('hidden'); $('app').classList.add('hidden');
    document.body.insertAdjacentHTML('beforeend','<div class="loader"><div style="font-size:38px">⚠️</div><div class="loader-text" style="max-width:80vw;text-align:center">'+esc(m)+'</div></div>'); }
  var _tt; function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(function(){t.classList.remove('show');},2400); }

  function jsonp(params, _try){
    _try=_try||0;
    return new Promise(function(resolve,reject){
      var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
      var timer=setTimeout(function(){cleanup();reject(new Error('หมดเวลาเชื่อมต่อ'));},60000);
      window[cb]=function(d){cleanup();resolve(d);};
      function cleanup(){clearTimeout(timer);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
      var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
      var s=document.createElement('script'); s.src=EXEC_URL+'?'+qs+'&callback='+cb;
      s.onerror=function(){ cleanup();
        if(_try<2){ setTimeout(function(){ jsonp(params,_try+1).then(resolve,reject); }, 700); }
        else reject(new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้')); };
      document.body.appendChild(s);
    });
  }

  // POST (fetch · form-urlencoded) — ใช้กับ action ที่ส่ง text ยาว เลี่ยง URL limit ของ JSONP GET
  // backend (doPost) route wa* → handler เดิม · ไม่ส่ง callback → ตอบ JSON ตรง
  function jsonpPost(params){
    var body=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
    return fetch(EXEC_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:body})
      .then(function(r){ if(!r.ok) throw new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'); return r.json(); });
  }

  // ───── nav / router ─────
  function switchView(v){
    VIEW=v;
    Array.prototype.forEach.call(document.querySelectorAll('.nav-btn'), function(b){ b.classList.toggle('active', b.dataset.view===v); });
    var meta=VIEW_META[v]||['•',v]; $('tbIcon').textContent=meta[0]; $('tbTitle').textContent=meta[1];
    ({ leave:renderLeave, mytasks:renderMytasks, alltasks:renderAlltasks, review:renderReview, docs:renderDocs, expense:renderExpense }[v] || soon)();
  }
  function soon(){
    $('main').innerHTML='<div class="card"><div class="soon-wrap"><div class="e-emo">🚧</div>เมนูนี้กำลังย้ายมาหน้านี้ — เร็ว ๆ นี้ค่ะ<br><span style="font-size:13px">(ตอนนี้ยังใช้ผ่านเมนูเดิม/แชทได้)</span></div></div>';
  }
  function skel(){ $('main').innerHTML='<div class="card"><div class="skel" style="height:120px"></div></div>'; }

  // ═══════════ VIEW: ลา ═══════════
  var LVCACHE={at:0,data:null}, DOCCACHE={at:0,data:null}, SLIPCACHE={}, INITTTL=45000;   // แคชหน้าลา/เอกสาร/สลิป
  function _applyLeave(r){ TYPES=r.types||[]; QUOTA=r.quota; LEAVES=r.leaves||[]; HOLIDAYS=r.holidays||[]; SCHEDULE=r.schedule||null; }
  function renderLeave(force){
    if(!force && LVCACHE.data){ _applyLeave(LVCACHE.data); paintLeave(); if(Date.now()-LVCACHE.at>INITTTL) _leaveFetch(true); return; }
    skel(); _leaveFetch(false);
  }
  function _leaveFetch(bg){
    jsonp({action:'waLeaveInit', uid:UID}).then(function(r){
      if(!r||!r.ok){ if(!bg) $('main').innerHTML='<div class="card"><div class="empty">'+esc((r&&r.error)||'โหลดไม่สำเร็จ')+'</div></div>'; return; }
      LVCACHE={at:Date.now(),data:r};
      if(!bg){ _applyLeave(r); paintLeave(); }   // bg = รีเฟรชแคชเงียบ ไม่ทับฟอร์มที่พี่กำลังกรอก
    }).catch(function(e){ if(!bg) $('main').innerHTML='<div class="card"><div class="empty">'+esc(e.message)+'</div></div>'; });
  }
  function qbox(cls,emo,b,lb){
    return '<div class="qbox '+cls+'"><div class="qbox-emo">'+emo+'</div>'+
      '<div class="qbox-num">'+b.remain+'</div><div class="qbox-lb">'+lb+' (วัน)</div>'+
      '<div class="qbox-full">เต็ม '+b.quota+' วัน</div></div>';
  }
  function paintLeave(){
    var q=QUOTA, html='';
    // โควต้า
    if(q){
      html+='<div class="section-h">โควต้าคงเหลือ ปี '+(q.year+543)+'</div>'+
        '<div class="qgrid">'+
          qbox('q-sick','🤒',q.sick,'ลาป่วยคงเหลือ')+
          qbox('q-biz','📄',q.personal,'ลากิจคงเหลือ')+
          qbox('q-vac','🌴',q.vacation,'พักร้อนคงเหลือ')+
        '</div>';
    }
    // ปุ่มแจ้งลา + ฟอร์ม (การ์ด)
    html+='<div class="card"><div class="card-title"><span class="ic"></span>📝 แจ้งลา</div>'+
      '<div id="lvErr" class="edit-banner hidden" style="background:#fbe7e7;color:#c0392b"></div>'+
      '<label class="field-lb">ประเภทการลา</label><div id="typeGrid" class="type-grid"></div>'+
      '<label class="field-lb">📅 เลือกวันที่ลา</label><div id="calLeave"></div>'+
      '<label class="field-lb">ช่วงเวลา</label><div id="seg" class="seg"></div><div id="lvTime"></div>'+
      '<label class="field-lb">📝 เหตุผล</label><textarea id="reason" rows="2" placeholder="เหตุผลการลา…"></textarea>'+
      '<div id="lvSummary" style="margin-top:16px"></div>'+
      '<div style="margin-top:14px"><button id="btnLeave" class="btn btn-primary">ส่งใบลา</button></div></div>';
    // ประวัติ
    html+='<div class="section-h">ประวัติการลา</div>';
    html+= LEAVES.length ? '<div class="card" style="padding:6px 12px">'+LEAVES.map(histLeave).join('')+'</div>'
                         : '<div class="card"><div class="emptybox">ยังไม่มีประวัติการลา 😊</div></div>';
    $('main').innerHTML=html;
    LF={ type:'sick', start:null, end:null, period:'full', reason:'', stime:'', etime:'' };
    CAL=new Date(); CAL.setDate(1);
    renderTypeGrid(); renderCal(); renderSeg(); renderLvTime(); renderLvSum();
    $('reason').addEventListener('input', function(e){ LF.reason=e.target.value; });
    $('btnLeave').addEventListener('click', submitLeave);
  }
  function lvBadge(st){ if(st.indexOf('รอ')>=0)return 'lvb-wait'; if(st.indexOf('ไม่อนุมัติ')>=0||st.indexOf('ยกเลิก')>=0)return 'lvb-no'; if(st.indexOf('อนุมัติ')>=0)return 'lvb-ok'; return 'lvb-wait'; }
  function histLeave(l){
    return '<div class="hist"><div class="hist-ic">'+(TYPE_EMO[quotaKey(l.type)]||'🌴')+'</div>'+
      '<div class="hist-main"><div class="hist-type">'+esc(l.type)+' · '+esc(l.days)+' วัน'+
        '<span class="lvb '+lvBadge(l.status)+'">'+esc(l.status)+'</span></div>'+
      '<div class="hist-meta">📅 '+esc(l.start)+' – '+esc(l.end)+(l.reason?(' · '+esc(l.reason)):'')+
        (l.approver?(' · โดย '+esc(l.approver)):'')+'</div></div></div>';
  }
  function quotaKey(typeName){ return {'ลาป่วย':'sick','ลากิจ':'personal','ลาพักร้อน':'vacation'}[typeName]||'vacation'; }

  function renderTypeGrid(){
    $('typeGrid').innerHTML=TYPES.map(function(t){
      return '<div class="type-opt'+(LF.type===t.key?' sel':'')+'" data-k="'+t.key+'"><div class="t-emo">'+(TYPE_EMO[t.key]||'📌')+'</div><div class="t-lb">'+esc(t.label)+'</div></div>';
    }).join('');
    Array.prototype.forEach.call($('typeGrid').querySelectorAll('.type-opt'), function(el){
      el.addEventListener('click', function(){ LF.type=el.dataset.k; renderTypeGrid(); renderLvSum(); }); });
  }
  function renderSeg(){
    var multi = LF.start&&LF.end&&dkey(LF.start)!==dkey(LF.end); if(multi) LF.period='full';
    var opts=[['full','เต็มวัน'],['morning','ครึ่งเช้า'],['afternoon','ครึ่งบ่าย'],['hours','ราย ชม.']];
    $('seg').innerHTML=opts.map(function(o){ var dis=multi&&o[0]!=='full';
      return '<button class="seg-btn'+(LF.period===o[0]?' sel':'')+'"'+(dis?' disabled style="opacity:.4"':'')+' data-p="'+o[0]+'">'+o[1]+'</button>'; }).join('');
    Array.prototype.forEach.call($('seg').querySelectorAll('.seg-btn'), function(el){
      el.addEventListener('click', function(){ if(el.disabled)return; LF.period=el.dataset.p; renderSeg(); renderLvTime(); renderLvSum(); }); });
  }
  function renderLvTime(){
    var el=$('lvTime'); if(!el) return;
    if(LF.period!=='hours'){ el.innerHTML=''; return; }
    el.innerHTML='<label class="field-lb">⏰ เวลาที่ลา (วันเดียว · สูงสุด 8 ชม.)</label>'+
      '<div class="time-row"><input type="time" id="lvS" value="'+LF.stime+'"><span class="dash">→</span><input type="time" id="lvE" value="'+LF.etime+'"></div>';
    $('lvS').addEventListener('input', function(e){ LF.stime=e.target.value; renderLvSum(); });
    $('lvE').addEventListener('input', function(e){ LF.etime=e.target.value; renderLvSum(); });
  }
  function hoursDiff(s,e){
    if(!s||!e) return 0;
    var a=s.split(':'), b=e.split(':');
    var h=(parseInt(b[0],10)*60+parseInt(b[1],10)-parseInt(a[0],10)*60-parseInt(a[1],10))/60;
    return h>0?h:0;
  }
  function calcDays(){
    if(!LF.start) return 0;
    if(LF.period==='hours'){ var h=hoursDiff(LF.stime,LF.etime); return h?Math.round(h/8*100)/100:0; }
    if(LF.period==='morning'||LF.period==='afternoon') return 0.5;
    // เต็มวัน — นับเฉพาะวันทำงาน ข้ามวันหยุดกะ + วันหยุดบริษัท (mirror backend waCountWorkDays_)
    var off=(SCHEDULE&&SCHEDULE.off&&SCHEDULE.off.length)?SCHEDULE.off:[0,6];
    var cur=new Date(LF.start.getFullYear(),LF.start.getMonth(),LF.start.getDate());
    var e=LF.end||LF.start; e=new Date(e.getFullYear(),e.getMonth(),e.getDate());
    if(e<cur) return 0;
    var n=0,g=0;
    while(cur<=e&&g<400){ if(off.indexOf(cur.getDay())<0&&!holidayName(cur)) n++; cur.setDate(cur.getDate()+1); g++; }
    return n;
  }
  function fmtShow(d){ return d.getDate()+' '+TH_MONTHS[d.getMonth()]+' '+(d.getFullYear()+543); }
  function renderLvSum(){
    var el=$('lvSummary'); if(!el) return;
    if(!LF.start){ el.innerHTML=''; return; }
    var t=(TYPES.filter(function(x){return x.key===LF.type;})[0]||{}).label||'';
    var per={morning:'ครึ่งเช้า',afternoon:'ครึ่งบ่าย',hours:'ราย ชม.'}[LF.period]||'เต็มวัน';
    var qty=LF.period==='hours' ? (hoursDiff(LF.stime,LF.etime)||0)+' ชม. (≈'+calcDays()+' วัน)' : calcDays()+' วัน';
    var dt=fmtShow(LF.start)+(LF.end&&dkey(LF.end)!==dkey(LF.start)?' — '+fmtShow(LF.end):'')+
      (LF.period==='hours'&&LF.stime&&LF.etime?'  ⏰ '+LF.stime+'-'+LF.etime:'');
    el.innerHTML='<div class="chips"><div class="chip"><div class="chip-v">'+(TYPE_EMO[LF.type]||'')+' '+esc(t)+'</div><div class="chip-l">ประเภท</div></div>'+
      '<div class="chip"><div class="chip-v">'+qty+'</div><div class="chip-l">จำนวน</div></div>'+
      '<div class="chip"><div class="chip-v">'+per+'</div><div class="chip-l">ช่วงเวลา</div></div></div>'+
      '<div style="text-align:center;color:var(--muted);font-size:13px;margin-top:8px">📅 '+dt+'</div>';
  }
  function lvErr(msg){ var e=$('lvErr'); e.textContent='⚠️ '+msg; e.classList.remove('hidden'); }
  function submitLeave(){
    if(!LF.start){ lvErr('แตะเลือกวันที่ลาบนปฏิทินก่อนค่ะ'); return; }
    if(!LF.end) LF.end=LF.start;
    if(LF.end<LF.start){ lvErr('วันสิ้นสุดต้องไม่ก่อนวันเริ่ม'); return; }
    if(LF.period==='hours'){
      if(!LF.stime||!LF.etime){ lvErr('เลือกเวลาเริ่ม–สิ้นสุดก่อนค่ะ'); return; }
      if(hoursDiff(LF.stime,LF.etime)<=0){ lvErr('เวลาสิ้นสุดต้องหลังเวลาเริ่ม'); return; }
    } else if(calcDays()<=0){ lvErr('ช่วงที่เลือกเป็นวันหยุดทั้งหมด เลือกวันทำงานนะคะ 😊'); return; }
    if(!LF.reason.trim()){ lvErr('กรอกเหตุผลก่อนค่ะ'); return; }
    toast('กำลังส่งใบลา…');
    jsonp({action:'waLeaveSubmit', uid:UID, type:LF.type, start:iso(LF.start), end:iso(LF.end), period:LF.period, stime:LF.stime, etime:LF.etime, reason:LF.reason.trim()})
      .then(function(r){ if(!r||!r.ok){ lvErr((r&&r.error)||'ส่งไม่สำเร็จ'); return; }
        toast('✅ ส่งใบลา '+r.no+' แล้ว (รออนุมัติ)'); renderLeave(true);
      }).catch(function(e){ lvErr(e.message); });
  }

  // ═══════════ ปฏิทิน (ลา) + กะ/วันหยุด ═══════════
  function dkey(d){ return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); }
  function iso(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  // วันหยุดบริษัท: รองรับทั้ง ค.ศ. และ พ.ศ. (ปี>2500 → -543)
  function _holParse_(s){ var p=String(s).split('/'); if(p.length!==3) return null; var y=+p[2]; if(y>2500)y-=543; return {y:y,mo:(+p[1])-1,d:+p[0]}; }
  function holidayName(dt){ var t=dt.getFullYear()+'-'+dt.getMonth()+'-'+dt.getDate();
    for(var i=0;i<HOLIDAYS.length;i++){ var hp=_holParse_(HOLIDAYS[i].date); if(hp&&(hp.y+'-'+hp.mo+'-'+hp.d)===t) return HOLIDAYS[i].name||'วันหยุดบริษัท'; } return ''; }
  function holidaysInMonth(y,mo){ var out=[]; HOLIDAYS.forEach(function(h){ var hp=_holParse_(h.date); if(hp&&hp.y===y&&hp.mo===mo) out.push({day:hp.d,name:h.name||'วันหยุดบริษัท'}); }); return out.sort(function(a,b){return a.day-b.day;}); }
  function buildCalLegend(y,mo){
    var s=SCHEDULE, box='';
    if(s){ var tm=(s.start&&s.end)?(' · '+esc(s.start)+'–'+esc(s.end)):'';
      box+='<div class="cal-sched"><span class="cs-ic">🗓️</span><div><div class="cs-main">กะของคุณ: '+esc(s.label||s.code)+tm+'</div>'+(s.offLabel?'<div class="cs-sub">หยุด: '+esc(s.offLabel)+'</div>':'')+'</div></div>';
    } else { box+='<div class="cal-sched"><span class="cs-ic">🗓️</span><div class="cs-main">หยุดเสาร์–อาทิตย์</div></div>'; }
    var hol=holidaysInMonth(y,mo);
    if(hol.length){ box+='<div class="cal-hols"><div class="ch-title">🎉 วันหยุดบริษัทเดือนนี้</div>'+
      hol.map(function(x){ return '<div class="ch-row"><b>'+x.day+'</b> '+esc(x.name)+'</div>'; }).join('')+'</div>'; }
    box+='<div class="cal-legend"><span class="lg"><i class="sw holiday"></i>วันหยุดบริษัท</span>'+
      '<span class="lg"><i class="sw off"></i>วันหยุดของคุณ</span><span class="lg"><i class="sw today"></i>วันนี้</span></div>';
    return box;
  }
  function renderCal(){
    var y=CAL.getFullYear(), mo=CAL.getMonth();
    var first=new Date(y,mo,1).getDay(), days=new Date(y,mo+1,0).getDate();
    var todayK=dkey(new Date());
    var off=(SCHEDULE&&SCHEDULE.off&&SCHEDULE.off.length)?SCHEDULE.off:[0,6];
    var h='<div class="cal-head"><button class="cal-nav" id="cP" type="button">‹</button>'+
      '<div class="cal-month">'+TH_MONTHS[mo]+' '+(y+543)+'</div>'+
      '<button class="cal-nav" id="cN" type="button">›</button></div><div class="cal-grid">';
    TH_DOW.forEach(function(d,i){ h+='<div class="cal-dow'+(i===0||i===6?' we':'')+'">'+d+'</div>'; });
    for(var i=0;i<first;i++) h+='<div class="cal-day empty"></div>';
    for(var d=1;d<=days;d++){
      var dt=new Date(y,mo,d), k=dkey(dt), dow=dt.getDay(), hn=holidayName(dt);
      var cls='cal-day';
      if(off.indexOf(dow)>=0) cls+=' we';
      if(hn) cls+=' holiday';
      if(k===todayK) cls+=' today';
      if(LF.start&&k===dkey(LF.start)) cls+=' sel';
      if(LF.end&&k===dkey(LF.end)) cls+=' sel';
      if(LF.start&&LF.end&&dt>LF.start&&dt<LF.end) cls+=' inrange';
      var tip=hn?' title="'+esc(hn)+'"':'';
      h+='<div class="'+cls+'"'+tip+' data-d="'+d+'">'+d+'</div>';
    }
    h+='</div>'+buildCalLegend(y,mo);
    var c=$('calLeave'); if(!c) return; c.innerHTML=h;
    $('cP').addEventListener('click', function(){ CAL=new Date(y,mo-1,1); renderCal(); });
    $('cN').addEventListener('click', function(){ CAL=new Date(y,mo+1,1); renderCal(); });
    Array.prototype.forEach.call(c.querySelectorAll('.cal-day[data-d]'), function(el){
      el.addEventListener('click', function(){ pickLeave(new Date(y,mo,+el.dataset.d)); }); });
  }
  function pickLeave(dt){

  function isDone_(t){ return t.status.indexOf('เสร็จ')>=0; }
  function isCancel_(t){ return t.status.indexOf('ยกเลิก')>=0; }
  function endOfDay_(ms){ var d=new Date(ms); d.setHours(23,59,59,999); return d.getTime(); }
  function isOverdue_(t){ return !!t.dueMs && !isDone_(t) && !isCancel_(t) && Date.now()>endOfDay_(t.dueMs); }
  function summaryHtml(tasks){
    var live=(tasks||[]).filter(function(t){return !isCancel_(t);});
    function c(sub){ return live.filter(function(t){return t.status.indexOf(sub)>=0;}).length; }
    var over=live.filter(isOverdue_).length;
    function pill(cls,lab,n){ return '<div class="scard '+cls+'"><b>'+n+'</b><span>'+lab+'</span></div>'; }
    return '<div class="sumbar">'+pill('all','ทั้งหมด',live.length)+pill('new','🆕 ใหม่',c('ใหม่'))+
      pill('doing','🔵 ทำอยู่',c('กำลังทำ'))+pill('review','🔍 รอตรวจ',c('รอตรวจ'))+
      pill('done','✅ เสร็จ',c('เสร็จ'))+(over?pill('over','⏰ เกินกำหนด',over):'')+'</div>';
  }

  function paintBoard(tasks){
    var full=(tasks||[]).filter(function(t){return !isCancel_(t);});

    if(!full.length){ $('main').innerHTML=summary+'<div class="card"><div class="emptybox">ยังไม่มีงาน 😊</div></div>'; return; }
    var order=[], groups={};
    full.forEach(function(t){ var c=t.customer||'(ไม่ระบุบริษัท)'; if(!groups[c]){ groups[c]=[]; order.push(c); } groups[c].push(t); });
    var html=summary+'<div class="boardhead">🏢 '+order.length+' บริษัท · '+full.length+' งาน</div>';
    order.forEach(function(c){
      var all=groups[c];
      var done=all.filter(isDone_).length, over=all.filter(isOverdue_).length;
      var pct=Math.round(done/all.length*100);
      html+='<div class="grp-h">🏢 '+esc(c)+'<span class="cnt'+(over?' warn':'')+'">'+all.length+'</span></div>'+
        '<div class="pwrap"><div class="pmeta"><span>เสร็จ '+done+'/'+all.length+' ('+pct+'%)</span>'+
        (over?'<span class="over">⏰ เกินกำหนด '+over+'</span>':'')+'</div>'+
        '<div class="pbar'+(over?' over':'')+'"><div class="pfill" style="width:'+pct+'%"></div></div></div>'+
        all.map(cardBoard).join('');

  function money(n){ return (Number(n)||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function showSlip(p){
    var inc=slipRow('เงินเดือน',p.salary);

  // ═══════════════════════════════════════════════════════════
  // บอร์ดจัดการงาน (เฉพาะพี่/owner) — การ์ดสรุป + แท็บมุมมอง + ตาราง + จัดการงาน
  // ข้อมูลจาก waPmBoard · แสดงใน #board-wrap (CSS scope กันชนกับหน้าอื่น)
  // ═══════════════════════════════════════════════════════════
  var BVIEW='list', BTASKS=[], BALL=[], BSCOPE='all', BTEAM=[], BSTATUSES=[], BTYPESLIST=[], BOWNER='', BNOW=0, BCATS=[];
  var BFILTER='', BFCAT='', BSORT='due', BQ='', BCAL=null, BRANGE='all', BDAY=86400000;
  var BVIEWS=[['list','📋 รายการ'],['company','🏢 ราย บริษัท'],['cards','🗂️ การ์ด'],['kanban','📊 คอลัมน์'],['calendar','📅 ปฏิทิน']];
  var BSCOPE_EMPTY={ all:'ยังไม่มีงานในระบบ 😊', mine:'ยังไม่มีงานที่มอบหมายให้คุณ 😊', review:'ไม่มีงานรอตรวจในตอนนี้ 🎉' };
  var BCACHE={ at:0, data:null }, BTTL=30000;   // แคชข้อมูลบอร์ด (waPmBoard) — สลับ scope ได้ทันที · รีเฟรชเมื่อเกิน 30 วิ/หลังแก้ไข
  var BMON=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var BMONF=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  function bFind(no){ return BTASKS.filter(function(x){return x.no===no;})[0]; }
  function bDone(t){ return t.status.indexOf('เสร็จ')>=0; }
  function bEnd(ms){ var d=new Date(ms); d.setHours(23,59,59,999); return d.getTime(); }
  function bOver(t){ return t.dueMs && !bDone(t) && BNOW>bEnd(t.dueMs); }
  function bTtl(t){ return t.title||t.detail||t.no; }
  function bBadge(st){ if(st.indexOf('กำลังทำ')>=0)return'bb-doing'; if(st.indexOf('รอตรวจ')>=0)return'bb-review'; if(st.indexOf('เสร็จ')>=0)return'bb-done'; return'bb-new'; }
  function bDot(st){ if(st.indexOf('กำลังทำ')>=0)return'#2D7FF9'; if(st.indexOf('รอตรวจ')>=0)return'#C87F1E'; if(st.indexOf('เสร็จ')>=0)return'#1E9E5A'; return'#8A94A6'; }
  function bThDate(ms){ if(!ms)return''; var d=new Date(ms); return d.getDate()+' '+BMON[d.getMonth()]+' '+String((d.getFullYear()+543)%100); }
  function bIso(ms){ var d=new Date(ms); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  function bInRange(t){
    if(BRANGE==='all') return true;
    var ms=t.createdMs||0; if(!ms) return false;
    var now=new Date(BNOW), y=now.getFullYear(), m=now.getMonth();
    if(BRANGE==='month')     return ms>=new Date(y,m,1).getTime();
    if(BRANGE==='lastmonth') return ms>=new Date(y,m-1,1).getTime() && ms<new Date(y,m,1).getTime();
    if(BRANGE==='last7')     return ms>=BNOW-7*BDAY;
    if(BRANGE==='last30')    return ms>=BNOW-30*BDAY;
    return true;
  }
  function bDueHtml(t){ if(!t.dueMs) return '<span class="bd-age">ไม่มีกำหนด</span>';
    var s=bThDate(t.dueMs); if(bOver(t)) s+=' <span class="bd-over">เกินกำหนด</span>'; return s; }

  function bScopeTasks(list){

  function renderOwnerBoard(scope, force){
    scope=scope||'all';
    if(scope!==BSCOPE){ BFILTER=''; BVIEW='list'; }   // เปลี่ยนมุมมอง → รีเซ็ตตัวกรอง/มุมมองย่อย
    BSCOPE=scope;
    if(force){ bFetch('silent'); return; }             // หลังแก้ไข: รีเฟรชเงียบ (คงจอเดิมจนได้ข้อมูลใหม่)
    if(BCACHE.data){                                    // มีแคช → แสดงทันที
      bApplyData(BCACHE.data); bShell();
      if(Date.now()-BCACHE.at>BTTL) bFetch('silent');   // แคชเก่า → รีเฟรชเบื้องหลัง
      return;
    }
    $('main').innerHTML='<div id="board-wrap"><div class="bd-center">กำลังโหลดกระดานงาน…</div></div>';
    bFetch('spinner');
  }

  function bStatCard(cls,lab,num){ return '<div class="bd-stat '+cls+'"><div class="lab">'+lab+'</div><div class="num">'+num+'</div></div>'; }
  function bRenderStats(){
    var base=BTASKS.filter(function(t){ return bInRange(t) && t.status.indexOf('ยกเลิก')<0; });
    function c(sub){ return base.filter(function(t){ return t.status.indexOf(sub)>=0; }).length; }
    $('bStats').innerHTML= bStatCard('all','📋 ทั้งหมด',base.length)+ bStatCard('doing','🔵 กำลังทำ',c('กำลังทำ'))+
      bStatCard('review','🔍 รอตรวจ',c('รอตรวจ'))+ bStatCard('done','✅ สำเร็จ',c('เสร็จ'))+ bStatCard('over','⏰ เกินกำหนด',base.filter(bOver).length);
  }
  function bVisible(){
    var arr=BTASKS.filter(function(t){
      if(!bInRange(t)) return false;
      if(t.status.indexOf('ยกเลิก')>=0) return false;
      if(BFILTER && t.status!==BFILTER) return false;
      if(BFCAT && t.category!==BFCAT) return false;
      if(BQ){ var h=(t.no+' '+(t.customer||'')+' '+(t.detail||'')+' '+(t.assignee||'')).toLowerCase(); if(h.indexOf(BQ)<0) return false; }
      return true;
    });
    var stOrder={}; BSTATUSES.forEach(function(s,i){stOrder[s]=i;});
    arr.sort(function(a,b){
      if(BSORT==='customer') return (a.customer||'').localeCompare(b.customer||'','th');
      if(BSORT==='status') return (stOrder[a.status]||0)-(stOrder[b.status]||0);
      if(BSORT==='assignee') return (a.assignee||'zzz').localeCompare(b.assignee||'zzz','th');
      if(BSORT==='no') return (a.no||'').localeCompare(b.no||'');
      return (a.dueMs||9e15)-(b.dueMs||9e15);
    });
    return arr;
  }
  function bBaseScope(){
    return BTASKS.filter(function(t){
      if(!bInRange(t)) return false;
      if(t.status.indexOf('ยกเลิก')>=0) return false;
      if(BFCAT && t.category!==BFCAT) return false;
      if(BQ){ var h=(t.no+' '+(t.customer||'')+' '+(t.detail||'')+' '+(t.assignee||'')).toLowerCase(); if(h.indexOf(BQ)<0) return false; }
      return true;
    });
  }
  function bRender(){
    bRenderStats();
    $('bViews').innerHTML=BVIEWS.map(function(v){ return '<div class="bd-vtab'+(v[0]===BVIEW?' active':'')+'" onclick="bSetView(\''+v[0]+'\')">'+v[1]+'</div>'; }).join('');
    var hint=$('bHint');
    if(BVIEW==='company'){ hint.style.display='none'; bViewCompany(); return; }
    var arr=bVisible();
    if(BVIEW==='calendar'){
      var undated=BTASKS.filter(function(t){return !t.dueMs && t.status.indexOf('ยกเลิก')<0;}).length;
      if(undated){ hint.style.display=''; hint.textContent='มีงานไม่ได้กำหนดวัน '+undated+' งาน — ดูที่ "รายการ" หรือ "การ์ด"'; } else hint.style.display='none';
      bViewCalendar(arr); return;
    }
    hint.style.display='none';
    if(!arr.length){ var em=BTASKS.length?'ไม่พบงานตามเงื่อนไข':(BSCOPE_EMPTY[BSCOPE]||'ไม่พบงาน'); $('bView').innerHTML='<div class="bd-center">'+em+'</div>'; return; }
    if(BVIEW==='list') bViewList(arr);
    else if(BVIEW==='cards') bViewCards(arr);
    else if(BVIEW==='kanban') bViewKanban(arr);
  }

  function bViewCalendar(arr){
    if(!BCAL){ var d=new Date(BNOW); BCAL=new Date(d.getFullYear(),d.getMonth(),1); }
    var y=BCAL.getFullYear(), m=BCAL.getMonth();
    var byDay={}; arr.forEach(function(t){ if(!t.dueMs)return; var d=new Date(t.dueMs); if(d.getFullYear()===y&&d.getMonth()===m){ var k=d.getDate(); (byDay[k]=byDay[k]||[]).push(t);} });
    var first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
    var dow=['อา','จ','อ','พ','พฤ','ศ','ส'], cells='';
    dow.forEach(function(d){ cells+='<div class="dow">'+d+'</div>'; });
    for(var i=0;i<first;i++) cells+='<div class="bd-cell out"></div>';
    for(var day=1;day<=days;day++){
      var evs=(byDay[day]||[]).map(function(t){ return '<div class="ev'+(bOver(t)?' over':'')+'" onclick="bOpenTask(\''+esc(t.no)+'\')" title="'+esc(t.detail||t.title||'')+'">'+esc(bTtl(t))+'</div>'; }).join('');
      cells+='<div class="bd-cell"><div class="dnum">'+day+'</div>'+evs+'</div>';
    }
    $('bView').innerHTML='<div class="bd-calnav"><button class="bd-btn bd-o sm" onclick="bCalMove(-1)">‹ ก่อนหน้า</button>'+
      '<b>'+BMONF[m]+' '+(y+543)+'</b><button class="bd-btn bd-o sm" onclick="bCalMove(1)">ถัดไป ›</button></div><div class="bd-cal">'+cells+'</div>';
  }
  function bViewCompany(){
    var base=bBaseScope();
    if(!base.length){ $('bView').innerHTML='<div class="bd-center">ไม่พบงานตามเงื่อนไข</div>'; return; }
    var order=[], groups={};
    base.forEach(function(t){ var c=t.customer||'(ไม่ระบุบริษัท)'; if(!groups[c]){groups[c]=[];order.push(c);} groups[c].push(t); });
    var html='<div class="bd-cohead">🏢 '+order.length+' บริษัท · '+base.length+' งาน</div>', shown=0;
    order.forEach(function(c){
      var all=groups[c];
      var vis=BFILTER?all.filter(function(t){return t.status===BFILTER;}):all;
      if(!vis.length) return; shown++;
      var done=all.filter(bDone).length, over=all.filter(bOver).length, pct=Math.round(done/all.length*100);
      html+='<div class="bd-cosec"><div class="bd-cohd">'+
        '<span class="bd-coname">🏢 '+esc(c)+'</span>'+
        '<span class="bd-cocnt'+(over?' warn':'')+'">'+all.length+' งาน</span>'+
        '<span class="bd-copct">เสร็จ '+done+'/'+all.length+' ('+pct+'%)</span>'+
        (over?'<span class="bd-coover">⏰ เกินกำหนด '+over+'</span>':'')+'</div>'+
        '<div class="bd-pbar'+(over?' over':'')+'"><div class="bd-pfill" style="width:'+pct+'%"></div></div>'+
        '<div class="bd-grid" style="margin-top:12px">'+vis.map(bMiniCard).join('')+'</div></div>';
    });
    if(!shown) html='<div class="bd-center">ไม่พบงานตามเงื่อนไข</div>';
    $('bView').innerHTML=html;
  }

  function bSaveTask(no){
    var t=bFind(no); if(!t) return;
    var title=$('mTitle').value.trim(), st=$('mStatus').value, asg=$('mAsg').value, rev=$('mRev').value, ty=$('mType').value, due=$('mDue').value;
    var jobs=[];
    if(title!==(t.title||'')) jobs.push(jsonp({action:'waSetTitle',uid:UID,no:no,title:title}));
    if(st!==t.status) jobs.push(jsonp({action:'waSetStatus',uid:UID,no:no,status:st}));
    if(asg!==(t.assignee||'')) jobs.push(jsonp({action:'waAssign',uid:UID,no:no,name:asg||' '}));
    if(rev!==(t.reviewer||'')) jobs.push(jsonp({action:'waSetReviewer',uid:UID,no:no,reviewer:rev}));
    if(ty!==(t.type||'')) jobs.push(jsonp({action:'waSetType',uid:UID,no:no,type:ty}));
    var curDue=t.dueMs?bIso(t.dueMs):'';
    if(due!==curDue) jobs.push(jsonp({action:'waSetDue',uid:UID,no:no,due:due}));
    if(!jobs.length){ closeModal(); return; }
    toast('กำลังบันทึก…');
    Promise.all(jobs).then(function(){ closeModal(); toast('บันทึกแล้ว ✅'); renderOwnerBoard(BSCOPE, true); }).catch(function(e){ mErr(e.message); });
  }
  function bSendCust(no){
    toast('กำลังส่งให้ลูกค้า…');
    jsonp({action:'waSendCustomer',uid:UID,no:no}).then(function(r){ if(!r||!r.ok){ mErr((r&&r.error)||'ส่งไม่สำเร็จ'); return; } closeModal(); toast('✅ ส่งให้ลูกค้าแล้ว'); renderOwnerBoard(BSCOPE, true); }).catch(function(e){ mErr(e.message); });
  }

  function bDoReturn(no){

    toast('กำลังส่งกลับ…');
    jsonpPost({action:'waTaskReturn',uid:UID,no:no,note:note}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'ส่งกลับไม่สำเร็จ'); return; }
      closeModal(); toast('🔁 ส่งกลับให้ '+(r.assignee||'ทีม')+' แก้ไขแล้ว'); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });

  function bCreateTask(){
    var cust=$('cbCust').value.trim(), detail=$('cbDetail').value.trim();
    if(!cust && !detail){ mErr('กรอกลูกค้าหรือรายละเอียดอย่างน้อย 1 ช่อง'); return; }
    toast('กำลังเปิดงาน…');
    jsonpPost({action:'waCreateTask',uid:UID,title:$('cbTitle').value.trim(),customer:cust,detail:detail,assignee:$('cbAsg').value,due:$('cbDue').value}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'สร้างไม่สำเร็จ'); return; } closeModal(); toast('เปิดงานใหม่แล้ว '+(r.no||'')); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  window.bSetView=bSetView; window.bCalMove=bCalMove; window.bOpenTask=bOpenTask; window.bSaveTask=bSaveTask;
  window.bSendCust=bSendCust; window.bOpenReturn=bOpenReturn; window.bDoReturn=bDoReturn; window.bOpenCreate=bOpenCreate; window.bCreateTask=bCreateTask;

  // ───── init ─────
  function startParam(){ try{ return (new URLSearchParams(location.search).get('p')||'').toLowerCase(); }catch(e){ return ''; } }
  function uidOverride(){ try{ return new URLSearchParams(location.search).get('uid')||''; }catch(e){ return ''; } }
  function start(){
    jsonp({action:'waBootstrap', uid:UID}).then(function(r){
      if(!r||!r.ok){ fatal((r&&r.error)||'โหลดข้อมูลไม่สำเร็จ'); return; }
      NICK=r.nick||''; if(NICK){ $('hdSub').textContent=NICK; }
      IS_OWNER=!!r.isOwner;
      if(IS_OWNER){ var nr=$('navReview'); if(nr) nr.style.display=''; }   // แท็บรอตรวจ = เฉพาะพี่/ผู้ตรวจ
      $('loader').classList.add('hidden'); $('app').classList.remove('hidden');
      Array.prototype.forEach.call(document.querySelectorAll('.nav-btn'), function(b){
        b.addEventListener('click', function(){ switchView(b.dataset.view); }); });
      var sp=startParam();
      switchView(sp==='docs' ? 'docs' : (sp==='work' ? (IS_OWNER?'alltasks':'mytasks') : 'leave'));
      // อุ่นแคชเบื้องหลัง → คลิกการลา/เอกสารครั้งแรกเด้งทันที (ไม่แย่งจอแรกโหลด)
      setTimeout(function(){ if(!LVCACHE.data) _leaveFetch(true); if(IDTOKEN && !DOCCACHE.data) _docsFetch(true); }, 900);
    }).catch(function(e){ fatal(e.message); });
  }
  (function init(){
    var ov=uidOverride();
    if(ov){ UID=ov; start(); return; }
    liff.init({liffId:LIFF_ID}).then(function(){
      if(!liff.isLoggedIn()){ liff.login({redirectUri:location.href}); return; }
      try{ IDTOKEN=liff.getIDToken()||''; }catch(e){ IDTOKEN=''; }
      return liff.getProfile().then(function(pf){ UID=pf.userId;
        if(pf.pictureUrl){ $('avatar').innerHTML='<img src="'+pf.pictureUrl+'" alt="">'; $('tbAvatar').innerHTML='<img src="'+pf.pictureUrl+'" alt="">'; }
        start(); });
    }).catch(function(e){ fatal('เปิดผ่านไลน์ไม่สำเร็จ: '+(e.message||e)); });
  })();
</script>
</body>
</html>
