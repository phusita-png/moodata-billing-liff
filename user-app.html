<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Moodata · ทีม</title>
<meta name="theme-color" content="#1B72E8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="user.css?v=12">
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  /* Moodata เพิ่มเติมจาก CSS ดิเอลฟ์ (date input + badge สถานะลา) */
  .date-row{ display:flex; flex-direction:column; gap:14px; margin:4px 0 12px; } .date-row > div{ min-width:0; }
  .date-row .field-lb{ display:block; margin:0 0 6px; }
  input[type=date]{ width:100%; box-sizing:border-box; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px;
    font-family:inherit; font-size:15px; background:#fff; color:var(--ink); }
  input[type=date]:focus{ outline:none; border-color:var(--red); }
  .lvb{ margin-left:auto; font-size:12px; padding:3px 11px; border-radius:999px; font-weight:600; white-space:nowrap; }
  .lvb-wait{ background:var(--ot-tint); color:var(--ot); } .lvb-ok{ background:var(--green-tint); color:var(--green); }
  .lvb-no{ background:#fbe7e7; color:#c0392b; }
  .soon-wrap{ text-align:center; padding:48px 22px; color:var(--muted); }
  .soon-wrap .e-emo{ font-size:40px; margin-bottom:10px; }
  /* งาน (task card) */
  .tk{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:14px 16px; margin-bottom:12px; }
  .tk-top{ display:flex; align-items:center; gap:8px; }
  .tk-no{ font-weight:700; color:var(--red); font-size:14px; }
  .tk-badge{ margin-left:auto; font-size:12px; padding:3px 10px; border-radius:999px; font-weight:600; white-space:nowrap; }
  .b-new{ background:#EEF1F6; color:#5B6472; } .b-doing{ background:#E3EEFD; color:#1B72E8; }
  .b-review{ background:#FDF0E1; color:#C87F1E; } .b-done{ background:#E4F5EA; color:#1E9E5A; }
  .b-cancel{ background:#FCE7E7; color:#D14343; }
  .ex-amt{ font-size:15px; font-weight:700; color:#1F2733; margin-top:6px; }
  .ex-amt .ex-t{ font-weight:600; color:#4A5262; }
  .ex-meta{ font-size:12px; color:var(--muted); margin-top:8px; }
  .ex-lk{ color:var(--red); text-decoration:none; margin-right:12px; white-space:nowrap; }
  .m-hint{ font-size:12.5px; color:var(--muted); background:#F4F7FB; border-radius:10px; padding:9px 11px; margin:4px 0 12px; line-height:1.5; }
  .tk-cust{ font-weight:600; margin-top:8px; } .tk-cat{ font-size:12px; color:var(--muted); }
  .tk-detail{ font-size:14px; color:#4A5262; margin-top:6px; white-space:pre-wrap; }
  .tk-kv{ font-size:13px; margin-top:8px; } .tk-kv b{ color:var(--muted); font-weight:500; }
  .tk-kv a{ color:var(--red); word-break:break-all; }
  .tk-asg{ font-size:13px; color:#4A5262; margin-top:8px; } .tk-asg.none{ color:#C87F1E; }
  .tk-acts{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .tk-acts .btn{ flex:1; min-width:120px; font-size:14px; padding:9px 12px; }
  .btn-ok{ background:var(--green); color:#fff; } .btn-ghost{ background:#EEF1F6; color:#333; }
  .btn-danger{ background:#DC2626; color:#fff; }
  .grp-h{ display:flex; align-items:center; gap:8px; margin:16px 2px 9px; font-weight:700; font-size:15px; }
  .grp-h .cnt{ font-size:12px; font-weight:600; color:#fff; background:var(--red); border-radius:999px; padding:1px 9px; }
  .grp-h .cnt.warn{ background:#DC2626; }
  .grp-h:first-child{ margin-top:2px; }
  /* แถบสรุปตามสถานะ */
  .sumbar{ display:flex; gap:8px; overflow-x:auto; padding-bottom:12px; -webkit-overflow-scrolling:touch; }
  .scard{ flex:0 0 auto; min-width:78px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:8px 12px; text-align:center; }
  .scard b{ display:block; font-size:20px; line-height:1.15; }
  .scard span{ font-size:11px; color:var(--muted); white-space:nowrap; }
  .scard.all b{ color:var(--red); } .scard.doing b{ color:#1B72E8; } .scard.new b{ color:#5B6472; }
  .scard.review b{ color:#C87F1E; } .scard.done b{ color:#1E9E5A; } .scard.over b{ color:#DC2626; }
  .scard.over{ border-color:#F5C2C2; background:#FEF2F2; }
  /* หัวราย บ. + บาร์ความสำเร็จ */
  .boardhead{ font-size:13px; font-weight:600; color:#4A5262; margin:2px 2px 12px; }
  .pwrap{ margin:0 2px 12px; }
  .pmeta{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:5px; }
  .pmeta .over{ color:#DC2626; font-weight:700; margin-left:auto; }
  .pbar{ height:8px; border-radius:999px; background:#EDF1F7; overflow:hidden; }
  .pfill{ height:100%; border-radius:999px; background:#1E9E5A; transition:width .3s; }
  .pbar.over .pfill{ background:#DC2626; }
  /* modal */
  .mask{ position:fixed; inset:0; background:rgba(20,28,40,.5); display:flex; align-items:flex-end; justify-content:center; z-index:60; }
  .sheet{ background:#fff; width:100%; max-width:520px; border-radius:18px 18px 0 0;
    padding:20px 18px calc(24px + env(safe-area-inset-bottom)); max-height:90vh; overflow:auto; }
  @media(min-width:860px){ .mask{ align-items:center; } .sheet{ border-radius:18px; } }
  .sheet h3{ margin:0 0 14px; font-size:18px; }
  .fld{ margin-bottom:12px; } .fld label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
  .fld input,.fld textarea,.fld select{ width:100%; padding:11px 12px; border:1.5px solid var(--line);
    border-radius:12px; font-family:inherit; font-size:15px; background:#fff; color:var(--ink); }
  .fld textarea{ min-height:76px; resize:vertical; }
  .m-err{ background:#fbe7e7; color:#c0392b; padding:9px 12px; border-radius:9px; font-size:13px; margin-bottom:10px; }
  .m-act{ display:flex; gap:9px; margin-top:6px; } .m-act .btn{ flex:1; }
  /* โควต้าการลา 3 ช่อง — คงเหลือใหญ่กลาง · เต็มใหญ่สีแดงมุมล่าง */
  .qgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
  .qbox{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:14px 14px 14px; text-align:center; }
  .qbox-emo{ font-size:24px; line-height:1; }
  .qbox-num{ font-size:44px; font-weight:800; color:var(--red); line-height:1; margin:6px 0 3px; }
  .qbox-lb{ font-size:13px; font-weight:600; color:var(--muted); }
  .qbox-full{ font-size:15px; font-weight:700; color:#DC2626; margin-top:9px; padding-top:8px; border-top:1px dashed rgba(0,0,0,.09); }
  /* สีจางแยกประเภทลา — พักร้อนเขียว · ลากิจน้ำเงิน · ลาป่วยส้ม */
  .qbox.q-vac{ background:#EAF7F0; border-color:#BFE4D0; } .qbox.q-vac .qbox-num{ color:#168A52; }
  .qbox.q-biz{ background:#EAF2FE; border-color:#BDD8FB; } .qbox.q-biz .qbox-num{ color:#1B72E8; }
  .qbox.q-sick{ background:#FCF3E4; border-color:#ECD5AC; } .qbox.q-sick .qbox-num{ color:#B5710A; }
  /* ประเภทการลา — จัดคอลัมน์ให้ตรงกับโควต้า (3 ช่อง gap เท่ากัน) */
  #typeGrid.type-grid{ grid-template-columns:repeat(3,1fr); gap:12px; }
  /* ช่องเวลา (ราย ชม.) */
  .time-row{ display:flex; align-items:center; gap:10px; margin-top:8px; }
  .time-row input[type=time]{ flex:1; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px;
    font-family:inherit; font-size:15px; }
  .time-row .dash{ color:var(--muted); }
  /* หน้าเอกสาร: ชิปสลิป · รายการเอกสาร · สลิป modal */
  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .doc-chip{ background:var(--red-tint); color:var(--red-deep); border:1px solid var(--red-soft);
    border-radius:999px; padding:8px 16px; font-size:14px; font-weight:600; cursor:pointer; }
  .doc-chip:active{ background:var(--red-soft); }
  .doc-item{ display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--line);
    text-decoration:none; color:inherit; }
  .doc-item:last-child{ border-bottom:0; }
  .di-ic{ font-size:20px; } .di-main{ flex:1; display:flex; flex-direction:column; }
  .di-main small{ color:#8A93A3; font-size:12px; margin-top:2px; } .di-go{ color:#C3CAD6; font-size:22px; }
  .sl-net{ text-align:center; background:var(--red-tint); border-radius:12px; padding:10px; margin:6px 0 12px; font-size:15px; }
  .sl-net b{ font-size:24px; color:var(--red-deep); }
  .sl-sec{ font-size:13px; font-weight:700; color:#16A34A; margin:12px 0 4px; }
  .sl-row{ display:flex; justify-content:space-between; font-size:14px; padding:4px 0; color:#4A5262; }
  .sl-row.bold{ font-weight:700; color:#222; border-top:1px dashed var(--line); margin-top:4px; padding-top:8px; }
  .sl-ytd{ font-size:12px; color:#8A93A3; margin-top:12px; text-align:center; }
  /* มือถือจอแคบ — โควต้า 3 ช่องยังอยู่ แต่ย่อ font กันล้น */
  @media(max-width:430px){
    .qbox{ padding:12px 8px; } .qbox-num{ font-size:34px; } .qbox-emo{ font-size:20px; }
    .qbox-lb{ font-size:11px; } .qbox-full{ font-size:12px; margin-top:7px; padding-top:6px; }
  }

  /* ═══ บอร์ดจัดการงาน (เฉพาะพี่/owner) — scope #board-wrap กันชนกับ .card/.badge เดิม ═══ */
  #board-wrap{ --bd:#1B72E8; --bd2:#4A93F0; --bdink:#242B36; --bdmut:#8A94A6; --bdline:#DCE7F5;
    --bnew:#5B6472; --bdoing:#2D7FF9; --breview:#C87F1E; --bdone:#1E9E5A; --bover:#D6336C; }
  #board-wrap .bd-top{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  #board-wrap .bd-top .sp{ flex:1; }
  #board-wrap #bRange{ padding:9px 12px; border:1px solid var(--bdline); border-radius:10px; font-family:inherit; font-size:14px; background:#fff; color:var(--bdink); cursor:pointer; }
  #board-wrap .bd-btn{ border:none; border-radius:999px; padding:10px 18px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  #board-wrap .bd-p{ background:linear-gradient(120deg,var(--bd),var(--bd2)); color:#fff; box-shadow:0 4px 14px rgba(27,114,232,.3); }
  #board-wrap .bd-bulk{ background:#EAF1FC; color:#1B72E8; }
  #board-wrap .bd-bulk:hover{ background:#DCE9FA; }
  #board-wrap .bd-o{ background:#fff; color:var(--bdink); border:1px solid var(--bdline); }
  #board-wrap .bd-s{ background:#EAF1FB; color:var(--bdink); }
  #board-wrap .bd-g{ background:var(--bdone); color:#fff; }
  #board-wrap .bd-btn.sm{ padding:6px 12px; font-size:13px; }
  /* การ์ดสรุป */
  #board-wrap .bd-stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:14px; }
  #board-wrap .bd-stat{ background:#fff; border:1px solid var(--bdline); border-radius:16px; padding:15px 16px; box-shadow:0 4px 16px rgba(120,150,200,.10); }
  #board-wrap .bd-stat .lab{ font-size:13px; color:var(--bdmut); font-weight:600; display:flex; align-items:center; gap:6px; }
  #board-wrap .bd-stat .num{ font-size:28px; font-weight:700; margin-top:4px; line-height:1.1; }
  #board-wrap .bd-stat.all .num{ color:var(--bd); } #board-wrap .bd-stat.doing .num{ color:var(--bdoing); }
  #board-wrap .bd-stat.done .num{ color:var(--bdone); } #board-wrap .bd-stat.over .num{ color:var(--bover); }
  #board-wrap .bd-stat.new .num{ color:var(--bnew); } #board-wrap .bd-stat.review .num{ color:var(--breview); }
  #board-wrap .bd-stat{ cursor:pointer; transition:box-shadow .15s, transform .05s; }
  #board-wrap .bd-stat:hover{ box-shadow:0 6px 20px rgba(120,150,200,.22); }
  #board-wrap .bd-stat:active{ transform:scale(.98); }
  #board-wrap .bd-stat.active{ outline:2.5px solid #1B72E8; outline-offset:-2px; }
  #board-wrap .bd-stat.doing.active{ outline-color:#2D7FF9; } #board-wrap .bd-stat.review.active{ outline-color:#C87F1E; }
  #board-wrap .bd-stat.done.active{ outline-color:#1E9E5A; } #board-wrap .bd-stat.over.active{ outline-color:#D6336C; }
  #board-wrap .bd-stat.new.active{ outline-color:var(--bnew); }
  #board-wrap .bd-stat-pj{ background:#F3EEFC; border-color:#E0D2F7; } #board-wrap .bd-stat-pj .lab{ color:#7C3AED; } #board-wrap .bd-stat-pj .num{ color:#7C3AED; }
  #board-wrap .bd-stat-add{ background:linear-gradient(120deg,#1B72E8,#4A93F0); border:none; box-shadow:0 4px 14px rgba(27,114,232,.3); }
  #board-wrap .bd-stat-add .lab{ color:#fff; font-weight:700; } #board-wrap .bd-stat-add .num{ color:#fff; font-size:30px; }
  #board-wrap .bd-pjbar{ display:flex; align-items:stretch; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
  #board-wrap .bd-pjbar:empty{ display:none; }
  #board-wrap .bd-pjsel{ flex:0 0 auto; min-width:230px; padding:12px 15px; border:2px solid #1B72E8; border-radius:13px; font-family:inherit; font-size:15px; font-weight:600; background:#fff; color:var(--bdink); cursor:pointer; box-shadow:0 2px 8px rgba(27,114,232,.12); }
  #board-wrap .bd-pjprog{ flex:1; min-width:230px; display:flex; align-items:center; gap:16px; padding:0 22px; border-radius:13px; background:linear-gradient(120deg,#1B72E8,#4A93F0); box-shadow:0 4px 16px rgba(27,114,232,.28); }
  #board-wrap .bd-pjtrack{ flex:1; height:14px; background:rgba(255,255,255,.28); border-radius:999px; overflow:hidden; }
  #board-wrap .bd-pjfill{ height:100%; border-radius:999px; background:#fff; transition:width .4s ease; box-shadow:0 1px 4px rgba(0,0,0,.12); }
  #board-wrap .bd-pjpct{ font-size:15px; font-weight:800; color:#fff; white-space:nowrap; letter-spacing:.2px; }
  @media(max-width:1023px){ #board-wrap .bd-pjsel, #board-wrap .bd-pjprog{ min-width:100%; } }
  #board-wrap .bd-pjmgbtn{ flex:0 0 auto; padding:0 20px; border-radius:13px; border:2px solid #1B72E8; background:#fff; color:#1B72E8; font-family:inherit; font-size:14.5px; font-weight:700; cursor:pointer; white-space:nowrap; box-shadow:0 2px 8px rgba(27,114,232,.12); }
  #board-wrap .bd-pjmgbtn:hover{ background:#EAF1FC; }
  @media(max-width:1023px){ #board-wrap .bd-pjmgbtn{ flex-basis:100%; padding:12px; } }
  @media(max-width:720px){ #board-wrap .bd-stats{ grid-template-columns:repeat(2,1fr); } }
  /* mini app (มือถือ) → เหลือ ช่วงเวลา+เปิดงานใหม่ / การ์ดสถานะ / การ์ดงานคอลัมน์เดียว (ตัดแท็บมุมมอง+ตัวกรองประเภท/เรียง/ค้นหา) */
  @media(max-width:1023px){ #board-wrap, #board-wrap *{ box-sizing:border-box; }
    #board-wrap .bd-views, #board-wrap .bd-tools{ display:none !important; }
    #board-wrap .bd-grid{ grid-template-columns:1fr; }
    #board-wrap .bd-top .sp{ display:none; } #board-wrap #bRange{ flex:1 1 auto; min-width:120px; } }
  /* แท็บมุมมอง */
  #board-wrap .bd-views{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  #board-wrap .bd-vtab{ padding:7px 15px; border-radius:999px; background:#fff; border:1px solid var(--bdline); color:var(--bdmut); font-weight:600; font-size:14px; cursor:pointer; }
  #board-wrap .bd-vtab.active{ background:linear-gradient(120deg,var(--bd),var(--bd2)); color:#fff; border-color:transparent; }
  /* toolbar filter */
  #board-wrap .bd-tools{ display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
  #board-wrap .bd-tools select, #board-wrap .bd-tools input{ padding:9px 12px; border:1px solid var(--bdline); border-radius:10px; font-family:inherit; font-size:14px; background:#fff; color:var(--bdink); }
  #board-wrap .bd-tools .search{ flex:1; min-width:180px; }
  #board-wrap .bd-note{ background:#E7F1FD; color:#1B6FD0; padding:10px 16px; border-radius:12px; font-size:13px; margin-bottom:12px; }
  /* badge สถานะ */
  #board-wrap .bd-badge{ font-size:12px; padding:2px 9px; border-radius:999px; font-weight:600; white-space:nowrap; }
  #board-wrap .bb-new{ background:#EEF1F6; color:var(--bnew); } #board-wrap .bb-doing{ background:#E3EEFD; color:var(--bdoing); }
  #board-wrap .bb-review{ background:#FDF0E1; color:var(--breview); } #board-wrap .bb-done{ background:#E4F5EA; color:var(--bdone); }
  #board-wrap .bd-over{ color:var(--bover); font-weight:700; } #board-wrap .bd-age{ color:var(--bdmut); font-size:12px; }
  #board-wrap .bd-asg{ font-size:13px; color:#5A6472; } #board-wrap .bd-asg.none{ color:var(--breview); }
  /* ตาราง */
  #board-wrap .bd-tblwrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  #board-wrap table{ width:100%; border-collapse:collapse; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 6px 24px rgba(120,150,200,.14); min-width:640px; }
  #board-wrap th{ text-align:left; font-size:12px; color:var(--bdmut); font-weight:600; padding:13px 15px; border-bottom:1px solid var(--bdline); white-space:nowrap; }
  #board-wrap td{ padding:13px 15px; border-bottom:1px solid #F0F6FD; font-size:14px; vertical-align:top; }
  #board-wrap tr:last-child td{ border-bottom:none; }
  #board-wrap tr.brow:hover{ background:#F3F8FE; cursor:pointer; }
  #board-wrap .bd-tt{ font-weight:600; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  #board-wrap .bd-meta{ font-size:12px; color:var(--bdmut); margin-top:2px; }
  #board-wrap .bd-ord{ color:var(--bdmut); font-weight:600; text-align:center; }
  #board-wrap .bd-tid{ font-family:monospace; font-size:13px; color:var(--bd); font-weight:600; }
  /* การ์ดกริด */
  #board-wrap .bd-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }
  #board-wrap .bd-card{ background:#fff; border:1px solid var(--bdline); border-radius:14px; padding:13px; cursor:pointer; box-shadow:0 3px 12px rgba(120,150,200,.10); }
  #board-wrap .bd-card:hover{ box-shadow:0 6px 18px rgba(27,114,232,.16); }
  #board-wrap .bd-card .bd-tt{ font-size:14px; } #board-wrap .bd-card .cust{ font-size:12px; color:var(--bdmut); margin:4px 0 10px; }
  #board-wrap .bd-foot{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  /* คอลัมน์ (kanban) */
  #board-wrap .bd-kanban{ display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; align-items:flex-start; }
  #board-wrap .bd-kcol{ background:rgba(255,255,255,.7); border-radius:14px; padding:11px; min-width:260px; width:260px; flex:0 0 auto; }
  #board-wrap .bd-kcol h3{ margin:0 0 9px; font-size:14px; display:flex; align-items:center; gap:8px; }
  #board-wrap .bd-kcol h3 .cnt{ margin-left:auto; font-size:12px; color:var(--bdmut); }
  #board-wrap .bd-kcard{ background:#fff; border:1px solid var(--bdline); border-radius:12px; padding:10px 11px; margin-bottom:8px; cursor:pointer; }
  #board-wrap .bd-kcard .bd-tt{ font-size:13px; } #board-wrap .bd-kcard .cust{ font-size:12px; color:var(--bdmut); margin:2px 0 6px; }
  #board-wrap .bd-dot{ width:9px;height:9px;border-radius:50%;display:inline-block;flex:0 0 auto; }
  /* ปฏิทินงาน */
  #board-wrap .bd-calnav{ display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:12px; }

  function jsonp(params, _try){
    _try=_try||0;
    return new Promise(function(resolve,reject){
      var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
      var timer=setTimeout(function(){cleanup();reject(new Error('หมดเวลาเชื่อมต่อ'));},60000);
      window[cb]=function(d){cleanup();resolve(d);};
      function cleanup(){clearTimeout(timer);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
      var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
      var s=document.createElement('script'); s.src=EXEC_URL+'?'+qs+'&callback='+cb;
      s.onerror=function(){ cleanup();
        if(_try<2){ setTimeout(function(){ jsonp(params,_try+1).then(resolve,reject); }, 700); }
        else reject(new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้')); };
      document.body.appendChild(s);
    });
  }

  // POST (fetch · form-urlencoded) — ใช้กับ action ที่ส่ง text ยาว เลี่ยง URL limit ของ JSONP GET
  // backend (doPost) route wa* → handler เดิม · ไม่ส่ง callback → ตอบ JSON ตรง
  function jsonpPost(params){
    var body=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
    return fetch(EXEC_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:body})
      .then(function(r){ if(!r.ok) throw new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'); return r.json(); });
  }

  function renderSeg(){
    var multi = LF.start&&LF.end&&dkey(LF.start)!==dkey(LF.end); if(multi) LF.period='full';
    var opts=[['full','เต็มวัน'],['morning','ครึ่งเช้า'],['afternoon','ครึ่งบ่าย'],['hours','ราย ชม.']];
    $('seg').innerHTML=opts.map(function(o){ var dis=multi&&o[0]!=='full';
      return '<button class="seg-btn'+(LF.period===o[0]?' sel':'')+'"'+(dis?' disabled style="opacity:.4"':'')+' data-p="'+o[0]+'">'+o[1]+'</button>'; }).join('');
    Array.prototype.forEach.call($('seg').querySelectorAll('.seg-btn'), function(el){
      el.addEventListener('click', function(){ if(el.disabled)return; LF.period=el.dataset.p; renderSeg(); renderLvTime(); renderLvSum(); }); });

  function renderLvTime(){
    var el=$('lvTime'); if(!el) return;
    if(LF.period!=='hours'){ el.innerHTML=''; return; }
    el.innerHTML='<label class="field-lb">⏰ เวลาที่ลา (วันเดียว · สูงสุด 8 ชม.)</label>'+
      '<div class="time-row"><input type="time" id="lvS" value="'+LF.stime+'"><span class="dash">→</span><input type="time" id="lvE" value="'+LF.etime+'"></div>';
    $('lvS').addEventListener('input', function(e){ LF.stime=e.target.value; renderLvSum(); });
    $('lvE').addEventListener('input', function(e){ LF.etime=e.target.value; renderLvSum(); });
  }
  function hoursDiff(s,e){
    if(!s||!e) return 0;
    var a=s.split(':'), b=e.split(':');
    var h=(parseInt(b[0],10)*60+parseInt(b[1],10)-parseInt(a[0],10)*60-parseInt(a[1],10))/60;
    return h>0?h:0;
  }
  function calcDays(){
    if(!LF.start) return 0;
    if(LF.period==='hours'){ var h=hoursDiff(LF.stime,LF.etime); return h?Math.round(h/8*100)/100:0; }
    if(LF.period==='morning'||LF.period==='afternoon') return 0.5;
    // เต็มวัน — นับเฉพาะวันทำงาน ข้ามวันหยุดกะ + วันหยุดบริษัท (mirror backend waCountWorkDays_)
    var off=(SCHEDULE&&SCHEDULE.off&&SCHEDULE.off.length)?SCHEDULE.off:[0,6];
    var cur=new Date(LF.start.getFullYear(),LF.start.getMonth(),LF.start.getDate());
    var e=LF.end||LF.start; e=new Date(e.getFullYear(),e.getMonth(),e.getDate());
    if(e<cur) return 0;
    var n=0,g=0;
    while(cur<=e&&g<400){ if(off.indexOf(cur.getDay())<0&&!holidayName(cur)) n++; cur.setDate(cur.getDate()+1); g++; }
    return n;
  }
  function fmtShow(d){ return d.getDate()+' '+TH_MONTHS[d.getMonth()]+' '+(d.getFullYear()+543); }
  function renderLvSum(){
    var el=$('lvSummary'); if(!el) return;
    if(!LF.start){ el.innerHTML=''; return; }
    var t=(TYPES.filter(function(x){return x.key===LF.type;})[0]||{}).label||'';
    var per={morning:'ครึ่งเช้า',afternoon:'ครึ่งบ่าย',hours:'ราย ชม.'}[LF.period]||'เต็มวัน';
    var qty=LF.period==='hours' ? (hoursDiff(LF.stime,LF.etime)||0)+' ชม. (≈'+calcDays()+' วัน)' : calcDays()+' วัน';
    var dt=fmtShow(LF.start)+(LF.end&&dkey(LF.end)!==dkey(LF.start)?' — '+fmtShow(LF.end):'')+
      (LF.period==='hours'&&LF.stime&&LF.etime?'  ⏰ '+LF.stime+'-'+LF.etime:'');
    el.innerHTML='<div class="chips"><div class="chip"><div class="chip-v">'+(TYPE_EMO[LF.type]||'')+' '+esc(t)+'</div><div class="chip-l">ประเภท</div></div>'+
      '<div class="chip"><div class="chip-v">'+qty+'</div><div class="chip-l">จำนวน</div></div>'+
      '<div class="chip"><div class="chip-v">'+per+'</div><div class="chip-l">ช่วงเวลา</div></div></div>'+
      '<div style="text-align:center;color:var(--muted);font-size:13px;margin-top:8px">📅 '+dt+'</div>';
  }
  function lvErr(msg){ var e=$('lvErr'); e.textContent='⚠️ '+msg; e.classList.remove('hidden'); }
  function submitLeave(){
    if(!LF.start){ lvErr('แตะเลือกวันที่ลาบนปฏิทินก่อนค่ะ'); return; }
    if(!LF.end) LF.end=LF.start;
    if(LF.end<LF.start){ lvErr('วันสิ้นสุดต้องไม่ก่อนวันเริ่ม'); return; }
    if(LF.period==='hours'){
      if(!LF.stime||!LF.etime){ lvErr('เลือกเวลาเริ่ม–สิ้นสุดก่อนค่ะ'); return; }
      if(hoursDiff(LF.stime,LF.etime)<=0){ lvErr('เวลาสิ้นสุดต้องหลังเวลาเริ่ม'); return; }
    } else if(calcDays()<=0){ lvErr('ช่วงที่เลือกเป็นวันหยุดทั้งหมด เลือกวันทำงานนะคะ 😊'); return; }
    if(!LF.reason.trim()){ lvErr('กรอกเหตุผลก่อนค่ะ'); return; }
    toast('กำลังส่งใบลา…');
    jsonp({action:'waLeaveSubmit', uid:UID, type:LF.type, start:iso(LF.start), end:iso(LF.end), period:LF.period, stime:LF.stime, etime:LF.etime, reason:LF.reason.trim()})
      .then(function(r){ if(!r||!r.ok){ lvErr((r&&r.error)||'ส่งไม่สำเร็จ'); return; }
        toast('✅ ส่งใบลา '+r.no+' แล้ว (รออนุมัติ)'); renderLeave(true);
      }).catch(function(e){ lvErr(e.message); });
  }

  // ═══════════ ปฏิทิน (ลา) + กะ/วันหยุด ═══════════
  function dkey(d){ return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); }
  function iso(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  // วันหยุดบริษัท: รองรับทั้ง ค.ศ. และ พ.ศ. (ปี>2500 → -543)
  function _holParse_(s){ var p=String(s).split('/'); if(p.length!==3) return null; var y=+p[2]; if(y>2500)y-=543; return {y:y,mo:(+p[1])-1,d:+p[0]}; }
  function holidayName(dt){ var t=dt.getFullYear()+'-'+dt.getMonth()+'-'+dt.getDate();
    for(var i=0;i<HOLIDAYS.length;i++){ var hp=_holParse_(HOLIDAYS[i].date); if(hp&&(hp.y+'-'+hp.mo+'-'+hp.d)===t) return HOLIDAYS[i].name||'วันหยุดบริษัท'; } return ''; }
  function holidaysInMonth(y,mo){ var out=[]; HOLIDAYS.forEach(function(h){ var hp=_holParse_(h.date); if(hp&&hp.y===y&&hp.mo===mo) out.push({day:hp.d,name:h.name||'วันหยุดบริษัท'}); }); return out.sort(function(a,b){return a.day-b.day;}); }
  function buildCalLegend(y,mo){
    var s=SCHEDULE, box='';
    if(s){ var tm=(s.start&&s.end)?(' · '+esc(s.start)+'–'+esc(s.end)):'';
      box+='<div class="cal-sched"><span class="cs-ic">🗓️</span><div><div class="cs-main">กะของคุณ: '+esc(s.label||s.code)+tm+'</div>'+(s.offLabel?'<div class="cs-sub">หยุด: '+esc(s.offLabel)+'</div>':'')+'</div></div>';
    } else { box+='<div class="cal-sched"><span class="cs-ic">🗓️</span><div class="cs-main">หยุดเสาร์–อาทิตย์</div></div>'; }
    var hol=holidaysInMonth(y,mo);
    if(hol.length){ box+='<div class="cal-hols"><div class="ch-title">🎉 วันหยุดบริษัทเดือนนี้</div>'+
      hol.map(function(x){ return '<div class="ch-row"><b>'+x.day+'</b> '+esc(x.name)+'</div>'; }).join('')+'</div>'; }
    box+='<div class="cal-legend"><span class="lg"><i class="sw holiday"></i>วันหยุดบริษัท</span>'+
      '<span class="lg"><i class="sw off"></i>วันหยุดของคุณ</span><span class="lg"><i class="sw today"></i>วันนี้</span></div>';
    return box;
  }
  function renderCal(){
    var y=CAL.getFullYear(), mo=CAL.getMonth();
    var first=new Date(y,mo,1).getDay(), days=new Date(y,mo+1,0).getDate();
    var todayK=dkey(new Date());
    var off=(SCHEDULE&&SCHEDULE.off&&SCHEDULE.off.length)?SCHEDULE.off:[0,6];
    var h='<div class="cal-head"><button class="cal-nav" id="cP" type="button">‹</button>'+
      '<div class="cal-month">'+TH_MONTHS[mo]+' '+(y+543)+'</div>'+
      '<button class="cal-nav" id="cN" type="button">›</button></div><div class="cal-grid">';
    TH_DOW.forEach(function(d,i){ h+='<div class="cal-dow'+(i===0||i===6?' we':'')+'">'+d+'</div>'; });
    for(var i=0;i<first;i++) h+='<div class="cal-day empty"></div>';
    for(var d=1;d<=days;d++){
      var dt=new Date(y,mo,d), k=dkey(dt), dow=dt.getDay(), hn=holidayName(dt);
      var cls='cal-day';
      if(off.indexOf(dow)>=0) cls+=' we';
      if(hn) cls+=' holiday';
      if(k===todayK) cls+=' today';
      if(LF.start&&k===dkey(LF.start)) cls+=' sel';
      if(LF.end&&k===dkey(LF.end)) cls+=' sel';
      if(LF.start&&LF.end&&dt>LF.start&&dt<LF.end) cls+=' inrange';
      var tip=hn?' title="'+esc(hn)+'"':'';
      h+='<div class="'+cls+'"'+tip+' data-d="'+d+'">'+d+'</div>';
    }
    h+='</div>'+buildCalLegend(y,mo);
    var c=$('calLeave'); if(!c) return; c.innerHTML=h;
    $('cP').addEventListener('click', function(){ CAL=new Date(y,mo-1,1); renderCal(); });
    $('cN').addEventListener('click', function(){ CAL=new Date(y,mo+1,1); renderCal(); });

  // ═══════════ VIEW: Project (บริหารโครงการ) ═══════════
  // % ความสำเร็จจากสถานะ (ยกเลิก=null ไม่นับ) · progress bar
  function statusPct(s){ s=String(s||''); if(s.indexOf('ยกเลิก')>=0)return null; if(s.indexOf('เสร็จ')>=0)return 100; if(s.indexOf('รอตรวจ')>=0)return 80; if(s.indexOf('กำลังทำ')>=0)return 50; return 0; }
  function pctClass(p){ return p>=100?'pf-done':(p>=50?'pf-mid':'pf-low'); }
  function pctBar(p,big){ return '<div class="pbar'+(big?' pbar-lg':'')+'"><div class="pbar-fill '+pctClass(p)+'" style="width:'+p+'%"></div></div>'; }
  function avgPct(tasks){ var sum=0,n=0; (tasks||[]).forEach(function(t){ var p=statusPct(t.status); if(p!==null){sum+=p;n++;} }); return n?Math.round(sum/n):0; }
  // escape string สำหรับใส่ใน onclick='...' (กันชื่อบริษัทมี ' หรือ ")
  function jss(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

  // เมนู Project · พี่บนคอม(เว็บแอป)=บอร์ดเต็ม · มือถือ(mini app ทั้งพี่+ทีม)=dropdown+6 สถานะ (คงเดิม)
  function renderProjects(){
    if(IS_OWNER && !bIsMobile()){ renderOwnerBoard('project'); return; }   // เฉพาะจอคอม → บอร์ดเต็ม
    skel();
    var act = IS_OWNER ? 'waProjectAdminList' : 'waMyProjects';
    Promise.all([ jsonp({action:'waBoard',uid:UID,withCancel:'1'}), jsonp({action:act,uid:UID}) ]).then(function(rs){
      var rb=rs[0], rp=rs[1];
      if(rb&&rb.ok){ ALL_TASKS=rb.tasks||[]; MENAME=(rb.me&&rb.me.name)||MENAME; TEAM=rb.team||TEAM; CUSTOMERS=rb.customers||CUSTOMERS; } else ALL_TASKS=[];
      if(rp&&rp.ok){ PROJECTS=rp.projects||[]; if(IS_OWNER&&rp.team) TEAM_ALL=rp.team; } else PROJECTS=[];
      // ถ้าค่าที่เลือกไว้หายไป (project ถูกลบ) → กลับไปทั้งหมด
      if(PJ_SEL && !pjSelExists()) PJ_SEL='';
      paintProjectsHub();
    }).catch(function(e){ $('main').innerHTML='<div class="card"><div class="empty">'+esc(e.message)+'</div></div>'; });

  function pjSelExists(){
    if(PJ_SEL.indexOf('co:')===0){ var c=PJ_SEL.slice(3); return ALL_TASKS.some(function(t){ return (t.customer||'(ไม่ระบุบริษัท)')===c; }); }
    if(PJ_SEL.indexOf('pj:')===0){ var id=PJ_SEL.slice(3); return PROJECTS.some(function(p){ return p.id===id; }); }
    return true;
  }
  function setPjSel(v){ PJ_SEL=v; paintProjectsHub(); }
  // งานตามที่ dropdown เลือกอยู่ ('' = ทั้งหมด · co:บริษัท · pj:รหัส)
  function pjScopeTasks(){
    if(PJ_SEL.indexOf('co:')===0){ var c=PJ_SEL.slice(3); return ALL_TASKS.filter(function(t){ return (t.customer||'(ไม่ระบุบริษัท)')===c; }); }
    if(PJ_SEL.indexOf('pj:')===0){ var id=PJ_SEL.slice(3); return ALL_TASKS.filter(function(t){ return t.project===id; }); }
    return ALL_TASKS.slice();
  }
  // จัดงาน 1 ใบเข้า 1 กลุ่ม (ไม่ซ้ำ): ยกเลิก→เกินกำหนด→เสร็จ→รอตรวจ→กำลังทำ→ใหม่
  function pjBucket(t){
    if(isCancel_(t)) return 'cancel';
    if(isOverdue_(t)) return 'over';
    var s=String(t.status||'');
    if(s.indexOf('เสร็จ')>=0) return 'done';
    if(s.indexOf('รอตรวจ')>=0) return 'review';
    if(s.indexOf('กำลังทำ')>=0) return 'doing';
    return 'new';
  }
  var PJ_STAGES=[['new','🆕 ใหม่'],['doing','🔵 กำลังทำ'],['review','🔍 รอตรวจ'],['done','✅ เสร็จ'],['over','⏰ เกินกำหนด'],['cancel','❌ ยกเลิก']];
  function paintProjectsHub(){
    // นับ "รายการ" = บริษัทที่มีงาน active (ไม่รวมยกเลิก) + project จัดเอง · ให้ตรงกับเว็บ bCustomers()
    var coSet={}; ALL_TASKS.forEach(function(t){ if(isCancel_(t))return; coSet[t.customer||'(ไม่ระบุบริษัท)']=1; });
    var coList=Object.keys(coSet), nItems=coList.length+PROJECTS.length;
    // dropdown เลือก
    var opt='<option value=""'+(PJ_SEL===''?' selected':'')+'>— ทั้งหมด —</option>';
    if(coList.length) opt+='<optgroup label="🏢 บริษัท">'+coList.map(function(c){ var v='co:'+c; return '<option value="'+esc(v)+'"'+(PJ_SEL===v?' selected':'')+'>'+esc(c)+'</option>'; }).join('')+'</optgroup>';
    if(PROJECTS.length) opt+='<optgroup label="📁 Project จัดเอง">'+PROJECTS.map(function(pj){ var v='pj:'+pj.id; return '<option value="'+esc(v)+'"'+(PJ_SEL===v?' selected':'')+'>'+esc(pj.name)+'</option>'; }).join('')+'</optgroup>';
    // แถวบน: กล่องจำนวน project (ตัวใหญ่ มีกรอบ) + ปุ่มเปิดงานใหม่ ข้างกัน
    var html='<div class="pj-toprow">'+
      '<div class="pj-count"><span class="pj-count-n">'+nItems+'</span><span class="pj-count-l">Project</span></div>'+
      '<button class="btn btn-primary pj-addbtn" onclick="pjAddTask()">➕<br>เปิดงานใหม่</button>'+
      (IS_OWNER?'<button class="btn btn-ghost pj-addbtn pj-mgbtn" onclick="openProjManage()">⚙️<br>จัดการ</button>':'')+'</div>'+
      // ช่องเลือก project — ใหญ่ เด่น
      '<div class="pj-pick2"><label>เลือก Project</label><select onchange="setPjSel(this.value)">'+opt+'</select></div>';
    // ทีม: ปุ่มรับงานหลายใบ (ถ้ามีงานยังไม่มีคนรับ) — คงฟีเจอร์เดิมจากหน้า "งานทั้งหมด"
    if(!IS_OWNER){ var nUn=ALL_TASKS.filter(function(t){ return t.unassigned && !isCancel_(t); }).length;
      if(nUn) html+='<div class="bulk-entry"><button class="btn btn-ghost" onclick="openBulk(\'claim\')">☑️ รับงานหลายใบ ('+nUn+')</button></div>'; }
    // header % ของ scope ที่เลือก (ไม่นับยกเลิกใน %/ยอดรวม)
    var scope=pjScopeTasks(), live=scope.filter(function(t){return !isCancel_(t);});
    var avg=avgPct(live), doneN=live.filter(function(t){return statusPct(t.status)===100;}).length;
    var title = PJ_SEL==='' ? 'ทุกงาน' : (PJ_SEL.indexOf('co:')===0 ? '🏢 '+PJ_SEL.slice(3)
                : '📁 '+(((PROJECTS.filter(function(p){return 'pj:'+p.id===PJ_SEL;})[0])||{}).name||PJ_SEL.slice(3)));
    html+='<div class="pj-hd2"><div class="pj-hd2-t">'+esc(title)+'</div>'+
      '<div class="pj-hd2-pct">'+avg+'<span>% สำเร็จ</span></div>'+
      pctBar(avg,true)+'<div class="pj-hd2-cnt">เสร็จ '+doneN+' / '+live.length+' งาน</div></div>';
    // งานแยก 6 สถานะ — หัวเป็นบาร์ยาวมีกรอบ · การ์ดแบบงานทั้งหมด
    if(!scope.length){ html+='<div class="card"><div class="emptybox">ยังไม่มีงาน 😊</div></div>'; $('main').innerHTML=html; return; }
    var bucket={new:[],doing:[],review:[],done:[],over:[],cancel:[]};
    scope.forEach(function(t){ bucket[pjBucket(t)].push(t); });
    PJ_STAGES.forEach(function(st){
      var arr=bucket[st[0]];
      if((st[0]==='over'||st[0]==='cancel') && !arr.length) return;   // เกินกำหนด/ยกเลิก ซ่อนถ้าไม่มี
      html+='<div class="stgbar stgbar-'+st[0]+'"><span>'+st[1]+'</span><span class="stgbar-n">'+arr.length+'</span></div>';
      if(arr.length) html+=arr.map(cardTkPj).join('');
    });
    $('main').innerHTML=html;
  }
  // ปุ่มเปิดงานใหม่ (บนสุด) — preset ตามที่ dropdown เลือกอยู่
  function pjAddTask(){
    if(PJ_SEL.indexOf('co:')===0) openCreateCo(PJ_SEL.slice(3));
    else if(PJ_SEL.indexOf('pj:')===0) openCreate(PJ_SEL.slice(3));
    else openCreate();
  }
  // การ์ดงานหัวสีตามประเภท (แบบหน้างานทั้งหมด · bMiniCard) + ปุ่มช่วยกัน (ทีม+พี่)
  function cardTkPj(t){
    var c=bCat(t.category);
    var h='<div class="bd-card pj-card">'+
      '<div class="bd-cbar" style="background:'+c.color+'">'+c.icon+' '+esc(c.label)+'<span class="no">'+esc(t.no)+'</span></div>'+
      '<div class="bd-cbody">'+
        '<div class="bd-ccust">🏢 '+esc(t.customer||'-')+'</div>'+
        '<div class="bd-crow"><span class="bd-badge '+bBadge(t.status)+'">'+esc(t.status)+'</span>'+
          (t.dueMs?'<span class="'+(isOverdue_(t)?'bd-over':'bd-age')+'">'+bThDate(t.dueMs)+(isOverdue_(t)?' เกินกำหนด':'')+'</span>':'')+'</div>'+
        '<div class="bd-ctitle">'+esc(bTtl(t))+'</div>'+
        '<div class="bd-casg'+(t.assignee?'':' none')+'">👤 '+(t.assignee?esc(t.assignee):'ยังไม่มอบหมาย')+'</div>';
    var btns=[];
    if(t.mine && t.status.indexOf('เสร็จ')<0 && t.status.indexOf('ยกเลิก')<0){
      if(t.status.indexOf('กำลังทำ')<0 && t.status.indexOf('รอตรวจ')<0)
        btns.push('<button class="btn btn-primary" onclick="doDoing(\''+esc(t.no)+'\')">🔵 รับงาน</button>');
      btns.push('<button class="btn btn-ok" onclick="openSubmit(\''+esc(t.no)+'\')">📤 ส่งตรวจ</button>');
    } else if(t.unassigned){
      btns.push('<button class="btn btn-primary" onclick="doClaim(\''+esc(t.no)+'\')">🙋 รับงานนี้</button>');
    }
    if(btns.length) h+='<div class="pj-cardacts">'+btns.join('')+'</div>';
    return h+'</div></div>';
  }
  // เปิดงานใหม่ให้บริษัท (preset ลูกค้า · ไม่ผูก project)
  function openCreateCo(cust){ CREATE_CUST=cust; openCreate(); }
  // การ์ดงานในบอร์ด project — แสดงผู้รับผิดชอบ + ช่วยกันรับ/ส่ง
  function cardProj(t){
    var h='<div class="tk"><div class="tk-top"><span class="tk-no">'+esc(t.no)+'</span>'+
      '<span class="tk-badge '+tkBadge(t.status)+'">'+esc(t.status)+'</span></div>'+
      '<div class="tk-cust">'+esc(t.title||t.customer||'-')+'</div>'+
      (t.customer&&t.title?'<div class="tk-cat">'+esc(t.customer)+'</div>':'')+
      (t.detail?'<div class="tk-detail">'+esc(t.detail)+'</div>':'')+
      '<div class="tk-kv"><b>ผู้รับผิดชอบ:</b> '+(t.assignee?esc(t.assignee):'<i>ยังไม่มีคนรับ</i>')+'</div>';
    var tpc=statusPct(t.status);
    if(tpc!==null) h+='<div class="tk-prog"><span class="tk-prog-l">ความคืบหน้า</span><span class="tk-prog-n '+pctClass(tpc)+'-t">'+tpc+'%</span></div>'+pctBar(tpc);
    if(t.note){ var isFix=t.note.indexOf('พี่ให้แก้ไข')>=0;
      h+='<div class="tk-kv"'+(isFix?' style="background:#FFF7E6;border-radius:9px;padding:8px 10px;color:#8A6D1E"':'')+'><b>'+(isFix?'📝 สิ่งที่ต้องแก้':'โน้ต')+':</b> '+esc(t.note.replace(/^📝 พี่ให้แก้ไข:\s*/,''))+'</div>'; }
    var btns=[], done=t.status.indexOf('เสร็จ')>=0, cancel=t.status.indexOf('ยกเลิก')>=0;
    if(!done&&!cancel){
      if(t.unassigned) btns.push('<button class="btn btn-primary" onclick="doClaim(\''+esc(t.no)+'\')">🙋 รับงาน</button>');
      else {
        if(t.status.indexOf('รอตรวจ')<0) btns.push('<button class="btn btn-ok" onclick="openSubmit(\''+esc(t.no)+'\')">📤 ส่งตรวจ</button>');
        if(t.mine&&t.hasGroup) btns.push('<button class="btn btn-ok" onclick="sendMine(\''+esc(t.no)+'\')">📨 ส่งลูกค้าเลย</button>');
        if(t.mine) btns.push('<button class="btn btn-ghost" onclick="openTransfer(\''+esc(t.no)+'\')">🔄 โอนงาน</button>');
      }
    }
    if(btns.length) h+='<div class="tk-acts">'+btns.join('')+'</div>';
    return h+'</div>';
  }
  function doClaim(no){ toast('กำลังรับงาน…');
    jsonp({action:'waClaim',uid:UID,no:no}).then(function(r){ if(!r||!r.ok){toast((r&&r.error)||'ไม่สำเร็จ');return;} toast('รับงานแล้ว 🙋'); refreshTasksView(); }).catch(function(e){toast(e.message);}); }

      '<div class="fld"><label>ลูกค้า (ถ้ามี · เว้นว่างได้)</label><input id="pCust" placeholder="ชื่อลูกค้า" value="'+esc(pj.customer||'')+'"></div>'+

    var params={action:'waProjectSave',uid:UID,id:id,name:name,customer:$('pCust').value.trim(),note:$('pNote').value.trim()};
    if(id&&$('pStatus')) params.status=$('pStatus').value;
    toast('กำลังบันทึก…');
    jsonp(params).then(function(r){ if(!r||!r.ok){ mErr((r&&r.error)||'บันทึกไม่สำเร็จ'); return; } toast('✅ บันทึก project แล้ว'); openProjManage(); }).catch(function(e){ mErr(e.message); });
  }
  // ── (พี่) จัดสมาชิก project/บริษัท ──
  function pjFindItem(id){ return PROJECTS.filter(function(p){return p.id===id;})[0] || COMPANIES.filter(function(c){return c.id===id;})[0] || {}; }
  function openProjMembers(id){

    toast('กำลังบันทึก…');

      if(!r||!r.ok){ mErr((r&&r.error)||'บันทึกไม่สำเร็จ'); return; } toast('✅ บันทึกสมาชิกแล้ว'); openProjManage();
    }).catch(function(e){ mErr(e.message); });

  // ── (พี่) หน้าจัดการ Project — list ทุก project + ปุ่มแก้/จัดสมาชิก (ใช้ได้ทั้งคอม+มือถือ) ──
  // เปิด modal ทันที (โชว์โครง/ของเดิม) แล้วค่อย refresh เฉพาะ #pjmList → กดปุ๊บเห็นปั๊บ ไม่ต้องรอเน็ต
  // 1 การ์ดต่อ 1 project/บริษัท · isCo=true → บริษัท (ไม่มีปุ่มแก้ · ชื่อ=ลูกค้า)
  function projManageItemRow(pj,isCo){
    var closed = pj.status && pj.status.indexOf('ปิด')>=0;
    var mem = pj.members||[];
    var badge = isCo ? '<span class="pjc-badge" style="color:#1B72E8;background:#EAF1FC">บริษัท</span>'
      : '<span class="pjc-badge"'+(closed?' style="color:#8A94A6;background:#EEF1F6"':'')+'>'+(closed?'ปิดแล้ว':'ทำอยู่')+'</span>';
    return '<div class="card pjm-card">'+
      '<div class="pjc-top"><div class="pjc-name">'+(isCo?'🏢 ':'📁 ')+esc(pj.name)+'</div>'+badge+'</div>'+
      '<div class="pjc-meta">'+(!isCo&&pj.customer?'🏢 '+esc(pj.customer)+' · ':'')+'งาน '+(pj.taskCount||0)+' · สำเร็จ '+(pj.pct||0)+'%</div>'+
      '<div class="pjc-mem">👥 '+(mem.length?esc(mem.join(', ')):'<i style="color:#C87F1E">ยังไม่มีสมาชิก</i>')+'</div>'+
      '<div class="pjc-acts">'+(isCo?'':'<button class="btn btn-ghost" onclick="openProjEdit(\''+esc(pj.id)+'\')">✏️ แก้ไข</button>')+
        '<button class="btn btn-ghost" onclick="openProjMembers(\''+esc(pj.id)+'\')">👥 สมาชิก ('+mem.length+')</button>'+
        '<button class="btn btn-danger pjm-delbtn" onclick="'+(isCo?'delCompany(\''+jss(pj.name)+'\')':'delProj(\''+esc(pj.id)+'\',\''+jss(pj.name)+'\')')+'" title="'+(isCo?'ยกเลิกงานทั้งกลุ่ม':'ลบ project')+'">🗑️</button></div>'+
      '</div>';
  }
  function projManageRows(){
    if(!PROJECTS.length && !COMPANIES.length) return '<div class="emptybox">ยังไม่มีงาน/project · กด "➕ สร้าง Project" เพื่อเริ่มค่ะ 😊</div>';

  function openProjManage(){
    // 1) เปิด modal ทันที — ถ้ามีข้อมูลเดิมโชว์เลย ไม่มีก็โชว์ skeleton
    var body = (PROJECTS.length||COMPANIES.length) ? projManageRows()

    // 2) refresh ข้อมูลล่าสุดใน background → แทนที่เฉพาะ list (modal/ปุ่มคงอยู่ ไม่กระพริบ)
    jsonp({action:'waProjectAdminList',uid:UID}).then(function(r){
      var el=$('pjmList'); if(!el) return;   // ปิด modal ไปแล้ว

  }
  window.openProjManage=openProjManage; window.openProjEdit=openProjEdit; window.openProjMembers=openProjMembers;

  // ── (พี่) ยกเลิกงานทั้งกลุ่มบริษัท (auto) — งานย้ายเป็น "ยกเลิก" กู้ได้ · กลุ่มหายจาก list ──

  // ═══════════ VIEW: ถังขยะ ═══════════
  var TRASH_ITEMS=[];
  function renderTrash(){
    skel();
    jsonp({action:'waTrashList',uid:UID}).then(function(r){
      if(!r||!r.ok){ $('main').innerHTML='<div class="card"><div class="empty">'+esc((r&&r.error)||'โหลดไม่สำเร็จ')+'</div></div>'; return; }
      TRASH_ITEMS=r.items||[]; paintTrash();
    }).catch(function(e){ $('main').innerHTML='<div class="card"><div class="empty">'+esc(e.message)+'</div></div>'; });
  }
  function trashTypeMeta(t){ return t==='task'?['🎫','งาน']:t==='project'?['📁','Project']:t==='leave'?['📝','ใบลา']:['🗑️','']; }
  function paintTrash(){
    var html='<div class="section-h">🗑️ ถังขยะ '+(IS_OWNER?'(ผู้ดูแล)':'(งานที่ยกเลิก)')+'</div>'+
      '<div class="m-hint" style="margin:0 0 12px">'+(IS_OWNER
        ?'♻️ กู้คืน = เอากลับมาใช้ · 🔥 ลบถาวร = ลบจริงกู้ไม่ได้ · งานที่ทีมขอกู้จะขึ้น 🙋 ให้เห็น'
        :'งานที่ถูกยกเลิก · อยากได้คืนกด 🙋 ขอกู้คืน แล้วพี่จะพิจารณาให้ค่ะ')+'</div>';
    if(!TRASH_ITEMS.length){ html+='<div class="card"><div class="emptybox">ถังขยะว่างเปล่า 🧺</div></div>'; $('main').innerHTML=html; return; }
    html+=TRASH_ITEMS.map(trashCard).join('');
    $('main').innerHTML=html;
  }
  function trashCard(it){
    var m=trashTypeMeta(it.type), req=it.state==='requested';
    var h='<div class="card trash-card">'+
      '<div class="tc-top"><span class="tc-badge">'+m[0]+' '+esc(m[1])+'</span>'+
        (req?'<span class="tc-req">🙋 ทีมขอกู้'+(it.reqBy?' · '+esc(it.reqBy):'')+'</span>':'')+'</div>'+
      '<div class="tc-label">'+esc(it.label||it.ref)+'</div>'+
      '<div class="tc-meta">ลบโดย '+esc(it.by||'-')+(it.at?' · '+esc(it.at):'')+'</div>';
    var btns=[];

  // ═══════════ เลือกหลายรายการ (bulk) — รับงาน (ทีม) / ส่งลูกค้า (พี่) ═══════════

  // ═══════════ VIEW: เบิกค่าใช้จ่าย ═══════════
  function renderExpense(){

    jsonp({action:'waExpenseInit', uid:UID}).then(function(r){

  function expBadge(s){ s=String(s||''); if(s.indexOf('จ่าย')>=0)return'b-done'; if(s.indexOf('ไม่')>=0)return'b-cancel'; if(s.indexOf('อนุมัติ')>=0)return'b-doing'; return'b-new'; }
  function paintExpense(list){

  function openExpense(){

  // ═══════════ VIEW: รอตรวจ (พี่ · งานที่ทีมส่งกลับ รอตรวจก่อนส่งลูกค้า) ═══════════
  function renderReview(){
    if(IS_OWNER){ renderOwnerBoard('review'); return; }   // พี่ → บอร์ดสไตล์เดียวกัน (เฉพาะงานรอตรวจ)
    skel();
    jsonp({action:'waBoard', uid:UID}).then(function(r){
      if(!r||!r.ok){ $('main').innerHTML='<div class="card"><div class="empty">'+esc((r&&r.error)||'โหลดไม่สำเร็จ')+'</div></div>'; return; }
      var ts=(r.tasks||[]).filter(function(t){ return t.status.indexOf('รอตรวจ')>=0; });
      ts.sort(function(a,b){ return (a.dueMs||9e15)-(b.dueMs||9e15); });
      var html=summaryHtml(ts);
      html+= ts.length ? ts.map(reviewCard).join('') : '<div class="card"><div class="emptybox">ไม่มีงานรอตรวจในตอนนี้ 🎉</div></div>';
      $('main').innerHTML=html;
    }).catch(function(e){ $('main').innerHTML='<div class="card"><div class="empty">'+esc(e.message)+'</div></div>'; });
  }
  function reviewCard(t){
    var h='<div class="tk"><div class="tk-top"><span class="tk-no">'+esc(t.no)+'</span>'+
      '<span class="tk-badge b-review">'+esc(t.status)+'</span></div>'+
      '<div class="tk-cust">'+esc(t.customer||'-')+'</div>'+
      (t.detail?'<div class="tk-detail">'+esc(t.detail)+'</div>':'')+
      '<div class="tk-asg'+(t.assignee?'':' none')+'">👤 '+(t.assignee?esc(t.assignee):'ยังไม่มอบหมาย')+'</div>';
    if(t.worklink) h+='<div class="tk-kv"><b>ลิงก์งานจากทีม:</b> '+wlLinksHtml(t.worklink)+'</div>';
    if(t.reply) h+='<div class="tk-kv"><b>คำอธิบายถึงลูกค้า:</b> '+esc(t.reply)+'</div>';
    if(t.note) h+='<div class="tk-kv"><b>โน้ตจากทีม:</b> '+esc(t.note)+'</div>';
    var btns=[];
    if(t.hasGroup) btns.push('<button class="btn btn-ok" onclick="doSend(\''+esc(t.no)+'\')">📨 ส่งให้ลูกค้า</button>');
    btns.push('<button class="btn btn-ghost" onclick="openReturn(\''+esc(t.no)+'\')">🔁 ส่งกลับแก้ไข</button>');
    h+='<div class="tk-acts">'+btns.join('')+'</div>';
    if(!t.hasGroup) h+='<div class="tk-kv" style="color:#C87F1E">⚠️ งานนี้ไม่มีกลุ่ม LINE ลูกค้า (ส่งให้ลูกค้าไม่ได้ · ตีกลับแก้ไขได้)</div>';
    return h+'</div>';

  // ── ส่งกลับให้ทีมแก้ไข (พร้อมโน้ตสิ่งที่ต้องแก้) ──

  var DOCTYPES=[], RQ={ type:'', detail:'' };

      : '<div class="card"><div class="emptybox">ยังไม่มีเอกสารในคลัง 🙏</div></div>';
    // ขอเอกสารใหม่ (ฟอร์ม)

  // บอร์ดจัดการงาน (เฉพาะพี่/owner) — การ์ดสรุป + แท็บมุมมอง + ตาราง + จัดการงาน

  var BVIEW='list', BTASKS=[], BALL=[], BSCOPE='all', BTEAM=[], BSTATUSES=[], BTYPESLIST=[], BOWNER='', BNOW=0, BCATS=[], BPROJECTS=[];

  var BVIEWS=[['list','📋 รายการ'],['type','📁 ตามประเภท'],['company','🏢 ราย บริษัท'],['cards','🗂️ การ์ด'],['kanban','📊 คอลัมน์'],['calendar','📅 ปฏิทิน']];
  var BSCOPE_EMPTY={ all:'ยังไม่มีงานในระบบ 😊', mine:'ยังไม่มีงานที่มอบหมายให้คุณ 😊', review:'ไม่มีงานรอตรวจในตอนนี้ 🎉' };
  var BCACHE={ at:0, data:null }, BTTL=30000;   // แคชข้อมูลบอร์ด (waPmBoard) — สลับ scope ได้ทันที · รีเฟรชเมื่อเกิน 30 วิ/หลังแก้ไข
  var BMON=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

  function bFind(no){ return BTASKS.filter(function(x){return x.no===no;})[0]; }

  function bOver(t){ return t.dueMs && !bDone(t) && BNOW>bEnd(t.dueMs); }
  function bTtl(t){ return t.title||t.detail||t.no; }
  function bBadge(st){ if(st.indexOf('กำลังทำ')>=0)return'bb-doing'; if(st.indexOf('รอตรวจ')>=0)return'bb-review'; if(st.indexOf('เสร็จ')>=0)return'bb-done'; return'bb-new'; }
  function bDot(st){ if(st.indexOf('กำลังทำ')>=0)return'#2D7FF9'; if(st.indexOf('รอตรวจ')>=0)return'#C87F1E'; if(st.indexOf('เสร็จ')>=0)return'#1E9E5A'; return'#8A94A6'; }
  function bThDate(ms){ if(!ms)return''; var d=new Date(ms); return d.getDate()+' '+BMON[d.getMonth()]+' '+String((d.getFullYear()+543)%100); }
  function bIso(ms){ var d=new Date(ms); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  function bInRange(t){
    if(BRANGE==='all') return true;
    var ms=t.createdMs||0; if(!ms) return false;
    var now=new Date(BNOW), y=now.getFullYear(), m=now.getMonth();
    if(BRANGE==='month')     return ms>=new Date(y,m,1).getTime();
    if(BRANGE==='lastmonth') return ms>=new Date(y,m-1,1).getTime() && ms<new Date(y,m,1).getTime();
    if(BRANGE==='last7')     return ms>=BNOW-7*BDAY;
    if(BRANGE==='last30')    return ms>=BNOW-30*BDAY;

  function bDueHtml(t){ if(!t.dueMs) return '<span class="bd-age">ไม่มีกำหนด</span>';
    var s=bThDate(t.dueMs); if(bOver(t)) s+=' <span class="bd-over">เกินกำหนด</span>'; return s; }

  function bScopeTasks(list){
    if(BSCOPE==='mine')   return list.filter(function(t){ return t.assignee && BOWNER && t.assignee===BOWNER; });
    if(BSCOPE==='review') return list.filter(function(t){ return t.status.indexOf('รอตรวจ')>=0; });

  function bApplyData(r){

  function bFetch(mode){   // mode: 'spinner' (รอโหลด) | 'silent' (คงจอเดิม รีเฟรชเบื้องหลัง)
    jsonp({action:'waPmBoard', uid:UID}).then(function(r){

      BCACHE={ at:Date.now(), data:r };
      if(bOnBoardView() && !document.getElementById('modal')){ bApplyData(r); bShell(); }   // repaint เฉพาะตอนยังอยู่หน้าบอร์ด + ไม่มี modal เปิด

  function renderOwnerBoard(scope, force){

    BSCOPE=scope;

    if(BCACHE.data){                                    // มีแคช → แสดงทันที
      bApplyData(BCACHE.data); bShell();
      if(Date.now()-BCACHE.at>BTTL) bFetch('silent');   // แคชเก่า → รีเฟรชเบื้องหลัง
      return;

  function bStatusOf(sub){ for(var i=0;i<BSTATUSES.length;i++){ if(BSTATUSES[i].indexOf(sub)>=0) return BSTATUSES[i]; } return ''; }
  function bMatchFilter(t){ if(!BFILTER) return true; if(BFILTER==='__over__') return bOver(t); return t.status===BFILTER; }
  function bCustomers(){ var s={},o=[]; BALL.forEach(function(t){ if(t.status.indexOf('ยกเลิก')>=0)return; var c=t.customer||'(ไม่ระบุบริษัท)'; if(!s[c]){s[c]=1;o.push(c);} }); return o; }
  function bMatchProject(t){
    if(!BFPROJECT) return true;
    if(BFPROJECT==='__none__') return !t.project;
    if(BFPROJECT.indexOf('co:')===0) return (t.customer||'(ไม่ระบุบริษัท)')===BFPROJECT.slice(3);   // กลุ่มไลน์/ลูกค้า
    if(BFPROJECT.indexOf('pj:')===0) return t.project===BFPROJECT.slice(3);   // project จัดเอง
    return t.project===BFPROJECT;
  }
  function bStatCard(cls,lab,num,kind,active){ return '<div class="bd-stat '+cls+(active?' active':'')+'" onclick="bStatFilter(\''+kind+'\')" title="คลิกเพื่อกรอง"><div class="lab">'+lab+'</div><div class="num">'+num+'</div></div>'; }
  function bKindSub(kind){ return kind==='new'?'ใหม่':kind==='doing'?'กำลังทำ':kind==='review'?'รอตรวจ':'เสร็จ'; }
  // แถวบน: ตัวกรอง Project + บาร์ % ความสำเร็จของ project ที่เลือก
  function bRenderPjBar(){

      (BPROJECTS.length?'<optgroup label="Project จัดเอง">'+BPROJECTS.map(function(p){return '<option value="pj:'+esc(p.id)+'">📁 '+esc(p.name)+'</option>';}).join('')+'</optgroup>':'')+

  function bRenderStats(){

    function c(sub){ return base.filter(function(t){ return t.status.indexOf(sub)>=0; }).length; }
    function act(kind){ if(kind==='all') return !BFILTER; if(kind==='over') return BFILTER==='__over__';
      return BFILTER===bStatusOf(bKindSub(kind)); }
    // หน้า Project → 2 การ์ดบน: จำนวน Project (กดดู/จัดการ) + สร้าง Project ใหม่
    // (เปิดงานใหม่ อยู่ปุ่มแถบบนแล้ว — ไม่ทำซ้ำที่นี่)

  function bStatFilter(kind){
    var target = kind==='all' ? '' : kind==='over' ? '__over__'
      : bStatusOf(bKindSub(kind));
    BFILTER = (BFILTER===target) ? '' : target;   // กดซ้ำการ์ดเดิม = ล้างตัวกรอง
    var fs=$('bFStatus'); if(fs) fs.value = (BFILTER && BFILTER!=='__over__') ? BFILTER : '';
    bRender();
  }
  window.bStatFilter=bStatFilter;
  function bVisible(){
    var arr=BTASKS.filter(function(t){
      if(!bInRange(t)) return false;
      if(t.status.indexOf('ยกเลิก')>=0) return false;
      if(!bMatchFilter(t)) return false;
      if(!bMatchProject(t)) return false;
      if(BFCAT && t.category!==BFCAT) return false;
      if(BQ){ var h=(t.no+' '+(t.customer||'')+' '+(t.detail||'')+' '+(t.assignee||'')).toLowerCase(); if(h.indexOf(BQ)<0) return false; }
      return true;
    });
    var stOrder={}; BSTATUSES.forEach(function(s,i){stOrder[s]=i;});
    arr.sort(function(a,b){
      if(BSORT==='customer') return (a.customer||'').localeCompare(b.customer||'','th');
      if(BSORT==='status') return (stOrder[a.status]||0)-(stOrder[b.status]||0);
      if(BSORT==='assignee') return (a.assignee||'zzz').localeCompare(b.assignee||'zzz','th');

  // จัดการงาน (modal)
  // ── ลิงก์งานหลายอัน — เก็บ "ชื่อ | url" บรรทัดละอัน (backward: บรรทัดไม่มี | = url ล้วน) ──
  function wlParse(s){
    return String(s||'').split('\n').map(function(ln){
      ln=ln.trim(); if(!ln) return null;
      var i=ln.indexOf('|');
      return i<0 ? {name:'',url:ln} : {name:ln.slice(0,i).trim(),url:ln.slice(i+1).trim()};
    }).filter(function(x){ return x && x.url; });
  }
  function wlNorm(u){ u=String(u||'').trim(); if(!u) return ''; if(/^https?:\/\//i.test(u)) return u; if(u.indexOf(' ')<0 && /^[\w.-]+\.[a-z]{2,}(\/.*)?$/i.test(u)) return 'https://'+u; return ''; }
  function wlLinksHtml(s){
    var a=wlParse(s); if(!a.length) return '';
    return a.map(function(it){ var u=wlNorm(it.url);
      return u ? '<a href="'+esc(u)+'" target="_blank" style="word-break:break-all">🔗 '+esc(it.name||it.url)+'</a>'
               : '🔗 '+esc((it.name?it.name+': ':'')+it.url); }).join('<br>');
  }
  function wlClinksHtml(s){
    return wlParse(s).map(function(it){ var u=wlNorm(it.url); if(!u) return '';
      return '<a class="bd-clink" href="'+esc(u)+'" target="_blank" onclick="event.stopPropagation()">🔗 '+esc(it.name||'เปิดลิงก์งาน / เอกสาร')+'</a>'; }).join('');
  }
  function wlRowHtml(it){
    it=it||{name:'',url:''};
    return '<div class="wl-row" style="display:flex;gap:6px;margin-bottom:6px;align-items:center">'+
      '<input class="wl-name" placeholder="ชื่อ" value="'+esc(it.name||'')+'" style="flex:0 0 27%;width:auto;min-width:0;padding:9px 8px">'+
      '<input class="wl-url" placeholder="https://…" value="'+esc(it.url||'')+'" style="flex:1 1 0;width:auto;min-width:0;padding:9px 8px">'+
      '<button type="button" onclick="wlDelRow(this)" style="flex:0 0 34px;width:34px;height:38px;padding:0;border:1.5px solid var(--line);border-radius:8px;background:#fff;color:#DC2626;font-size:15px;line-height:1;cursor:pointer">✕</button></div>';
  }
  function wlRowsHtml(s){ var a=wlParse(s); if(!a.length) a=[{name:'',url:''}]; return a.map(wlRowHtml).join(''); }
  function wlAddRow(){ var b=$('mWlBox'); if(b) b.insertAdjacentHTML('beforeend', wlRowHtml()); }
  function wlDelRow(btn){ var r=btn.parentNode; if(r&&r.parentNode) r.parentNode.removeChild(r); }
  function wlCollect(){
    var out=[]; Array.prototype.forEach.call(document.querySelectorAll('#mWlBox .wl-row'),function(r){
      var url=r.querySelector('.wl-url').value.trim(); if(!url) return;
      var nm=r.querySelector('.wl-name').value.trim(); out.push(nm?(nm+' | '+url):url);
    }); return out.join('\n');
  }

  function bSaveTask(no){
    var t=bFind(no); if(!t) return;
    var title=$('mTitle').value.trim(), st=$('mStatus').value, asg=$('mAsg').value, rev=$('mRev').value, cat=$('mCat').value, due=$('mDue').value;
    var jobs=[];
    if(title!==(t.title||'')) jobs.push(jsonp({action:'waSetTitle',uid:UID,no:no,title:title}));
    if(st!==t.status) jobs.push(jsonp({action:'waSetStatus',uid:UID,no:no,status:st}));
    if(asg!==(t.assignee||'')) jobs.push(jsonp({action:'waAssign',uid:UID,no:no,name:asg||' '}));
    if(rev!==(t.reviewer||'')) jobs.push(jsonp({action:'waSetReviewer',uid:UID,no:no,reviewer:rev}));
    if(bCat(cat).k!==bCat(t.category).k) jobs.push(jsonp({action:'waSetCategory',uid:UID,no:no,category:cat}));   // เทียบด้วย key (สั่งงาน↔แจ้งงาน = ไม่เปลี่ยน)
    var curDue=t.dueMs?bIso(t.dueMs):'';
    if(due!==curDue) jobs.push(jsonp({action:'waSetDue',uid:UID,no:no,due:due}));
    var pj=$('mProject')?$('mProject').value:(t.project||'');
    if(pj!=='__new__' && pj!==(t.project||'')) jobs.push(jsonp({action:'waAssignProject',uid:UID,no:no,pid:pj}));   // จัดงานเข้า/ออก project
    if(IS_OWNER){ var cust=$('mCust')?$('mCust').value.trim():(t.customer||''); if(cust!==(t.customer||'')) jobs.push(jsonp({action:'waSetCustomer',uid:UID,no:no,customer:cust})); }
    var wl=wlCollect(); if(wl!==String(t.worklink||'').trim()) jobs.push(jsonpPost({action:'waSetWorkLink',uid:UID,no:no,worklink:wl}));   // POST กันลิงก์หลายอันยาวเกิน URL
    if(!jobs.length){ closeModal(); return; }
    toast('กำลังบันทึก…');
    Promise.all(jobs).then(function(){ closeModal(); toast('บันทึกแล้ว ✅'); renderOwnerBoard(BSCOPE, true); }).catch(function(e){ mErr(e.message); });
  }
  // เลือก project ใน modal งาน — ถ้าเลือก "สร้างใหม่" → เปิดฟอร์มสร้าง+จัดเข้าเลย
  function bProjSel(no){ if($('mProject') && $('mProject').value==='__new__'){ closeModal(); bNewProjectInline(no); } }
  function bNewProjectInline(no){
    modal('<h3>➕ สร้าง Project</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="fld"><label>ชื่อ Project</label><input id="npName" placeholder="เช่น ปิดบัญชี Q3, งานอีเวนต์ลูกค้า A"></div>'+
      '<div class="m-hint">งาน '+esc(no)+' จะถูกจัดเข้า project นี้ทันที · เพิ่มงานอื่นเข้าทีหลังได้</div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="bOpenTask(\''+esc(no)+'\')">← กลับ</button>'+
      '<button class="btn btn-primary" onclick="bDoNewProject(\''+esc(no)+'\')">สร้าง + จัดงานเข้า</button></div>');
  }
  function bDoNewProject(no){
    var name=$('npName').value.trim();
    if(!name){ mErr('กรอกชื่อ project ก่อนค่ะ'); return; }
    toast('กำลังสร้าง project…');
    jsonp({action:'waProjectSave',uid:UID,id:'',name:name}).then(function(r){
      if(!r||!r.ok||!r.id) throw new Error((r&&r.error)||'สร้างไม่สำเร็จ');
      return jsonp({action:'waAssignProject',uid:UID,no:no,pid:r.id});
    }).then(function(r2){
      if(!r2||!r2.ok) throw new Error((r2&&r2.error)||'จัดงานเข้าไม่สำเร็จ');
      closeModal(); toast('✅ สร้าง + จัดงาน '+no+' เข้า project แล้ว'); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  // สร้าง project เปล่า (จากการ์ด "สร้าง Project")
  function bNewProject(){
    modal('<h3>➕ สร้าง Project</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="fld"><label>ชื่อ Project</label><input id="npName" placeholder="เช่น ปิดบัญชี Q3, งานอีเวนต์ลูกค้า A"></div>'+
      '<div class="fld"><label>ลูกค้า <span class="bd-age">(ถ้ามี · เว้นว่างได้)</span></label><input id="npCust" placeholder="ชื่อลูกค้า"></div>'+
      '<div class="m-hint">สร้างแล้วไปจัดงานเข้า project นี้ได้ที่การ์ดงาน (📁 จัดเข้า Project) หรือกรองดูจากตัวกรอง Project</div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="bDoCreateProject()">สร้าง Project</button></div>');
  }
  function bDoCreateProject(){
    var name=$('npName').value.trim();
    if(!name){ mErr('กรอกชื่อ project ก่อนค่ะ'); return; }
    toast('กำลังสร้าง project…');
    jsonp({action:'waProjectSave',uid:UID,id:'',name:name,customer:$('npCust').value.trim()}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'สร้างไม่สำเร็จ'); return; }
      closeModal(); toast('✅ สร้าง project แล้ว'); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  function bSendCust(no){
    toast('กำลังส่งให้ลูกค้า…');
    jsonp({action:'waSendCustomer',uid:UID,no:no}).then(function(r){ if(!r||!r.ok){ mErr((r&&r.error)||'ส่งไม่สำเร็จ'); return; } closeModal(); toast('✅ ส่งให้ลูกค้าแล้ว'); renderOwnerBoard(BSCOPE, true); }).catch(function(e){ mErr(e.message); });
  }
  function bOpenReturn(no){
    modal('<h3>🔁 ส่งกลับให้แก้ไข · '+esc(no)+'</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="m-hint">งานจะกลับไปสถานะ 🔵 กำลังทำ + แจ้งผู้รับผิดชอบทาง LINE พร้อมสิ่งที่ต้องแก้</div>'+
      '<div class="fld"><label>สิ่งที่ต้องแก้ไข *</label><textarea id="rNote" placeholder="เช่น แก้สีโลโก้ให้เข้มขึ้น, เพิ่มเบอร์ท้ายโพสต์…"></textarea></div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="bDoReturn(\''+esc(no)+'\')">🔁 ส่งกลับแก้ไข</button></div>');
  }
  function bDoReturn(no){
    var note=$('rNote').value.trim();
    if(!note){ mErr('ระบุสิ่งที่ต้องแก้ไขก่อนค่ะ'); return; }
    toast('กำลังส่งกลับ…');
    jsonpPost({action:'waTaskReturn',uid:UID,no:no,note:note}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'ส่งกลับไม่สำเร็จ'); return; }
      closeModal(); toast('🔁 ส่งกลับให้ '+(r.assignee||'ทีม')+' แก้ไขแล้ว'); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  // โอนงาน (บอร์ด owner) — เลือกคนใหม่ → waAssign (แจ้ง LINE คนใหม่อัตโนมัติ)
  function bOpenTransfer(no){
    var t=bFind(no); if(!t) return;
    var opts='<option value="">— เลือกคนรับงาน —</option>'+BTEAM.map(function(mm){var n=mm.name;return '<option value="'+esc(n)+'"'+(n===t.assignee?' selected':'')+'>'+esc(n+(mm.nick&&mm.nick!==mm.name?' ('+mm.nick+')':''))+'</option>';}).join('');
    modal('<h3>🔄 โอนงาน '+esc(no)+'</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="m-hint">เลือกคนรับงานใหม่ → ระบบเปลี่ยนผู้รับผิดชอบ + แจ้ง LINE ให้เขาทันที</div>'+
      '<div class="fld"><label>โอนให้</label><select id="mtAsg">'+opts+'</select></div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="bDoTransfer(\''+esc(no)+'\')">🔄 โอนงาน</button></div>');
  }
  function bDoTransfer(no){
    var name=$('mtAsg').value;
    if(!name){ mErr('เลือกคนรับงานก่อนค่ะ'); return; }
    toast('กำลังโอนงาน…');
    jsonp({action:'waAssign',uid:UID,no:no,name:name}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'โอนไม่สำเร็จ'); return; }
      closeModal(); toast('🔄 โอนงานให้ '+(r.assignee||name)+' แล้ว'+(r.notified?' (แจ้ง LINE ให้)':'')); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  // ยกเลิกงาน (บอร์ด owner) — ยืนยันในหน้า (เลี่ยง confirm() ที่ LIFF บล็อก) → waCancel
  function bOpenCancel(no){
    modal('<h3>❌ ยกเลิกงาน '+esc(no)+'</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="m-hint">งานจะถูกตั้งสถานะเป็น ❌ ยกเลิก และไม่นับในสรุป · ย้อนได้ภายหลังโดยเปลี่ยนสถานะกลับ</div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ไม่ยกเลิก</button>'+
      '<button class="btn btn-danger" onclick="bDoCancel(\''+esc(no)+'\')">❌ ยืนยันยกเลิกงาน</button></div>');
  }
  function bDoCancel(no){
    toast('กำลังยกเลิก…');
    jsonp({action:'waCancel',uid:UID,no:no}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'ยกเลิกไม่สำเร็จ'); return; }
      closeModal(); toast('❌ ยกเลิกงาน '+no+' แล้ว'); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  function bOpenCreate(){
    var asgOpts='<option value="">— ยังไม่มอบหมาย —</option>'+BTEAM.map(function(mm){return '<option value="'+esc(mm.name)+'">'+esc(mm.name)+'</option>';}).join('');
    var catOpts=BCATS_EDIT.map(function(o){return '<option value="'+esc(o.v)+'">'+o.lb+'</option>';}).join('');
    modal('<h3>+ เปิดงานใหม่</h3><div id="mErr" class="m-err hidden"></div>'+
      '<div class="fld"><label>ประเภท <span class="bd-age">(กำหนดสีการ์ด)</span></label><select id="cbCat">'+catOpts+'</select></div>'+
      '<div class="fld"><label>หัวข้องาน <span class="bd-age">(เว้นว่าง = ตัดจากรายละเอียด)</span></label><input id="cbTitle" placeholder="หัวข้อสั้น ๆ"></div>'+
      '<div class="fld"><label>ลูกค้า/บริษัท</label><input id="cbCust" placeholder="เช่น ร้านกาแฟดีใจ"></div>'+
      '<div class="fld"><label>รายละเอียดงาน</label><textarea id="cbDetail" placeholder="สิ่งที่ต้องทำ…"></textarea></div>'+
      '<div class="fld"><label>ผู้รับผิดชอบ</label><select id="cbAsg">'+asgOpts+'</select></div>'+
      '<div class="fld"><label>กำหนดเสร็จ</label><input id="cbDue" type="date"></div>'+
      '<div class="m-act"><button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>'+
      '<button class="btn btn-primary" onclick="bCreateTask()">สร้างงาน</button></div>');
  }
  function bCreateTask(){
    var cust=$('cbCust').value.trim(), detail=$('cbDetail').value.trim();
    if(!cust && !detail){ mErr('กรอกลูกค้าหรือรายละเอียดอย่างน้อย 1 ช่อง'); return; }
    toast('กำลังเปิดงาน…');
    jsonpPost({action:'waCreateTask',uid:UID,title:$('cbTitle').value.trim(),customer:cust,detail:detail,category:$('cbCat').value,assignee:$('cbAsg').value,due:$('cbDue').value}).then(function(r){
      if(!r||!r.ok){ mErr((r&&r.error)||'สร้างไม่สำเร็จ'); return; } closeModal(); toast('เปิดงานใหม่แล้ว '+(r.no||'')); renderOwnerBoard(BSCOPE, true);
    }).catch(function(e){ mErr(e.message); });
  }
  window.bSetView=bSetView; window.bCalMove=bCalMove; window.bOpenTask=bOpenTask; window.bSaveTask=bSaveTask;
  window.bSendCust=bSendCust; window.bOpenReturn=bOpenReturn; window.bDoReturn=bDoReturn; window.bOpenCreate=bOpenCreate; window.bCreateTask=bCreateTask;
  window.bOpenTransfer=bOpenTransfer; window.bDoTransfer=bDoTransfer;
  window.bOpenCancel=bOpenCancel; window.bDoCancel=bDoCancel;

  // ───── init ─────
  // รวม param จาก query ตรง + liff.state (LIFF บางครั้งห่อ query เดิมไว้ใน liff.state)
  function allParams(){
    var out={};
    try{
      var sp=new URLSearchParams(location.search);
      sp.forEach(function(v,k){ out[k]=v; });
      var st=sp.get('liff.state');
      if(st){ var inner=new URLSearchParams(st.charAt(0)==='?'?st.slice(1):st);
        inner.forEach(function(v,k){ if(out[k]==null) out[k]=v; }); }
    }catch(e){}
    return out;
  }
  function startParam(){ return String(allParams().p||'').toLowerCase(); }
  function uidOverride(){ try{ return new URLSearchParams(location.search).get('uid')||''; }catch(e){ return ''; } }
  function start(){
    jsonp({action:'waBootstrap', uid:UID}).then(function(r){
      if(!r||!r.ok){ fatal((r&&r.error)||'โหลดข้อมูลไม่สำเร็จ'); return; }
      NICK=r.nick||''; if(NICK){ $('hdSub').textContent=NICK; }
      IS_OWNER=!!r.isOwner;
      if(IS_OWNER){ var nr=$('navReview'); if(nr) nr.style.display=''; }   // แท็บรอตรวจ = เฉพาะพี่/ผู้ตรวจ
      $('loader').classList.add('hidden'); $('app').classList.remove('hidden');
      Array.prototype.forEach.call(document.querySelectorAll('.nav-btn'), function(b){
        b.addEventListener('click', function(){ switchView(b.dataset.view); }); });
      var sp=startParam();
      switchView(sp==='docs' ? 'docs' : (sp==='work' ? 'projects' : 'leave'));
      // อุ่นแคชเบื้องหลัง → คลิกการลา/เอกสารครั้งแรกเด้งทันที (ไม่แย่งจอแรกโหลด)
      setTimeout(function(){ if(!LVCACHE.data) _leaveFetch(true); if(IDTOKEN && !DOCCACHE.data) _docsFetch(true); }, 900);
    }).catch(function(e){ fatal(e.message); });
  }
  (function init(){
    // Face Scan: LIFF endpoint ชี้มาที่ user-app → เด้งต่อไปหน้าสแกนหน้า/ลงทะเบียน (คง kind)
    var _pp=allParams(), _p=String(_pp.p||'').toLowerCase();
    if(_p==='clock'||_p==='face'||_p==='face-clock'||_p==='enroll'||_p==='face-enroll'){
      var _t=(_p==='enroll'||_p==='face-enroll') ? 'face-enroll.html' : 'face-clock.html';
      location.replace(_t + (_pp.kind ? '?kind='+encodeURIComponent(_pp.kind) : '')); return;
    }
    var ov=uidOverride();
    if(ov){ UID=ov; start(); return; }
    liff.init({liffId:LIFF_ID}).then(function(){
      if(!liff.isLoggedIn()){ liff.login({redirectUri:location.href}); return; }
      try{ IDTOKEN=liff.getIDToken()||''; }catch(e){ IDTOKEN=''; }
      return liff.getProfile().then(function(pf){ UID=pf.userId;
        if(pf.pictureUrl){ $('avatar').innerHTML='<img src="'+pf.pictureUrl+'" alt="">'; $('tbAvatar').innerHTML='<img src="'+pf.pictureUrl+'" alt="">'; }
        start(); });
    }).catch(function(e){ fatal('เปิดผ่านไลน์ไม่สำเร็จ: '+(e.message||e)); });
  })();
</script>
</body>
</html>
