document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle=\"width:332px; background:#11202e; border-radius:38px; padding:11px; box-shadow:0 24px 64px rgba(15,35,70,.30); margin:0 auto;\">\n        <div style=\"background:#000; border-radius:28px; overflow:hidden; display:flex; flex-direction:column; height:636px;\">\n\n          <div style=\"background:var(--brand); color:#fff; padding:12px 14px; display:flex; align-items:center; gap:9px;\">\n            <span style=\"font-size:19px; opacity:.9;\">‹<\u002Fspan>\n            <span style=\"width:30px; height:30px; border-radius:50%; background:#fff; color:var(--brand); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px;\">M<\u002Fspan>\n            <div style=\"line-height:1.25;\"><div style=\"font-weight:600; font-size:14px;\">Moodata × บ.ตัวอย่าง<\u002Fdiv><div style=\"font-size:11px; opacity:.85;\">กลุ่มลูกค้า · บอท + 3 สมาชิก<\u002Fdiv><\u002Fdiv>\n            <span style=\"margin-left:auto; font-size:18px; opacity:.9;\">⋮<\u002Fspan>\n          <\u002Fdiv>\n\n          <div ref=\"{{ msgsRef }}\" style=\"flex:1; overflow-y:auto; background:var(--chatbg); padding:14px 12px 6px; display:flex; flex-direction:column;\">\n            <sc-for list=\"{{ messages }}\" as=\"m\" hint-placeholder-count=\"0\">\n              <sc-if value=\"{{ m.isMe }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex; justify-content:flex-end; margin-bottom:9px;\">\n                  <div style=\"max-width:78%; background:#a0e75a; color:#13310a; padding:9px 13px; border-radius:16px; border-bottom-right-radius:5px; font-size:13.5px; line-height:1.5; white-space:pre-line; box-shadow:0 1px 2px rgba(0,0,0,.1); animation:bub .26s ease both;\">{{ m.text }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ m.isBot }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex; gap:7px; align-items:flex-end; margin-bottom:9px;\">\n                  <div styl span> โอนเงินสำเร็จ<\u002Fdiv>\n                      <div style=\"padding:10px 12px; display:flex; flex-direction:column; gap:5px;\">\n                        <div style=\"display:flex; justify-content:space-between; font-size:12px;\"><span style=\"color:#7a8aa0;\">จำนวน<\u002Fspan><span style=\"font-weight:700;\">฿32,100.00<\u002Fspan><\u002Fdiv>\n                        <div style=\"display:flex; justify-content:space-between; font-size:12px;\"><span style=\"color:#7a8aa0;\">ธนาคาร<\u002Fspan><span style=\"font-weight:600;\">KBANK<\u002Fspan><\u002Fdiv>\n                        <div style=\"display:flex; justify-content:space-between; font-size:12px;\"><span style=\"color:#7a8aa0;\">เวลา<\u002Fspan><span style=\"font-weight:600;\">28/06 10:24<\u002Fspan><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ m.isDoc }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"width:206px; background:#fff; border-radius:13px; box-shadow:0 2px 9px rgba(20,40,80,.18); padding:12px; display:flex; align-items:center; gap:11px; animation:bub .26s ease both;\">\n                      <div style=\"flex:0 0 auto; width:38px; height:46px; border-radius:6px; background:#fdecec; color:#d44; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;\">PDF<\u002Fdiv>\n                      <div style=\"min-width:0;\"><div style=\"font-size:12.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">ใบกำกับภาษี.pdf<\u002Fdiv><div style=\"font-size:11px; color:#9aa7b7;\">248 KB<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ showTyping }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; gap:7px; align-items:flex-end; margin-b PDF จาก \"เทมเพลตสลิป\" + เก็บลิงก์ในชีต'},\n          {step:4, wait:{kind:'buttons', persona:'op', hint:'ส่งให้พนักงาน', options:[{label:'📤 ส่งสลิป LINE + อีเมล', echo:'ส่งสลิปเข้า LINE พนักงาน + อีเมล'}]}},\n          {sys:'💬 ส่งเข้าแชท 1:1 พนักงาน · 📧 กรรมการ/คนไม่มี LINE → ส่ง PDF ทางอีเมลแทน'},\n          {bot:'ส่งสลิปเงินเดือน มิ.ย. 2569 เรียบร้อยทุกคนแล้วค่ะ ✅'}\n        ] }\n    ];\n  })();\n\n  rootRef = (el) => { this.rootEl = el; this.applyTheme(); };\n  msgsRef = (el) => { this.msgsEl = el; };\n\n  applyTheme(){\n    if(!this.rootEl) return;\n    const ac = this.props.accent; if(ac) this.rootEl.style.setProperty('--brand', ac);\n    const w = this.props.chatWall || 'ฟ้า LINE';\n    const bg = w==='ขาวสะอาด' ? '#f3f6fa' : w==='เขียวมินต์' ? '#e7f3ec' : 'linear-gradient(180deg,#cfe0f5,#dce8f7)';\n    this.rootEl.style.setProperty('--chatbg', bg);\n  }\n\n  componentDidMount(){\n    this.applyTheme();\n    if(this.props.showBehind === false) this.setState({behind:false});\n    this.startScenario(this.state.scenarioId);\n  }\n  componentDidUpdate(){\n    this.applyTheme();\n    if(this.msgsEl) this.msgsEl.scrollTop = this.msgsEl.scrollHeight;\n  }\n  componentWillUnmount(){ this.clearTimers(); }\n\n  current(){ return this.SCEN.find(x => x.id === this.state.scenarioId) || this.SCEN[0]; }\n\n  timer(fn, ms){ const t = setTimeout(fn, ms); (this.timers = this.timers || []).push(t); return t; }\n  clearTimers(){ (this.timers || []).forEach(clearTimeout); this.timers = []; }\n  cont(ms){ this.timer(() => this.step(), ms); }\n\n  pushMsg(m){ m.key = (this._k = (this._k || 0) + 1); this.setState(s => ({ messages: s.messages.concat([m]) })); }\n\n  startScenario(id){\n    this.clearTimers();\n    const scen = this.SCEN.find(x => x.id === id) || this.SCEN[0];\n    this.queue = scen.script; this.qi = 0;\n    this.setState({ scenarioId:id, messages:[], pending:null, typing:false, stepCurrent:0, finished:false }, () => this.step());\n  }\n\n  step(){\n    if(this.qi >= this.queue.length){\n      this.setState({ finished:true, pending:{kind:'restart'}, typing:false });\n      return;\n    }\n    const beat = this.queue[this.qi++];\n    const self = this;\n    if(typeof beat.step === 'number') this.setState({ stepCurrent: beat.step });\n    if(beat.sys != null){ this.pushMsg({role:'sys', text:beat.sys}); this.cont(300); return; }\n    if(beat.me != null){ this.pushMsg({role:'me', text:beat.me}); this.cont(220); return; }\n    if(beat.bot != null || beat.card != null){\n      this.setState({ typing:true });\n      const card = (typeof beat.card === 'function') ? beat.card(this.state) : beat.card;\n      this.timer(() => {\n        self.setState({ typing:false });\n        if(card) self.pushMsg({role:'bot', card:card});\n        else self.pushMsg({role:'bot', text:beat.bot});\n        self.cont(170);\n      }, beat.delay || 760);\n      return;\n    }\n    if(beat.wait){ this._lastWait = beat.wait; this.setState({ pending:beat.wait, typing:false }); return; }\n    this.cont(0);\n  }\n\n  choose(o){\n    const self = this;\n    if(o.image){ this.pushMsg({role:'me', img:o.image}); this.setState({pending:null}); this.cont(240); return; }\n    this.pushMsg({role:'me', text: o.echo || o.label});\n    if(o.loop){\n      this.setState({pending:null, typing:true});\n      this.timer(() => { self.setState({typing:false}); self.pushMsg({role:'bot', text:o.reply}); self.setState({pending:self._lastWait}); }, 700);\n      return;\n    }\n    this.setState({pending:null}); this.cont(240);\n  }\n\n  submitForm(){\n    const f = this.state.formData;\n    this.pushMsg({role:'me', text:'📅 จองนัด · ' + f.customer + '\\n' + f.topic + ' · ' + f.date + ' ' + f.time});\n    this.setState({pending:null}); this.cont(260);\n  }\n\n  renderVals(){\n    const st = this.state;\n    const scen = this.current();\n    const BTN = { primary:'background:var(--brand); color:#fff; text-align:center; padding:11px; border-radius:11px; font-size:13.5px; font-weight:600; cursor:pointer;',\n                  image:'background:#fff; color:var(--brand); border:1.5px dashed var(--brand); text-align:center; padding:11px; border-radius:11px; font-size:13.5px; font-weight:600; cursor:pointer;' };\n    const cardVM = (c) => ({\n      title:c.title, badge:c.badge,\n      hasRows: !!(c.rows && c.rows.length), rows: c.rows || [],\n      buttons: (c.buttons || []).map(b => ({ label:b.label, style: b.sec\n        ? 'background:#eef2f7; color:#46586c; text-align:center; padding:8px; border-radius:9px; font-size:12px; font-weight:600;'\n        : 'background:var(--brand); color:#fff; text-align:center; padding:8px; border-radius:9px; font-size:12px; font-weight:600;' })),\n      hasNote: !!c.note, note: c.note || ''\n    });\n\n    const messages = [];\n    st.messages.forEach(m => {\n      if(m.role === 'sys' && !st.behind) return;\n      const vm = { key:m.key, isMe:false, isBot:false, isSys:false, isCard:false, isImage:false, isSlip:false, isDoc:false };\n      if(m.role === 'me'){\n        if(m.img){ vm.isImage = true; vm.isSlip = m.img === 'slip'; vm.isDoc = m.img === 'doc'; }\n        else { vm.isMe = true; vm.text = m.text; }\n      } else if(m.role === 'bot'){\n        if(m.card){ vm.isCard = true; vm.card = cardVM(m.card); }\n        else { vm.isBot = true; vm.text = m.text; }\n      } else { vm.isSys = true; vm.text = m.text; }\n      messages.push(vm);\n    });\n\n    const p = st.pending, typing = st.typing;\n    const personaLabel = p && p.persona === 'op' ? '🧑‍💼 คุณกำลังสวมบท: ทีม Moodata'\n                       : p && p.persona === 'cust' ? '🙋 คุณกำลังสวมบท: ลูกค้า'\n                       : p && p.persona === 'staff' ? '👷 คุณกำลังสวมบท: พนักงาน'\n                       : p && p.persona === 'hr' ? '🧑‍💼 คุณกำลังสวมบท: ฝ่ายบุคคล (HR)' : '';\n    const options = (p && p.options ? p.options : []).map(o => ({\n      label:o.label, style: o.image ? BTN.image : BTN.primary, onClick: () => this.choose(o)\n    }));\n\n    const total = scen.steps.length;\n    const completed = st.finished ? total : st.stepCurrent;\n    const steps = scen.steps.map((s, i) => {\n      const isCurrent = !st.finished && i === st.stepCurrent;\n      const isDone = i < completed;\n      return {\n        n:i+1, label:s.label, sub:s.sub, notLast:i < total-1,\n        isCurrent, isDone, isTodo: !st.finished && i > st.stepCurrent,\n        labelColor: (isCurrent || isDone) ? '#1c2733' : '#9aa7b7'\n      };\n    });\n\n    const ROLES = [\n      {id:'all', label:'ทั้งหมด'},\n      {id:'admin', label:'🧑‍💼 Admin'},\n      {id:'staff', label:'👷 พนักงาน'},\n      {id:'customer', label:'🙋 ลูกค้า'}\n    ];\n    const roleTabs = ROLES.map(r => {\n      const cnt = r.id === 'all' ? this.SCEN.length : this.SCEN.filter(s => s.role === r.id).length;\n      const active = st.roleFilter === r.id;\n      return {\n        label: r.label + ' · ' + cnt,\n        onClick: () => this.setState({ roleFilter: r.id }),\n        style: 'padding:6px 12px; border-radius:999px; font-size:12px; font-weight:600; cursor:pointer; transition:.15s; '\n          + (active ? 'background:var(--brand); color:#fff;' : 'background:#eef2f7; color:#5a6b7d;')\n      };\n    });\n    const visScen = this.SCEN.filter(s => st.roleFilter === 'all' || s.role === st.roleFilter);\n\n    const scenarios = visScen.map(s => ({\n      icon:s.icon, title:s.title, who:s.who,\n      onClick: () => this.startScenario(s.id),\n      style: (s.id === st.scenarioId\n        ? 'display:flex; flex-direction:column; gap:3px; padding:10px 10px; border-radius:12px; border:2px solid var(--brand); background:var(--soft); cursor:pointer;'\n        : 'display:flex; flex-direction:column; gap:3px; padding:11px 11px; border-radius:12px; border:1px solid var(--line); background:#fff; cursor:pointer;')\n    }));\n\n    return {\n      rootRef: this.rootRef, msgsRef: this.msgsRef,\n      messages, showTyping: typing,\n      showPersona: !!(p && p.persona) && !typing, personaLabel,\n      showHint: !!(p && p.hint) && !typing, hint: p ? p.hint : '',\n      showQuick: !!p && p.kind === 'quick' && !typing,\n      showButtons: !!p && p.kind === 'buttons' && !typing,\n      showForm: !!p && p.kind === 'form' && !typing,\n      showRestart: !!p && p.kind === 'restart',\n      options,\n      customers: this.customers,\n      formCustomer: st.formData.customer, formTopic: st.formData.topic, formDate: st.formData.date, formTime: st.formData.time,\n      onCust: (e) => this.setState(s => ({formData:{...s.formData, customer:e.target.value}})),\n      onTopic: (e) => this.setState(s => ({formData:{...s.formData, topic:e.target.value}})),\n      onDate: (e) => this.setState(s => ({formData:{...s.formData, date:e.target.value}})),\n      onTime: (e) => this.setState(s => ({formData:{...s.formData, time:e.target.value}})),\n      onSubmitForm: () => this.submitForm(),\n      onRestart: () => this.startScenario(st.scenarioId),\n      onToggleBehind: () => this.setState(s => ({behind:!s.behind})),\n      activeIcon: scen.icon, activeTitle: scen.title, activeWho: scen.who,\n      steps, scenarios, roleTabs,\n      switchStyle: 'width:44px; height:25px; border-radius:999px; cursor:pointer; transition:.2s; padding:3px; display:flex; flex:0 0 auto; background:' + (st.behind ? 'var(--brand)' : '#cbd5e1') + '; justify-content:' + (st.behind ? 'flex-end' : 'flex-start') + ';',\n      knobStyle: 'width:19px; height:19px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.3);'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
