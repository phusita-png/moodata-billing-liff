<!doctype html>
<html lang="th">
<head>
<meta charset="utf8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>บริหารงานลูกค้า — Moodata ยินดี</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --bg:#eef2f7; --surface:#fff; --surface-2:#f3f6fa; --surface-3:#e9eef5;
    --ink:#182231; --ink-soft:#4d5b6e; --ink-faint:#8493a6;
    --line:#dde4ee; --line-strong:#c6d0dd;
    --brand:#1E8FE1; --brand-deep:#146bb0; --brand-tint:#e7f2fc;
    --done:#1f9d63; --done-tint:#e3f5ec;
    --pending:#c98a12; --pending-tint:#fbf1dc;
    --over:#d8453c; --over-tint:#fbe6e5;
    --info:#7a5cd6; --info-tint:#efe9fb;
    --shadow:0 1px 2px rgba(20,30,48,.05),0 6px 20px rgba(20,30,48,.06);
    --shadow-lg:0 8px 40px rgba(20,30,48,.12); --r:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Sarabun","IBM Plex Sans Thai",system-ui,-apple-system,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  .tnum{font-variant-numeric:tabular-nums}
  .app{max-width:920px;margin:0 auto;padding:0 16px 90px}
  .hide{display:none!important}
  a{color:var(--brand)}

  header.bar{position:sticky;top:0;z-index:20;background:var(--bg);padding-top:12px}
  .bar-inner{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:13px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-deep));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;flex:none}
  .bar h1{font-size:16px;margin:0;font-weight:750}
  .bar .sub{font-size:12px;color:var(--ink-faint)}
  .bar .me{margin-left:auto;font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:8px}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--brand-tint);color:var(--brand-deep);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}

  .vtabs{display:flex;gap:8px;margin:14px 0 4px}
  .vtab{flex:1;text-align:center;padding:11px;border-radius:11px;border:1px solid var(--line);
    background:var(--surface);color:var(--ink-soft);font-weight:700;font-size:14px;cursor:pointer;transition:.15s;
    display:flex;align-items:center;justify-content:center;gap:7px}
  .vtab.on{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:var(--shadow)}

  .scope{display:flex;gap:8px;margin:14px 0 4px;flex-wrap:wrap;align-items:center}
  .chip{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);color:var(--ink-soft)}
  .chip.on{background:var(--brand-tint);border-color:transparent;color:var(--brand-deep)}
  .sp{flex:1}
  .btn{border:none;border-radius:10px;padding:9px 15px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer}
  .btn-p{background:var(--brand);color:#fff} .btn-o{background:var(--surface);color:var(--ink-soft);border:1px solid var(--line)}
  .btn-g{background:var(--done);color:#fff} .btn-r{background:var(--over-tint);color:var(--over)} .btn-s{background:var(--surface-3);color:var(--ink-soft)}
  .btn.sm{padding:7px 12px;font-size:13px}

  section{margin-top:16px} .view{display:none} .view.on{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px}
  .scard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow)}
  .scard .n{font-size:24px;font-weight:800;line-height:1;letter-spacing:-.02em}
  .scard .l{font-size:11.5px;color:var(--ink-faint);margin-top:5px;font-weight:600}
  .scard.d .n{color:var(--done)} .scard.p .n{color:var(--pending)} .scard.o .n{color:var(--over)}
  @media(max-width:560px){.summary{grid-template-columns:repeat(2,1fr)}}

  .co-grid{display:grid;gap:12px;margin-top:12px}
  .co{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
  .co:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .co-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .co-badge{width:42px;height:42px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--brand-tint)}
  .co-name{font-weight:750;font-size:15.5px}
  .co-meta{font-size:12px;color:var(--ink-faint);margin-top:1px}
  .co-open{margin-left:auto;color:var(--ink-faint);font-size:22px}
  .bar-track{height:9px;border-radius:6px;background:var(--surface-3);overflow:hidden;display:flex}
  .bar-track i{display:block;height:100%}
  .bar-track .fd{background:var(--done)} .bar-track .fp{background:var(--pending)} .bar-track .fo{background:var(--over)}
  .co-stats{display:flex;gap:16px;margin-top:11px;font-size:12.5px;flex-wrap:wrap}
  .co-stats b{font-weight:800}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .dot.d{background:var(--done)} .dot.p{background:var(--pending)} .dot.o{background:var(--over)}
  .co-owner{margin-left:auto;color:var(--ink-faint)}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-left:6px;white-space:nowrap}
  .pill.over{background:var(--over-tint);color:var(--over)} .pill.ok{background:var(--done-tint);color:var(--done)} .pill.on{background:var(--surface-3);color:var(--ink-soft)}

  .detail-head{display:flex;align-items:center;gap:12px;margin:14px 0 6px}
  .back{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft)}
  .detail-head h2{margin:0;font-size:19px;font-weight:800}

  .grp{margin-top:18px}
  .grp-h{display:flex;align-items:center;gap:9px;margin:0 0 10px;font-size:14px;font-weight:750}
  .grp-h .tag{font-size:11px;color:var(--ink-faint);font-weight:600;background:var(--surface-2);border:1px solid var(--line);padding:2px 9px;border-radius:999px}
  .grp-h .cnt{margin-left:auto;font-size:12px;color:var(--ink-faint);font-weight:600}

  .task{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow);margin-bottom:9px;transition:.15s}
  .task .hd{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
  .task.sel{border-color:var(--brand);box-shadow:var(--shadow-lg)}
  .stat{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;white-space:nowrap;flex:none}
  .stat.new{background:var(--surface-3);color:var(--ink-soft)}
  .stat.doing{background:var(--brand-tint);color:var(--brand-deep)}
  .stat.review{background:var(--info-tint);color:var(--info)}
  .stat.done{background:var(--done-tint);color:var(--done)}
  .task-title{font-weight:650;font-size:14.5px;flex:1}
  .task-meta{display:flex;gap:14px;margin-top:9px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;align-items:center}
  .who{display:flex;align-items:center;gap:5px}
  .mini-av{width:20px;height:20px;border-radius:50%;background:var(--brand-tint);color:var(--brand-deep);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
  .due{font-weight:600} .due.over{color:var(--over)} .due.soon{color:var(--pending)}

  .expand{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);display:none}
  .task.sel .expand{display:block}
  .kv{font-size:12.5px;margin-top:6px;color:var(--ink-soft)} .kv b{color:var(--ink-faint);font-weight:500}
  .kv a{color:var(--brand);word-break:break-all}
  .tl-wrap{margin-top:10px}
  .tl-h{font-size:12px;font-weight:700;color:var(--ink-faint);margin-bottom:8px}
  .tl ul{list-style:none;margin:0;padding:0;position:relative}
  .tl ul::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--line)}
  .tl li{position:relative;padding:0 0 12px 30px}
  .tl li:last-child{padding-bottom:0}
  .tl .m{position:absolute;left:3px;top:2px;width:15px;height:15px;border-radius:50%;background:var(--surface);border:2px solid var(--brand);z-index:1}
  .tl .tt{font-size:13px;font-weight:600} .tl .td{font-size:11.5px;color:var(--ink-faint)}
  .acts{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}

  .center{text-align:center;padding:70px 20px;color:var(--ink-faint)}
  .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;margin:0 auto 14px;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  .mask{position:fixed;inset:0;background:rgba(20,30,48,.5);display:flex;align-items:center;justify-content:center;z-index:60;padding:16px}
  .sheet{background:var(--surface);width:100%;max-width:460px;border-radius:16px;padding:22px;max-height:90vh;overflow:auto}
  .sheet h3{margin:0 0 4px;font-size:18px} .sheet .msub{color:var(--ink-faint);font-size:13px;margin-bottom:14px}
  .fld{margin-bottom:12px} .fld label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
  .fld input,.fld select,.fld textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;background:var(--surface);color:var(--ink)}
  .fld textarea{min-height:70px;resize:vertical}
  .err{background:var(--over-tint);color:var(--over);padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:10px}
  .frow{display:flex;gap:8px} .frow .btn{flex:1}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#182231;color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;z-index:99;opacity:0;transition:.25s}
  .toast.show{opacity:1}
  .foot{margin-top:30px;text-align:center;font-size:12px;color:var(--ink-faint);border-top:1px solid var(--line);padding-top:16px}
</style>
</head>
<body>

<div id="boot" class="center"><div class="spin"></div>กำลังเปิดบอร์ดบริหารงาน…</div>
<div id="fatal" class="center hide" style="color:var(--over)"><div style="font-size:34px">⚠️</div><p id="fatalMsg"></p></div>

<div id="app" class="hide">
  <header class="bar">
    <div class="bar-inner">
      <div class="logo">ย</div>
      <div><h1>บริหารงานลูกค้า</h1><div class="sub">Moodata · ยินดี</div></div>
      <div class="me"><span id="meName">พี่กี้</span><span class="avatar" id="meAv">กี</span></div>
    </div>
  </header>

  <div class="app">
    <div class="vtabs">
      <div class="vtab on" id="tabO" onclick="showView('overview')">🏢 ภาพรวมทุกบริษัท</div>
      <div class="vtab" id="tabD" onclick="showView('detail')">📂 เจาะบริษัท</div>
    </div>

    <!-- OVERVIEW -->
    <section class="view on" id="view-overview">
      <div class="scope">
        <span class="chip on" id="soAll" onclick="setScopeO('all')">ทั้งบริษัท (ทีม)</span>
        <span class="chip" id="soMine" onclick="setScopeO('mine')">เฉพาะงานของฉัน</span>
        <span class="sp"></span>
        <button class="btn btn-o sm" onclick="genRecurring()">🔁 สร้างงานรอบเดือนนี้</button>
        <button class="btn btn-p sm" onclick="openCreate()">+ เปิดงานใหม่</button>
      </div>
      <div class="summary" id="oSummary"></div>
      <div class="co-grid" id="oGrid"></div>
    </section>

    <!-- DETAIL -->
    <section class="view" id="view-detail">
      <div class="detail-head">
        <span class="back" onclick="showView('overview')">‹ กลับ</span>
        <h2 id="dName">—</h2>
      </div>
      <div class="scope">
        <span class="chip on" id="sdAll" onclick="setScopeD('all')">งานทั้งหมด</span>
        <span class="chip" id="sdMine" onclick="setScopeD('mine')">ของฉัน</span>
        <span class="chip" id="sdReview" onclick="setScopeD('review')">รอฉันตรวจ</span>
      </div>
      <div class="summary" id="dSummary" style="grid-template-columns:repeat(3,1fr)"></div>
      <div id="dGroups"></div>
    </section>

    <div class="foot">Moodata · ยินดี — บอร์ดบริหารงานลูกค้าราย บริษัท</div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
  var LIFF_ID='2010533182-66TDQvCu';
  var EXEC_URL='https://script.google.com/macros/s/AKfycbwdOotltb--WwTuS-ECutq6uFQs536kjz-RyLuq1mm35Pbfnn25EptvIRkfjaZB6iJf/exec';
  var DAY=86400000;
  var UID='', TASKS=[], TEAM=[], STATUSES=[], TYPES=[], OWNER='พี่กี้', SNOW=0;
  var VIEW='overview', SCOPE_O='all', SCOPE_D='all', CURCO='';
  var TLCACHE={};   // timeline cache ต่อเลขงาน
  var THMON=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  // ลำดับ+ป้ายของกลุ่มประเภทงาน
  var TYPEG=[['ตามรอบ','🔁 งานตามรอบ (บัญชี/ภาษี)','auto ทุกเดือน'],['สัปดาห์','📅 งานแผนสัปดาห์','กำหนดล่วงหน้า'],
             ['แทรก','⚡ งานแทรก (ลูกค้าแจ้งในกลุ่ม)','ad-hoc'],['มาตรฐาน','📋 งานมาตรฐาน','ตั้งค่าเริ่มต้น']];

  function $(id){return document.getElementById(id);}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function fatal(m){$('boot').classList.add('hide');$('app').classList.add('hide');$('fatalMsg').textContent=m;$('fatal').classList.remove('hide');}
  var _tt;function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2300);}
  function av(n){return (String(n||'?').trim()[0]||'?');}

  function jsonp(params){
    return new Promise(function(resolve,reject){
      var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
      var timer=setTimeout(function(){cleanup();reject(new Error('หมดเวลาเชื่อมต่อ'));},40000);
      window[cb]=function(d){cleanup();resolve(d);};
      function cleanup(){clearTimeout(timer);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
      var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
      var s=document.createElement('script');s.src=EXEC_URL+'?'+qs+'&callback='+cb;
      s.onerror=function(){cleanup();reject(new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'));};document.body.appendChild(s);
    });
  }
  function jsonpPost(params){
    var body=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
    return fetch(EXEC_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:body})
      .then(function(r){if(!r.ok)throw new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้');return r.json();});
  }

  // ── helpers สถานะ/วันที่ ──
  function isDone(t){return t.status.indexOf('เสร็จ')>=0;}
  function isCancel(t){return t.status.indexOf('ยกเลิก')>=0;}
  function endOfDay(ms){var d=new Date(ms);d.setHours(23,59,59,999);return d.getTime();}
  function isOver(t){return !!t.dueMs&&!isDone(t)&&!isCancel(t)&&SNOW>endOfDay(t.dueMs);}
  function statClass(st){if(st.indexOf('กำลังทำ')>=0)return'doing';if(st.indexOf('รอตรวจ')>=0)return'review';if(st.indexOf('เสร็จ')>=0)return'done';return'new';}
  function statIcon(st){if(st.indexOf('กำลังทำ')>=0)return'●';if(st.indexOf('รอตรวจ')>=0)return'◆';if(st.indexOf('เสร็จ')>=0)return'✓';if(st.indexOf('ยกเลิก')>=0)return'✕';return'○';}
  function thDate(ms){if(!ms)return'';var d=new Date(ms);return d.getDate()+' '+THMON[d.getMonth()]+' '+String((d.getFullYear()+543)%100);}
  function ttl(t){return t.title||t.detail||t.no;}
  function isMine(t){return t.assignee&&(t.assignee===OWNER);}

  // ── มุมมอง ──
  function showView(v){
    VIEW=v;
    $('tabO').classList.toggle('on',v==='overview');$('tabD').classList.toggle('on',v==='detail');
    $('view-overview').classList.toggle('on',v==='overview');$('view-detail').classList.toggle('on',v==='detail');
    if(v==='overview')renderOverview();else renderDetail();
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function setScopeO(s){SCOPE_O=s;$('soAll').classList.toggle('on',s==='all');$('soMine').classList.toggle('on',s==='mine');renderOverview();}
  function setScopeD(s){SCOPE_D=s;['all','mine','review'].forEach(function(k){$('sd'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('on',s===k);});renderDetail();}

  function liveTasks(){return TASKS.filter(function(t){return !isCancel(t);});}

  // ── ภาพรวมทุกบริษัท ──
  function renderOverview(){
    var base=liveTasks();
    if(SCOPE_O==='mine')base=base.filter(isMine);
    // group by company
    var order=[],g={};
    base.forEach(function(t){var c=t.customer||'(ไม่ระบุบริษัท)';if(!g[c]){g[c]=[];order.push(c);}g[c].push(t);});
    // summary
    var done=base.filter(isDone).length, over=base.filter(isOver).length, pending=base.length-done-over;
    $('oSummary').innerHTML=
      sc('','tnum',order.length,'บริษัทลูกค้า')+sc('d','tnum',done,'เสร็จ')+sc('p','tnum',pending,'กำลังทำ/ค้าง')+sc('o','tnum',over,'เลยกำหนด');
    if(!order.length){$('oGrid').innerHTML='<div class="center">ยังไม่มีงานในมุมนี้</div>';return;}
    var html='';
    order.forEach(function(c){
      var arr=g[c], tot=arr.length, cd=arr.filter(isDone).length, co=arr.filter(isOver).length, cp=tot-cd-co;
      var pd=Math.round(cd/tot*100), po=Math.round(co/tot*100), pp=100-pd-po;
      var pill= co>0 ? '<span class="pill over">'+co+' เลยกำหนด</span>' : (cd===tot?'<span class="pill ok">ครบแล้ว</span>':'<span class="pill on">on track</span>');
      var owners={};arr.forEach(function(t){if(t.assignee)owners[t.assignee]=1;});
      var ow=Object.keys(owners);var owTxt=ow.length?('ดูแล: '+ow.slice(0,3).join(', ')+(ow.length>3?' +'+(ow.length-3):'')):'ยังไม่มอบหมาย';
      html+='<div class="co" onclick="openCompany(\''+esc(c).replace(/'/g,"\\'")+'\')">'+
        '<div class="co-top"><div class="co-badge">🏢</div>'+
        '<div><div class="co-name">'+esc(c)+pill+'</div><div class="co-meta">'+tot+' งาน · เสร็จ '+cd+'/'+tot+'</div></div>'+
        '<div class="co-open">›</div></div>'+
        '<div class="bar-track"><i class="fd" style="width:'+pd+'%"></i><i class="fp" style="width:'+pp+'%"></i><i class="fo" style="width:'+po+'%"></i></div>'+
        '<div class="co-stats"><span><span class="dot d"></span>เสร็จ <b>'+cd+'</b></span>'+
        '<span><span class="dot p"></span>ค้าง <b>'+cp+'</b></span>'+
        (co?'<span><span class="dot o"></span>เลยกำหนด <b>'+co+'</b></span>':'')+
        '<span class="co-owner">'+esc(owTxt)+'</span></div></div>';
    });
    $('oGrid').innerHTML=html;
  }
  function sc(cls,extra,n,l){return '<div class="scard '+cls+'"><div class="n '+extra+'">'+n+'</div><div class="l">'+l+'</div></div>';}

  // ── เจาะบริษัท ──
  function openCompany(c){CURCO=c;SCOPE_D='all';['All','Mine','Review'].forEach(function(k){$('sd'+k).classList.toggle('on',k==='All');});showView('detail');}
  function renderDetail(){
    if(!CURCO){$('dName').textContent='—';$('dGroups').innerHTML='<div class="center">เลือกบริษัทจากภาพรวมก่อนค่ะ</div>';$('dSummary').innerHTML='';return;}
    $('dName').textContent=CURCO;
    var all=liveTasks().filter(function(t){return (t.customer||'(ไม่ระบุบริษัท)')===CURCO;});
    // summary (ยึดงานทั้งหมดของบริษัท)
    var done=all.filter(isDone).length, over=all.filter(isOver).length, pending=all.length-done-over;
    $('dSummary').innerHTML=sc('d','tnum',done,'เสร็จ')+sc('p','tnum',pending,'กำลังทำ/ค้าง')+sc('o','tnum',over,'เลยกำหนด');
    // filter การ์ดตาม scope
    var show=all;
    if(SCOPE_D==='mine')show=all.filter(isMine);
    else if(SCOPE_D==='review')show=all.filter(function(t){return t.status.indexOf('รอตรวจ')>=0&&(!t.reviewer||t.reviewer===OWNER);});
    if(!show.length){$('dGroups').innerHTML='<div class="center">ไม่มีงานในมุมนี้ 🎉</div>';return;}
    // group by TYPE
    var html='';
    TYPEG.forEach(function(tg){
      var arr=show.filter(function(t){return (t.type||'แทรก')===tg[0];});
      if(!arr.length)return;
      arr.sort(function(a,b){return (a.dueMs||9e15)-(b.dueMs||9e15);});
      html+='<div class="grp"><div class="grp-h">'+tg[1]+' <span class="tag">'+tg[2]+'</span><span class="cnt">'+arr.length+' งาน</span></div>'+
        arr.map(taskCard).join('')+'</div>';
    });
    $('dGroups').innerHTML=html||'<div class="center">ไม่มีงานในมุมนี้ 🎉</div>';
  }

  function dueHtml(t){
    if(!t.dueMs)return '<span class="due">ไม่มีกำหนด</span>';
    var over=isOver(t), soon=!over&&!isDone(t)&&t.dueMs-SNOW<2*DAY&&t.dueMs>=SNOW-DAY;
    var cls=over?'due over':(soon?'due soon':'due');
    return '<span class="'+cls+'">กำหนด '+thDate(t.dueMs)+(over?' · เลยกำหนด':(soon?' · ใกล้ครบ':''))+'</span>';
  }
  function taskCard(t){
    var sc2=statClass(t.status);
    var who=t.assignee?('<span class="who"><span class="mini-av">'+esc(av(t.assignee))+'</span>'+esc(t.assignee)+'</span>'):'<span class="who" style="color:var(--pending)">ยังไม่มอบหมาย</span>';
    var rev=t.reviewer?('<span class="who">ตรวจ: <span class="mini-av">'+esc(av(t.reviewer))+'</span>'+esc(t.reviewer)+'</span>'):'';
    return '<div class="task" id="tk_'+esc(t.no)+'"><div class="hd" onclick="toggleTask(\''+esc(t.no)+'\')">'+
      '<span class="stat '+sc2+'">'+statIcon(t.status)+' '+esc(t.status.replace(/^[^฀-๿]+/,''))+'</span>'+
      '<div class="task-title">'+esc(ttl(t))+'</div></div>'+
      '<div class="task-meta">'+who+rev+dueHtml(t)+'</div>'+
      '<div class="expand" id="ex_'+esc(t.no)+'"></div></div>';
  }

  function toggleTask(no){
    var el=$('tk_'+no);if(!el)return;
    var was=el.classList.contains('sel');
    // ปิดใบอื่นในกลุ่มเดียวกัน? เปิดได้หลายใบก็ได้ — แค่ toggle ใบนี้
    if(was){el.classList.remove('sel');return;}
    el.classList.add('sel');
    renderExpand(no);
  }
  function renderExpand(no){
    var t=TASKS.filter(function(x){return x.no===no;})[0];if(!t)return;
    var box=$('ex_'+no);
    var kv='';
    if(t.detail&&t.detail!==t.title)kv+='<div class="kv"><b>รายละเอียด:</b> '+esc(t.detail)+'</div>';
    if(t.worklink)kv+='<div class="kv"><b>ลิงก์งานจากทีม:</b> <a href="'+esc(t.worklink)+'" target="_blank">'+esc(t.worklink)+'</a></div>';
    if(t.reply)kv+='<div class="kv"><b>คำอธิบายถึงลูกค้า:</b> '+esc(t.reply)+'</div>';
    if(t.note)kv+='<div class="kv"><b>โน้ต:</b> '+esc(t.note)+'</div>';
    var acts='<div class="acts"><button class="btn btn-o sm" onclick="openManage(\''+esc(no)+'\')">⚙️ จัดการงาน</button>';
    if(t.status.indexOf('รอตรวจ')>=0){
      if(t.hasGroup)acts+='<button class="btn btn-g sm" onclick="doSend(\''+esc(no)+'\')">📨 ส่งลูกค้า</button>';
      acts+='<button class="btn btn-r sm" onclick="openReturn(\''+esc(no)+'\')">🔁 ตีกลับแก้ไข</button>';
    }
    acts+='</div>';
    box.innerHTML=kv+'<div class="tl-wrap"><div class="tl-h">🕘 ประวัติงาน (timeline)</div><div class="tl" id="tl_'+esc(no)+'"><div class="td" style="padding-left:4px">กำลังโหลด…</div></div></div>'+acts;
    loadTimeline(no,t);
  }
  function loadTimeline(no,t){
    if(TLCACHE[no]){paintTimeline(no,TLCACHE[no],t);return;}
    jsonp({action:'waTaskTimeline',uid:UID,no:no}).then(function(r){
      var evs=(r&&r.ok&&r.events)?r.events:[];TLCACHE[no]=evs;paintTimeline(no,evs,t);
    }).catch(function(){paintTimeline(no,[],t);});
  }
  function paintTimeline(no,evs,t){
    var box=$('tl_'+no);if(!box)return;
    if(!evs.length){
      // fallback สังเคราะห์จาก created/updated/status (งานเก่าก่อนมี log)
      var li='<li><span class="m"></span><div class="tt">สร้างงาน</div><div class="td">'+esc(t.createdAt||'')+'</div></li>';
      if(t.status.indexOf('ใหม่')<0)li+='<li><span class="m"></span><div class="tt">'+esc(t.status)+'</div><div class="td">'+esc(t.updatedAt||'')+' (อัปเดตล่าสุด)</div></li>';
      box.innerHTML='<ul>'+li+'</ul><div class="td" style="padding:4px 0 0">* งานนี้เกิดก่อนระบบเก็บ timeline — แสดงเท่าที่มี</div>';
      return;
    }
    box.innerHTML='<ul>'+evs.map(function(e){
      return '<li><span class="m"></span><div class="tt">'+esc(e.event)+(e.actor?' · '+esc(e.actor):'')+'</div>'+
        '<div class="td">'+esc(e.at)+(e.detail?' · '+esc(e.detail):'')+'</div></li>';
    }).join('')+'</ul>';
  }

  // ── จัดการงาน (modal) ──
  function openManage(no){
    var t=TASKS.filter(function(x){return x.no===no;})[0];if(!t)return;
    var stOpts=STATUSES.map(function(s){return '<option'+(s===t.status?' selected':'')+'>'+esc(s)+'</option>';}).join('');
    var tyOpts=TYPES.map(function(s){return '<option'+(s===(t.type||'แทรก')?' selected':'')+'>'+esc(s)+'</option>';}).join('');
    var asg='<option value="">— ยังไม่มอบหมาย —</option>'+TEAM.map(function(m){var n=m.name;return '<option value="'+esc(n)+'"'+(n===t.assignee?' selected':'')+'>'+esc(n+(m.nick&&m.nick!==m.name?' ('+m.nick+')':''))+'</option>';}).join('');
    var rev='<option value="">— ยังไม่กำหนด —</option><option value="'+esc(OWNER)+'"'+(t.reviewer===OWNER?' selected':'')+'>'+esc(OWNER)+' (ฉัน)</option>'+
      TEAM.filter(function(m){return m.name!==OWNER;}).map(function(m){var n=m.name;return '<option value="'+esc(n)+'"'+(n===t.reviewer?' selected':'')+'>'+esc(n)+'</option>';}).join('');
    var dueVal=t.dueMs?(function(){var d=new Date(t.dueMs);return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);})():'';
    modal('<h3>⚙️ จัดการงาน '+esc(no)+'</h3><div class="msub">'+esc(t.customer||'')+'</div><div id="mErr" class="err hide"></div>'+
      '<div class="fld"><label>หัวข้องาน</label><input id="mTitle" value="'+esc(t.title||'')+'" placeholder="หัวข้อสั้น ๆ"></div>'+
      '<div class="fld"><label>สถานะ</label><select id="mStatus">'+stOpts+'</select></div>'+
      '<div class="fld"><label>ผู้รับผิดชอบ</label><select id="mAsg">'+asg+'</select></div>'+
      '<div class="fld"><label>ผู้ตรวจงาน</label><select id="mRev">'+rev+'</select></div>'+
      '<div class="fld"><label>ประเภทงาน</label><select id="mType">'+tyOpts+'</select></div>'+
      '<div class="fld"><label>กำหนดเสร็จ</label><input id="mDue" type="date" value="'+dueVal+'"></div>'+
      '<div class="frow"><button class="btn btn-p" onclick="saveManage(\''+esc(no)+'\')">💾 บันทึก</button>'+
      '<button class="btn btn-s" onclick="closeModal()">ปิด</button></div>');
  }
  function saveManage(no){
    var t=TASKS.filter(function(x){return x.no===no;})[0];
    var title=$('mTitle').value.trim(), st=$('mStatus').value, asg=$('mAsg').value, rev=$('mRev').value, ty=$('mType').value, due=$('mDue').value;
    var curDue=t.dueMs?(function(){var d=new Date(t.dueMs);return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);})():'';
    var jobs=[];
    if(title!==(t.title||''))jobs.push(jsonp({action:'waSetTitle',uid:UID,no:no,title:title}));
    if(st!==t.status)jobs.push(jsonp({action:'waSetStatus',uid:UID,no:no,status:st}));
    if(asg!==(t.assignee||''))jobs.push(jsonp({action:'waAssign',uid:UID,no:no,name:asg||' '}));
    if(rev!==(t.reviewer||''))jobs.push(jsonp({action:'waSetReviewer',uid:UID,no:no,name:rev}));
    if(ty!==(t.type||'แทรก'))jobs.push(jsonp({action:'waSetType',uid:UID,no:no,type:ty}));
    if(due!==curDue)jobs.push(jsonp({action:'waSetDue',uid:UID,no:no,due:due}));
    if(!jobs.length){closeModal();return;}
    toast('กำลังบันทึก…');
    Promise.all(jobs).then(function(){closeModal();toast('บันทึกแล้ว ✅');delete TLCACHE[no];reload();}).catch(function(e){mErr(e.message);});
  }

  function doSend(no){
    modal('<h3>📨 ส่งผลงานให้ลูกค้า</h3><div class="msub">'+esc(no)+' — ส่งเข้ากลุ่มไลน์ลูกค้า</div><div id="mErr" class="err hide"></div>'+
      '<div class="frow"><button class="btn btn-g" onclick="doSendGo(\''+esc(no)+'\')">ส่งเลย</button><button class="btn btn-s" onclick="closeModal()">ยกเลิก</button></div>');
  }
  function doSendGo(no){
    toast('กำลังส่ง…');
    jsonp({action:'waSendCustomer',uid:UID,no:no}).then(function(r){if(!r||!r.ok){mErr((r&&r.error)||'ส่งไม่สำเร็จ');return;}closeModal();toast('✅ ส่งให้ลูกค้าแล้ว');delete TLCACHE[no];reload();}).catch(function(e){mErr(e.message);});
  }
  function openReturn(no){
    modal('<h3>🔁 ส่งกลับให้แก้ไข '+esc(no)+'</h3><div class="msub">งานจะกลับไป 🔵 กำลังทำ + แจ้งทีมทาง LINE</div><div id="mErr" class="err hide"></div>'+
      '<div class="fld"><label>สิ่งที่ต้องแก้ไข</label><textarea id="rNote" placeholder="เช่น แก้สีโลโก้ให้เข้มขึ้น…"></textarea></div>'+
      '<div class="frow"><button class="btn btn-p" onclick="doReturn(\''+esc(no)+'\')">ส่งกลับแก้ไข</button><button class="btn btn-s" onclick="closeModal()">ยกเลิก</button></div>');
  }
  function doReturn(no){
    var note=$('rNote').value.trim();if(!note){mErr('ระบุสิ่งที่ต้องแก้ไขก่อนค่ะ');return;}
    toast('กำลังส่งกลับ…');
    jsonpPost({action:'waTaskReturn',uid:UID,no:no,note:note}).then(function(r){if(!r||!r.ok){mErr((r&&r.error)||'ส่งกลับไม่สำเร็จ');return;}closeModal();toast('🔁 ส่งกลับให้ '+(r.assignee||'ทีม')+' แก้ไขแล้ว');delete TLCACHE[no];reload();}).catch(function(e){mErr(e.message);});
  }

  // ── เปิดงานใหม่ ──
  function openCreate(){
    var asg='<option value="">— ยังไม่มอบหมาย —</option>'+TEAM.map(function(m){return '<option value="'+esc(m.name)+'">'+esc(m.name)+'</option>';}).join('');
    modal('<h3>+ เปิดงานใหม่</h3><div class="msub">สร้างงานเองในบอร์ด</div><div id="mErr" class="err hide"></div>'+
      '<div class="fld"><label>หัวข้องาน</label><input id="cTitle" placeholder="หัวข้อสั้น ๆ"></div>'+
      '<div class="fld"><label>ลูกค้า/บริษัท</label><input id="cCust" value="'+esc(VIEW==='detail'?CURCO:'')+'" placeholder="ชื่อบริษัท"></div>'+
      '<div class="fld"><label>รายละเอียด</label><textarea id="cDetail" placeholder="สิ่งที่ต้องทำ…"></textarea></div>'+
      '<div class="fld"><label>ผู้รับผิดชอบ</label><select id="cAsg">'+asg+'</select></div>'+
      '<div class="fld"><label>กำหนดเสร็จ</label><input id="cDue" type="date"></div>'+
      '<div class="frow"><button class="btn btn-p" onclick="createTask()">สร้างงาน</button><button class="btn btn-s" onclick="closeModal()">ยกเลิก</button></div>');
  }
  function createTask(){
    var cust=$('cCust').value.trim(), detail=$('cDetail').value.trim();
    if(!cust&&!detail){mErr('กรอกลูกค้าหรือรายละเอียดอย่างน้อย 1 ช่อง');return;}
    toast('กำลังสร้าง…');
    jsonpPost({action:'waCreateTask',uid:UID,title:$('cTitle').value.trim(),customer:cust,detail:detail,assignee:$('cAsg').value,due:$('cDue').value}).then(function(r){
      if(!r||!r.ok){mErr((r&&r.error)||'สร้างไม่สำเร็จ');return;}closeModal();toast('เปิดงานใหม่แล้ว '+(r.no||''));reload();
    }).catch(function(e){mErr(e.message);});
  }
  function genRecurring(){
    modal('<h3>🔁 สร้างงานตามรอบเดือนนี้</h3><div class="msub">ระบบจะสร้างงานประจำเดือน (เงินเดือน/ภงด.1/ปกส. ฯลฯ) ตามที่ตั้งไว้ในชีต "งานตามรอบ" · กันซ้ำอัตโนมัติ</div><div id="mErr" class="err hide"></div>'+
      '<div class="frow"><button class="btn btn-p" onclick="genRecurringGo()">สร้างเลย</button><button class="btn btn-s" onclick="closeModal()">ยกเลิก</button></div>');
  }
  function genRecurringGo(){
    toast('กำลังสร้าง…');
    jsonp({action:'waGenRecurring',uid:UID}).then(function(r){if(!r||!r.ok){mErr((r&&r.error)||'ไม่สำเร็จ');return;}closeModal();toast(r.made?('🔁 สร้าง '+r.made+' งานตามรอบแล้ว'):'เดือนนี้สร้างครบแล้ว (ไม่มีงานใหม่)');reload();}).catch(function(e){mErr(e.message);});
  }

  function modal(html){var m=document.createElement('div');m.className='mask';m.id='modal';m.innerHTML='<div class="sheet">'+html+'</div>';m.onclick=function(e){if(e.target===m)closeModal();};document.body.appendChild(m);}
  function closeModal(){var m=$('modal');if(m)m.parentNode.removeChild(m);}
  function mErr(msg){var e=$('mErr');if(e){e.textContent='⚠️ '+msg;e.classList.remove('hide');}else toast(msg);}

  // ── โหลด ──
  function reload(){
    return jsonp({action:'waPmBoard',uid:UID}).then(function(r){
      if(!r||!r.ok){fatal((r&&r.error)||'โหลดไม่สำเร็จ');return;}
      TASKS=r.tasks||[];TEAM=r.team||[];STATUSES=r.statuses||[];TYPES=r.types||[];OWNER=r.owner||'พี่กี้';SNOW=r.now||Date.now();
      TASKS.forEach(function(t){t.type=t.type||'แทรก';});
      $('meName').textContent=OWNER;$('meAv').textContent=av(OWNER);
      if(VIEW==='overview')renderOverview();else renderDetail();
    });
  }
  function start(){reload().then(function(){$('boot').classList.add('hide');$('app').classList.remove('hide');}).catch(function(e){fatal(e.message);});}
  function uidOverride(){try{return new URLSearchParams(location.search).get('uid')||'';}catch(e){return'';}}
  (function init(){
    var ov=uidOverride();if(ov){UID=ov;start();return;}
    liff.init({liffId:LIFF_ID}).then(function(){if(!liff.isLoggedIn()){liff.login();return;}
      return liff.getProfile().then(function(p){UID=p.userId;start();});}).catch(function(e){fatal('เปิดผ่านไลน์ไม่สำเร็จ: '+(e.message||e));});
  })();
  window.showView=showView;window.setScopeO=setScopeO;window.setScopeD=setScopeD;window.openCompany=openCompany;
  window.toggleTask=toggleTask;window.openManage=openManage;window.saveManage=saveManage;window.doSend=doSend;window.doSendGo=doSendGo;
  window.openReturn=openReturn;window.doReturn=doReturn;window.openCreate=openCreate;window.createTask=createTask;
  window.genRecurring=genRecurring;window.genRecurringGo=genRecurringGo;window.closeModal=closeModal;
</script>
</body>
</html>
